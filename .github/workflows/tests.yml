name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Pins the HF license-consistency private-coverage safety net (task #383):
      # the "valid token but private_seen < floor" false-green branch can't be
      # exercised with a live restricted token, so this stubbed, network-free
      # unit test locks the four exit-code contracts of main() in place.
      - name: HF license-consistency safety-net self-test
        run: python3 .github/scripts/test_hf_license_consistency.py

      # Pins the managed-security-configuration drift checker (task #387): the
      # auth/API-failure branch (must be exit 2, never a silent 0) and the drift
      # branches need live org-admin calls that can't run in CI, so this stubbed,
      # network-free unit test locks the checker's exit-code contract so a future
      # refactor can't weaken it into a false "0 drift" green.
      - name: Code-security drift checker self-test
        run: python3 .github/scripts/test_code_security_drift.py

      # Pins the in-page (deep) anchor checks added in task #412: same-page
      # (#heading) and relative (./file.md#heading) section links rot exactly
      # like absolute-blob anchors. This stubbed, network-free unit test locks
      # the extraction/resolution/slug helpers and the broken-vs-present decision
      # so a future refactor can't silently stop catching dead section links.
      - name: Public-repo link-check in-page anchor self-test
        run: python3 .github/scripts/test_public_repo_link_check.py
