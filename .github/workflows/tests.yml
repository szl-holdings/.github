name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Pins the HF license-consistency private-coverage safety net (task #383):
      # the "valid token but private_seen < floor" false-green branch can't be
      # exercised with a live restricted token, so this stubbed, network-free
      # unit test locks the four exit-code contracts of main() in place.
      - name: HF license-consistency safety-net self-test
        run: python3 .github/scripts/test_hf_license_consistency.py

      # Pins the managed-security-configuration drift checker (task #387): the
      # auth/API-failure branch (must be exit 2, never a silent 0) and the drift
      # branches need live org-admin calls that can't run in CI, so this stubbed,
      # network-free unit test locks the checker's exit-code contract so a future
      # refactor can't weaken it into a false "0 drift" green.
      - name: Code-security drift checker self-test
        run: python3 .github/scripts/test_code_security_drift.py

      # Pins the code-security-drift ALERT message builder (task #745). The
      # scheduled-only ntfy alert's message logic (naming the offending repo(s)
      # on drift exit 1, the COULD NOT COMPLETE text on auth/API failure exit 2,
      # and the \n\n separators a prior revision silently stripped) used to live
      # only in inline bash/jq. This network-free unit test feeds a sample report
      # (exit 1) and an empty/missing report (exit 2) and asserts the resulting
      # text so a future edit can't quietly produce an empty/malformed alert.
      - name: Code-security drift alert builder self-test
        run: python3 .github/scripts/test_build_drift_alert.py

      # Pins the in-page (deep) anchor checks added in task #412: same-page
      # (#heading) and relative (./file.md#heading) section links rot exactly
      # like absolute-blob anchors. This stubbed, network-free unit test locks
      # the extraction/resolution/slug helpers and the broken-vs-present decision
      # so a future refactor can't silently stop catching dead section links.
      - name: Public-repo link-check in-page anchor self-test
        run: python3 .github/scripts/test_public_repo_link_check.py

      # Pins the lockfile-guard coverage PAGER (rising-edge alert + dedup). The
      # alert must fire on a NEW gap, stay silent on a standing gap and when
      # coverage is clean, and the dedup baseline must come from its own state
      # file so a failed report commit cannot resurrect a standing gap. This
      # network-free unit test locks that behaviour out of inline YAML.
      - name: Lockfile-guard coverage pager self-test
        run: python3 .github/scripts/test_lockfile_registry_check.py

      # Pins the license-claim consistency guard (task #902). The
      # --include-private false-green branches (no/invalid token, private
      # listing silently collapsed below the empirical floor), a dropped
      # listing page, and the ordinary drift path all need live org-admin
      # calls that can't run in CI, so this stubbed, network-free unit test
      # locks the guard's five exit-code contracts so a refactor can't weaken
      # it into a public-only-but-green no-op.
      - name: License-consistency guard self-test
        run: python3 .github/scripts/test_license_consistency.py

      # Pins the required-status-check drift guard (task #902). The auth/API
      # failure branch (exit 2, never a silent 0 implying "all checks still
      # required") and the DRIFT branch (a repo silently losing its required
      # context = a re-opened merge hole) need live ruleset/protection reads,
      # so this stubbed, network-free unit test locks the exit-code contract.
      - name: Required-check drift guard self-test
        run: python3 .github/scripts/test_required_check_drift.py

      # Pins the honesty-overclaim sweep guard (task #902). Runs the REAL
      # grep/scan path in --local mode (network-free) so a regex weakening or
      # a no-op'd fail branch that let a Λ-uniqueness / Conjecture-1-proven
      # overclaim land green org-wide cannot pass silently.
      - name: Overclaim-sweep guard self-test
        run: python3 .github/scripts/test_overclaim_sweep.py

      # Pins the energy-provenance honesty guard. The doctrine's load-bearing
      # promise is measured-or-UNAVAILABLE: committed receipt/attestation DATA
      # (JSON / JSONL / DSSE payloads) must never carry a fabricated joule. Runs
      # the REAL check_obj/scan_local/main path network-free (--local) so a
      # weakened invariant (0-joule slipping through, a bool joule mistaken for a
      # measurement, the base64 DSSE recursion dropped, or a no-op'd fail branch)
      # that let a fabricated joule land green org-wide cannot pass silently.
      - name: Energy-provenance guard self-test
        run: python3 .github/scripts/test_energy_provenance_check.py

      # Pins the UDSBundle GHCR reference guard (task #902). The GHCR probe is
      # stubbed so the REAL bundle parser + severity logic run network-free,
      # locking that an unreachable SZL-OWNED ref stays an ERROR (never a
      # downgraded warning) and that an org-sweep with no token aborts (exit 2).
      - name: Bundle-ref guard self-test
        run: python3 .github/scripts/test_bundle_ref_check.py

      # Pins the canonical lutar-lean corpus counter (task #902). Runs offline
      # via --repo-path: a tree with no Lutar/ must exit 2 (never emit a silent
      # all-zero payload), and a real tree must count sorries honestly so a
      # refactor can't make proofs look more complete than they are.
      - name: Lean-numbers counter self-test
        run: python3 .github/scripts/test_lean_numbers.py

      # Pins the org CI health digest job (task #902). The token preflight must
      # fail loud (exit 1) when no usable token is present rather than sweep
      # nothing and post a false "0 red" all-clear; this stubbed, network-free
      # unit test locks that contract.
      - name: CI-health-digest guard self-test
        run: python3 .github/scripts/test_ci_health_digest.py

      # Pins the HF module-drift guard's content-lineage cross-check. The
      # diverged side is named "ahead" by last-commit DATE, but a timestamp lies
      # about lineage: a stale hand-edit can be newer by date yet diverge from
      # the canonical shared module the other side already matches (the
      # szl_be_hardening.py trap). This stubbed, network-free unit test locks the
      # LINEAGE CONFLICT contract so a refactor can't drop the canonical
      # cross-reference and let a date-trusting backport silently regress the
      # byte-identical-across-organs invariant.
      - name: HF module-drift lineage cross-check self-test
        run: python3 .github/scripts/test_hf_module_drift_check.py

      # Pins the SZL anatomy-map cross-surface drift guard. The single honest
      # anatomy map ships on three independently-deployed surfaces (a11oy
      # /console, killinchu /elite, the SZLHOLDINGS/anatomy HF Space); the guard
      # must FAIL when any surface drifts on the locked-8 ladder
      # {F1,F4,F7,F11,F12,F18,F19,F22}, the Λ=Conjecture-1 honesty label, or the
      # shared capability list. This network-free unit test drives the REAL
      # evaluate() path with mutated fixtures (swapped F-id, dropped Λ, one-sided
      # capability edit, missing block) so a refactor can't weaken the guard into
      # an always-green no-op, and confirms the documented per-surface variance
      # (NS footer, Putnam DEMO/OPEN tally) does NOT cause a false red.
      - name: Anatomy-map cross-surface drift guard self-test
        run: python3 .github/scripts/test_anatomy_map_drift.py

      # Pins the HF module-drift allowlist auto-pruner. The pruner removes an
      # accepted_divergences entry ONLY once the two sides are proven
      # byte-identical, never touches ignore_paths/ignore_extensions, and is
      # FAIL-CLOSED -- pruning a still-divergent entry would re-open the drift
      # hole, and pruning on an unreachable side would launder a transient
      # outage into a permanent suppression. The GitHub/HF tree fetchers are
      # injected, so this network-free unit test locks that classify/serialize
      # contract. (The test already lived in-repo but was never wired in.)
      - name: HF module-drift pruner self-test
        run: python3 .github/scripts/test_hf_module_drift_prune.py

      # Pins the shared user-visible codename gate (Doctrine G5). The scanner is
      # the single source of truth for both apps and CI; it must FAIL when a
      # banned codename (amaru/rosie/sentra/jarvis) appears in user-visible text
      # but NOT when the same token is an internal route key (id/class/data-* or
      # <script> bodies). FILE mode is network-free, so this stubbed unit test
      # locks the visible-vs-internal decision and the exit-code contract so a
      # refactor can't weaken it into a false-clean or a false positive.
      - name: Codename gate (shared scanner) self-test
        run: python3 .github/scripts/test_szl_codename_gate.py

      # Pins the org-wide codename sweep (Doctrine G5 CI companion). Real
      # codenames in a scanned file/URL must FAIL (exit 1); a flaky/unreachable
      # surface is by design a WARN (never a false RED, never counted clean).
      # FILE mode is network-free and the LIVE path runs with scan_url stubbed,
      # so this network-free unit test locks both branches.
      - name: Codename sweep guard self-test
        run: python3 .github/scripts/test_codename_sweep.py

      # Pins the reusable HF deployer's Dockerfile-COPY derivation (the deploy set
      # is DERIVED from the caller Dockerfile, so the derivation IS the
      # correctness contract). Locks: `--from=` stage copies contribute no files,
      # a bare `COPY . <dest>` whole-context is skipped (not whole-repo-mirrored),
      # a dotdir source (.compliance/x) survives parsing (an earlier lstrip("./")
      # dropped 5 killinchu files), and dir/glob/file sources expand correctly.
      # Network-free.
      - name: HF deploy-from-Dockerfile derivation self-test
        run: python3 .github/scripts/test_hf_deploy_from_dockerfile.py
