name: HF Release Finalization — Supported Kernel Git

on:
  push:
    branches: [main]
    paths:
      - .github/scripts/kernel_hub_git.py
      - .github/scripts/hf_release_finalization.py
      - .github/scripts/hf_release_finalization_entrypoint.py
      - .github/scripts/hf_release_finalization_git.py
      - .github/scripts/test_kernel_hub_git.py
      - .github/scripts/test_hf_release_finalization.py
      - .github/scripts/test_hf_release_finalization_entrypoint.py
      - .github/scripts/test_hf_release_finalization_git.py
      - .github/workflows/hf-release-finalization.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/kernel_hub_git.py
      - .github/scripts/hf_release_finalization.py
      - .github/scripts/hf_release_finalization_entrypoint.py
      - .github/scripts/hf_release_finalization_git.py
      - .github/scripts/test_kernel_hub_git.py
      - .github/scripts/test_hf_release_finalization.py
      - .github/scripts/test_hf_release_finalization_entrypoint.py
      - .github/scripts/test_hf_release_finalization_git.py
      - .github/workflows/hf-release-finalization.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the reviewed Lake and first-class Kernel card contracts
        required: false
        default: "true"

permissions:
  contents: read
  issues: write
  actions: write

concurrency:
  group: hf-release-finalization-supported-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REPORT_PATH: reports/hf-release-finalization-latest.json
  REPORT_ISSUE_TITLE: "[hf-release-publication] Lake and first-class Kernel Git transport"

jobs:
  finalize:
    name: Supported Dataset API and authenticated Kernel Hub Git
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout release controller
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 1
          path: controller

      - name: Checkout merged Lake source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lake
          ref: main
          persist-credentials: false
          fetch-depth: 0
          path: lake

      - name: Checkout merged energy-kernel source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-energy-attest
          ref: main
          persist-credentials: false
          fetch-depth: 0
          path: energy

      - name: Checkout merged governed-norm source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lambda-gate
          ref: main
          persist-credentials: false
          fetch-depth: 0
          path: lambda-gate

      - name: Bind exact reviewed source lineage
        id: sources
        shell: bash
        run: |
          set -euo pipefail
          git -C lake merge-base --is-ancestor 9c3819e3eb65af862aa0234db7e595c4e423932a HEAD
          git -C energy merge-base --is-ancestor 14c1d8fdbb19dbd69f4dfc365d7f74d515bc4bdb HEAD
          git -C lambda-gate merge-base --is-ancestor 8b95ca47571fda65a52b0b6189677ec089a6e503 HEAD
          echo "lake_sha=$(git -C lake rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "energy_sha=$(git -C energy rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "lambda_sha=$(git -C lambda-gate rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install exact CPU runtime and supported clients
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            --index-url https://download.pytorch.org/whl/cpu \
            'torch==2.7.1'
          python -m pip install --disable-pip-version-check \
            'numpy==2.2.6' \
            'huggingface_hub==1.19.0' \
            'kernels==0.16.0' \
            'requests==2.32.5' \
            'pytest>=8,<9' \
            'pyarrow>=18,<24' \
            'PyYAML>=6,<7'

      - name: Verify transport, finalizer, and source contracts
        working-directory: controller
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/kernel_hub_git.py \
            .github/scripts/hf_release_finalization.py \
            .github/scripts/hf_release_finalization_entrypoint.py \
            .github/scripts/hf_release_finalization_git.py \
            .github/scripts/test_kernel_hub_git.py \
            .github/scripts/test_hf_release_finalization.py \
            .github/scripts/test_hf_release_finalization_entrypoint.py \
            .github/scripts/test_hf_release_finalization_git.py
          PYTHONPATH=.github/scripts python .github/scripts/test_kernel_hub_git.py
          PYTHONPATH=.github/scripts python .github/scripts/test_hf_release_finalization.py
          PYTHONPATH=.github/scripts python .github/scripts/test_hf_release_finalization_entrypoint.py
          PYTHONPATH=.github/scripts python .github/scripts/test_hf_release_finalization_git.py
          python - <<'PY'
          import numpy
          import torch
          assert numpy.__version__ == '2.2.6', numpy.__version__
          assert torch.__version__.startswith('2.7.1'), torch.__version__
          assert not torch.cuda.is_available(), 'release runner must remain CPU-only'
          print('numpy runtime:', numpy.__version__)
          print('torch runtime:', torch.__version__)
          PY
          git diff --check

      - name: Verify merged source contracts before external writes
        run: |
          set -euo pipefail
          python lake/scripts/test_hf_dataset_contract.py
          PYTHONPATH=energy python -m pytest -q energy/tests/test_hf_kernel_contract.py
          PYTHONPATH=lambda-gate/torch-ext:lambda-gate \
            python -m pytest -q lambda-gate/tests/test_hf_governed_norm_contract.py

      - name: Determine execution mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          publish=true
          if [ "$GITHUB_EVENT_NAME" = 'pull_request' ]; then publish=false; fi
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ] && [ "${{ inputs.publish }}" != 'true' ]; then publish=false; fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

      - name: Require governed organization publisher
        if: steps.mode.outputs.publish == 'true'
        run: |
          set -euo pipefail
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo '::error::No supported Hugging Face organization write token is configured.'
            exit 2
          fi

      - name: Publish and independently verify exact revisions
        if: steps.mode.outputs.publish == 'true'
        id: release
        working-directory: controller
        shell: bash
        env:
          SZL_LAKE_SHA: ${{ steps.sources.outputs.lake_sha }}
          SZL_ENERGY_ATTEST_SHA: ${{ steps.sources.outputs.energy_sha }}
          SZL_LAMBDA_GATE_SHA: ${{ steps.sources.outputs.lambda_sha }}
        run: |
          set +e
          PYTHONPATH=.github/scripts python .github/scripts/hf_release_finalization_git.py \
            --publish \
            --generation "$GITHUB_SHA" \
            --lake-root ../lake \
            --energy-root ../energy \
            --lambda-root ../lambda-gate
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write pull-request boundary evidence
        if: steps.mode.outputs.publish != 'true'
        working-directory: controller
        run: |
          mkdir -p reports
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          report = {
              'schema': 'szl.hf-release-finalization/v2-prerelease',
              'generation': os.environ.get('GITHUB_SHA'),
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'publish': False,
              'source_and_transport_tests': 'PASSED',
              'summary': {'ok': 11, 'warning': 0, 'error': 0, 'dry_run': 1},
              'boundary': 'No Hugging Face or issue mutation occurs on pull_request.',
          }
          Path('reports/hf-release-finalization-latest.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload immutable finalization evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-release-finalization-supported-${{ github.run_id }}
          path: controller/${{ env.REPORT_PATH }}
          if-no-files-found: error
          retention-days: 90

      - name: Persist deterministic publication issue
        if: always() && steps.mode.outputs.publish == 'true'
        working-directory: controller
        shell: bash
        env:
          EXIT_CODE: ${{ steps.release.outputs.exit_code }}
        run: |
          set -euo pipefail
          test -f "$REPORT_PATH"
          {
            echo '<!-- szl-hf-release-publication-v2 -->'
            echo '# Lake and first-class Kernel publication'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat "$REPORT_PATH"
            echo '```'
          } > /tmp/hf-release-publication.md
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state all \
            --search "${REPORT_ISSUE_TITLE} in:title" --json number,title \
            --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" | head -n1)"
          if [ -n "$issue" ]; then
            gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --body-file /tmp/hf-release-publication.md
          else
            issue_url="$(gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_ISSUE_TITLE" --body-file /tmp/hf-release-publication.md)"
            issue="${issue_url##*/}"
          fi
          if [ "${EXIT_CODE:-2}" = '0' ]; then
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --reason completed \
              --comment 'The reviewed Lake payload and both first-class Kernel card contracts passed supported transport, immutable revision, build preservation, byte-parity, and selfcheck verification.' || true
          else
            gh issue reopen "$issue" --repo "$GITHUB_REPOSITORY" || true
          fi

      - name: Trigger independent read-only readiness
        if: steps.mode.outputs.publish == 'true' && steps.release.outputs.exit_code == '0'
        run: |
          gh workflow run hf-release-readiness.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish=true

      - name: Enforce fail-closed publication result
        if: always() && steps.mode.outputs.publish == 'true'
        env:
          EXIT_CODE: ${{ steps.release.outputs.exit_code }}
        run: |
          code="${EXIT_CODE:-2}"
          if [ "$code" -ne 0 ]; then
            echo "::error::HF release finalization failed with exit ${code}."
            exit "$code"
          fi
          echo 'Lake and both first-class Kernel contracts are operational through supported transports.'
