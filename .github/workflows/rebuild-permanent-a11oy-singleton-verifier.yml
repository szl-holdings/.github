name: Rebuild permanent A11oy singleton verifier on current main

on:
  push:
    branches: [ops/rebuild-permanent-a11oy-singleton-verifier]
    paths:
      - .github/workflows/rebuild-permanent-a11oy-singleton-verifier.yml

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: rebuild-permanent-a11oy-singleton-verifier
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_HEAD: 470629425a54335497f9a229eb3628d7be5d733f
      REPLACEMENT_BRANCH: fix/hf-permanent-singleton-verifier-current-20260722
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout current protected control-plane main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild permanent verifier as one DCO-signed commit
        run: |
          set -euo pipefail
          git fetch origin "${SOURCE_HEAD}"
          base="$(git rev-parse origin/main)"
          git checkout -B "${REPLACEMENT_BRANCH}" "${base}"

          for path in \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py \
            .github/workflows/hf-estate-upgrade.yml; do
            git checkout "${SOURCE_HEAD}" -- "$path"
          done

          rm -f \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/scripts/hf_estate_single_canonical_v2.py \
            .github/scripts/test_hf_estate_single_canonical_v2.py \
            .github/workflows/redeploy-a11oy-protected-main.yml

          python -m pip install --disable-pip-version-check --quiet \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
          python -m py_compile \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py \
            .github/scripts/hf_module_drift_check.py
          python .github/scripts/test_hf_a11oy_singleton_verify.py

          mapfile -t executable_sources < <(
            {
              find .github/workflows -maxdepth 1 -type f -name '*.yml' \
                ! -name 'hf-estate-upgrade.yml' -print
              find .github/scripts -maxdepth 1 -type f -name '*.py' \
                ! -name 'test_*' -print
            } | sort
          )
          if ((${#executable_sources[@]})) && grep -n -E \
            'hf_estate_(upgrade|canonicalize|single_canonical_v2)\.py|select-newest-a11oy-source|duplicate_repo\(|a11oy-clone-[1-4].*(create|duplicate|refresh|visibility)' \
            "${executable_sources[@]}"; then
            echo '::error::Historical A11oy migration/recreation logic remains in executable sources.'
            exit 2
          fi
          test ! -e .github/scripts/hf_estate_upgrade.py
          test ! -e .github/scripts/hf_estate_canonicalize.py
          test ! -e .github/scripts/hf_estate_single_canonical_v2.py
          test ! -e .github/workflows/redeploy-a11oy-protected-main.yml
          git diff --check

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit \
            -m 'fix(hf): permanently remove all A11oy clone migration automation' \
            -m 'Replace every clone-era create/adopt/delete controller with one scheduled read-only singleton verifier, remove the completed protected-main redeployer, retain Dockerfile-derived byte parity and route checks, and fail if any historical clone or collection pointer returns.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push --force-with-lease origin "HEAD:${REPLACEMENT_BRANCH}"

      - name: Open clean replacement and close stale PR
        run: |
          set -euo pipefail
          cat > /tmp/body.md <<'EOF'
          ## Outcome

          Permanently replace every A11oy clone-era migration controller with one read-only singleton verifier, rebuilt as a single DCO-signed commit on current protected `.github/main`.

          ## Removed

          - the historical clone creator;
          - the `lastModified` adoption/deletion reconciler;
          - the later V2 candidate-adoption controller;
          - their migration tests;
          - the completed one-shot protected-main redeployer.

          ## Permanent verifier

          - derives the latest deploy-triggering revision from protected `szl-holdings/a11oy@main`;
          - proves Dockerfile-derived byte parity with `SZLHOLDINGS/a11oy`;
          - requires public, Docker-backed, RUNNING, immutable build identity;
          - probes root, readiness, build info, Brain capabilities, and holographic routes read-only;
          - fails if any historical clone repository or collection reference returns;
          - may delete only stale collection pointers to already-absent clone IDs;
          - publishes retained Actions and `SZLHOLDINGS/szl-evidence` verification receipts.

          No active workflow or executable source can create, duplicate, adopt from, refresh, republish, delete, or change visibility of an A11oy clone. Experimental work belongs in Git branches, PRs, Replit previews, or explicitly expiring environments.

          Supersedes stale-history PR #251.

          Signed-off-by: Stephen Lutar <stephenlutar2@gmail.com>
          EOF
          existing="$(gh pr list --state open --head "${REPLACEMENT_BRANCH}" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --body-file /tmp/body.md
          else
            gh pr create \
              --base main \
              --head "${REPLACEMENT_BRANCH}" \
              --title 'fix(hf): permanently remove all A11oy clone automation' \
              --body-file /tmp/body.md
          fi
          gh pr close 251 \
            --comment 'Superseded by the clean current-main replacement, which also removes the V2 adoption controller and completed one-shot redeployer added after this branch diverged.' || true
