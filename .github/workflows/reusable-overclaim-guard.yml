name: Reusable — Doctrine Overclaim Guard

# Grep-based honesty gate, promoted org-wide so every repo that publishes
# Lambda-uniqueness / Conjecture-1 claims inherits the SAME rule from one place
# (mirrors the license-consistency / public-repo-link / lockfile-registry reusables).
# Fails CI if a governed surface claims aggregator uniqueness without the
# Theorem U / U1 / U2 qualifier (modulo equivalence under the Identifiability
# Assumptions; strict equality only under Anchored/Normalized), or describes
# Conjecture 1 as proven/closed. Unconditional uniqueness stays OPEN
# (machine-checked false as stated).
#
# Wire it up from a consuming repo, e.g.:
#   jobs:
#     overclaim:
#       uses: szl-holdings/.github/.github/workflows/reusable-overclaim-guard.yml@main
#
# Repos whose governed docs differ from the default set can pass `files:`
# (space-separated). The check is a self-contained grep so it works even where
# no python script is vendored; it greps only the CALLER's own docs (no token,
# no network).

on:
  workflow_call:
    inputs:
      files:
        description: Space-separated governed surfaces to scan (overrides the default set).
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  overclaim:
    name: Governed surfaces are honest (Theorem U citation rule)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout caller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lambda-uniqueness overclaim grep
        shell: bash
        env:
          INPUT_FILES: ${{ inputs.files }}
        run: |
          set -eu
          FAIL=0

          # Governed surfaces only — the honest-taxonomy docs in the caller repo.
          # A caller may override the candidate list via the `files:` input.
          if [ -n "${INPUT_FILES:-}" ]; then
            CANDIDATES="$INPUT_FILES"
          else
            CANDIDATES="README.md PROVEN_FORMULAS.md STATUS.md DEPENDENCY_MAP.md PAPERS_INDEX.md preprints/puriq/README.md"
          fi
          FILES=""
          for f in $CANDIDATES; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -z "$FILES" ]; then
            echo "No governed surfaces present — nothing to check."
            exit 0
          fi
          echo "Scanning governed surfaces:$FILES"

          # Qualifiers that make a Λ-uniqueness sentence governance-safe. A line that
          # carries any of these is exempt (it is honest / conditional / a non-claim).
          SAFE='[Cc]onjecture|[Cc]onditional|modulo|≈Λ|≉Λ|Theorem U|TheoremU|U₁|U₂|under IA|Identifiab|Anchored|Normalized|statement-only|machine-checked|FALSE|false|not a theorem|NOT a theorem|never|stays|OPEN|open|bounty|lambda_unique_|unique aggregator|min-gate|impostor'

          # A) Unconditional "Λ is unique" / "uniqueness of Λ is proven" with NO safe qualifier.
          A=$(grep -nEi "(Λ|lambda)[^.|]{0,80}(is|are|was)[^.|]{0,40}uniqu|uniqu[a-z]*[^.|]{0,40}(of|for)[^.|]{0,20}(Λ|lambda)[^.|]{0,40}(is |are )?(proven|proved|established|a theorem)" $FILES 2>/dev/null \
              | grep -vEi "$SAFE" || true)

          # B) Conjecture 1 declared proven / closed / resolved (verb must be tightly bound
          #    to "Conjecture 1" so meta-prose like "...what was proven and what was not" is safe).
          B=$(grep -nEi "conjecture[ _-]?1\b[^.|]{0,25}(is |was |now |been |=|: )?(proven|proved|closed|resolved|solved|a theorem|holds unconditionally)" $FILES 2>/dev/null \
              | grep -vEi "statement-only|machine-checked|FALSE|false|OPEN|open|not |never|stays|bounty|non-claim|unqualified|overclaim" || true)

          if [ -n "$A" ]; then
            echo "$A" | head -20
            echo "::error::Unqualified Λ-uniqueness overclaim — cite Theorem U / U₁ / U₂ (uniqueness modulo ≈Λ under IA; strict = only under Anchored/Normalized). Unconditional uniqueness is Conjecture 1 (OPEN)."
            FAIL=1
          fi
          if [ -n "$B" ]; then
            echo "$B" | head -20
            echo "::error::Conjecture 1 described as proven/closed — it is OPEN (statement-only, machine-checked false as stated)."
            FAIL=1
          fi

          # C) GENERIC security/correctness overclaim absolutes (tamper-proof,
          #    unbreakable, "100% secure", "mathematically guaranteed", "impossible
          #    to forge", ...). Run as inline python3 (present on ubuntu-latest) so
          #    the negation exemption can consult the PREVIOUS line — markdown
          #    soft-wrap splits "tamper-EVIDENT, not" / "tamper-proof" across two
          #    lines, which a line-at-a-time grep cannot see. The two regexes below
          #    are kept BYTE-IDENTICAL to _C_TRIGGER_RE / _C_NEGATION_RE in
          #    .github/scripts/overclaim_sweep.py (enforced by the lockstep test in
          #    test_overclaim_sweep.py). Bare "guarantee" / bare "100%" are
          #    deliberately NOT triggers (used honestly org-wide).
          RULE_C_FAIL=0
          python3 - $FILES <<'PY' || RULE_C_FAIL=$?
          import re, sys
          TRIG = re.compile(r"tamper[-\s]?proof|\bunbreakable\b|\bunhackable\b|\bun-?forgeable\b|bullet[-\s]?proof|provably secure|provable security|(?:absolutely|completely|perfectly|fully|totally) secure|impossible to (?:forge|break|hack|tamper|compromise|reverse)|cannot be (?:forged|broken|hacked|compromised)|100\s*%\s*(?:secure|safe|accurate|reliable|guaranteed|certain|correct|uptime|private|anonymous|unbreakable|foolproof)|mathematically guaranteed|guaranteed (?:secure|safe|unhackable|unbreakable|correct|accurate|private|tamper[-\s]?proof)|military[-\s]grade (?:encryption|security|crypto)|\brisk[-\s]?free\b|\bzero[-\s]risk\b|\bfoolproof\b", re.IGNORECASE)
          NEG = re.compile(r"\bnot\b|\bnever\b|n't|\bwithout\b|\bnon-|tamper[-\s]?evident|less than 100|<\s?100|sub-100|below 100", re.IGNORECASE)
          fail = 0
          for path in sys.argv[1:]:
              try:
                  lines = open(path, encoding="utf-8", errors="replace").read().splitlines()
              except OSError:
                  continue
              for i, line in enumerate(lines):
                  if TRIG.search(line):
                      prev = lines[i - 1] if i > 0 else ""
                      if not (NEG.search(line) or NEG.search(prev)):
                          print(f"::error::{path}:{i + 1} — generic honesty overclaim (absolute security/correctness claim). State the honest bound (tamper-EVIDENT not tamper-proof; trust never 100%; measured-or-UNAVAILABLE; no unbreakable / unforgeable / 100%-secure claims). Line: {line.strip()[:200]}")
                          fail = 1
          sys.exit(fail)
          PY
          if [ "$RULE_C_FAIL" != "0" ]; then
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo "::error::Doctrine overclaim guard FAILED."
            exit 1
          fi
          echo "Doctrine overclaim guard: governed surfaces are honest (Theorem U citation + generic-overclaim rules satisfied)."
