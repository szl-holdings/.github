name: Reusable — CodeQL

# CodeQL static analysis. Callable from any repo in the org.
#
# Pass `languages` as a JSON array string, e.g. '["javascript-typescript"]'
# or '["javascript-typescript","python"]'. Default: javascript-typescript only.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages: javascript-typescript, python, go, java-kotlin, ruby, swift, csharp, cpp'
        required: false
        type: string
        default: '["javascript-typescript"]'
      build-mode:
        description: 'CodeQL build mode (none, autobuild, manual)'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'CodeQL query suite (default, security-extended, security-and-quality)'
        required: false
        type: string
        default: 'security-and-quality'

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"
