name: Reusable — CodeQL

# CodeQL static analysis. Callable from any repo in the org.
#
# Pass `languages` as a JSON array string, e.g. '["javascript-typescript"]'
# or '["javascript-typescript","python"]'. Default: javascript-typescript only.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages: javascript-typescript, python, go, java-kotlin, ruby, swift, csharp, cpp'
        required: false
        type: string
        default: '["javascript-typescript"]'
      build-mode:
        description: 'CodeQL build mode (none, autobuild, manual)'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'CodeQL query suite (default, security-extended, security-and-quality)'
        required: false
        type: string
        default: 'security-and-quality'

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
