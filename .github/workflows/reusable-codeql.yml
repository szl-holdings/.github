name: Reusable — CodeQL

# CodeQL static analysis. Callable from any repo in the org.
#
# Pass `languages` as a JSON array string, e.g. '["javascript-typescript"]'
# or '["javascript-typescript","python"]'. Default: javascript-typescript only.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages: javascript-typescript, python, go, java-kotlin, ruby, swift, csharp, cpp'
        required: false
        type: string
        default: '["javascript-typescript"]'
      build-mode:
        description: 'CodeQL build mode (none, autobuild, manual)'
        required: false
        type: string
        default: 'none'
      queries:
        description: 'CodeQL query suite (default, security-extended, security-and-quality)'
        required: false
        type: string
        default: 'security-and-quality'

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ inputs.build-mode }}
          queries: ${{ inputs.queries }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
