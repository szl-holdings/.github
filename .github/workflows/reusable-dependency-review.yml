name: Reusable — Dependency Review

# Blocks PRs that introduce vulnerable dependencies or non-permissive licenses.
# Runs only on pull_request events.

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Lowest severity that fails the job (low, moderate, high, critical)'
        required: false
        type: string
        default: 'high'
      allow-licenses:
        description: 'Comma-separated SPDX license identifiers allowed in dependencies'
        required: false
        type: string
        default: 'Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, CC0-1.0, Unlicense, 0BSD, MPL-2.0, CC-BY-4.0, BlueOak-1.0.0, Python-2.0, Zlib'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          allow-licenses: ${{ inputs.allow-licenses }}
          comment-summary-in-pr: on-failure
