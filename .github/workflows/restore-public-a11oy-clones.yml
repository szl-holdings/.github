name: Restore four public A11oy command centers

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-public-a11oy-clones.yml

permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      RESTORE_REVISION: c2549d77d900ad3df86794b3e8b2098ad908cf97
      RESTORE_BRANCH: fix/restore-four-public-a11oy-command-centers
    steps:
      - name: Verify owner-authorized token
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured.'
            exit 2
          }
      - name: Checkout current protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Restore the founder-authorized public clone implementation
        run: |
          set -euo pipefail
          git checkout -B "${RESTORE_BRANCH}"
          git checkout "${RESTORE_REVISION}" -- \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/hf-estate-upgrade.yml
          rm -f .github/workflows/estate-finalization.yml
          python -m py_compile .github/scripts/hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_canonicalize.py
          grep -Fq 'a11oy-clone-1' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'public' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'RUNNING' .github/scripts/hf_estate_canonicalize.py
      - name: Commit exact restoration
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/hf-estate-upgrade.yml
          git commit \
            -m 'fix(hf): restore four public A11oy command centers' \
            -m 'Reinstate the founder-authorized #228 implementation after the conflicting single-Space deletion path merged: keep canonical A11oy plus exactly four public, source-aligned, RUNNING clones, and retire only proven surplus duplicates outside that five-Space keep set.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push --force-with-lease origin "HEAD:${RESTORE_BRANCH}"
      - name: Open or refresh restoration pull request
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          existing="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "${RESTORE_BRANCH}" --json number --jq '.[0].number // empty')"
          cat > /tmp/body.md <<'EOF'
          ## Required outcome

          Restore the founder-authorized Hugging Face command-center topology after the conflicting single-Space cleanup merged:

          - keep `SZLHOLDINGS/a11oy` canonical;
          - retain `a11oy-clone-1` through `a11oy-clone-4`;
          - make all four clones public;
          - synchronize them from the canonical Space without the daily-limited duplication endpoint;
          - require exact file parity and `RUNNING` runtime state;
          - delete only positively identified surplus duplicates outside the exact five-Space keep set;
          - preserve all model, dataset, collection, kernel, and evidence reconciliation.

          This restores the exact reviewed implementation from merged PR #228 and supersedes the conflicting deletion path in #236.

          Signed-off-by: Stephen Lutar <stephenlutar2@gmail.com>
          EOF
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$GITHUB_REPOSITORY" --body-file /tmp/body.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "${RESTORE_BRANCH}" \
              --title 'fix(hf): restore four public A11oy command centers' \
              --body-file /tmp/body.md
          fi
