name: Patch HF governed-norm torch runtime final

on:
  push:
    branches:
      - fix/hf-governed-norm-selfcheck-runtime-final-20260722
    paths:
      - .github/workflows/patch-hf-kernel-torch-runtime-final.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: patch-hf-governed-norm-selfcheck-runtime-final
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact clean branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: fix/hf-governed-norm-selfcheck-runtime-final-20260722
          fetch-depth: 0

      - name: Pin the exact CPU runtime required by torch27 kernels
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/hf-kernel-card-publish.yml')
          text = path.read_text(encoding='utf-8')
          old = '''      - name: Install current supported kernel clients
        run: |
          python -m pip install --disable-pip-version-check \\
            "huggingface_hub>=1.3,<2" \\
            "kernels==0.16.0" \\
            "pytest>=8,<9"
'''
          new = '''      - name: Install current supported kernel clients
        run: |
          python -m pip install --disable-pip-version-check \\
            --index-url https://download.pytorch.org/whl/cpu \\
            "torch==2.7.1"
          python -m pip install --disable-pip-version-check \\
            "huggingface_hub>=1.3,<2" \\
            "kernels==0.16.0" \\
            "pytest>=8,<9"
'''
          if text.count(old) != 1:
              raise SystemExit('expected the current kernel-client install block exactly once')
          text = text.replace(old, new, 1)

          anchor = "          text = workflow.read_text(encoding='utf-8')\n"
          assertions = (
              "          assert 'https://download.pytorch.org/whl/cpu' in text\n"
              "          assert '\"torch==2.7.1\"' in text\n"
          )
          if assertions not in text:
              if text.count(anchor) != 1:
                  raise SystemExit('expected publisher-scope validation anchor exactly once')
              text = text.replace(anchor, anchor + assertions, 1)

          path.write_text(text, encoding='utf-8')
          PY

          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/hf-kernel-card-publish.yml').read_text(encoding='utf-8')
          assert text.count('https://download.pytorch.org/whl/cpu') == 2
          assert text.count('"torch==2.7.1"') == 2
          assert 'SZLHOLDINGS/szl-governed-norm' in text
          assert 'get_kernel(repo_id, revision=revision, trust_remote_code=True)' in text
          print('exact CPU torch27 selfcheck runtime is pinned')
          PY
          git diff --check

      - name: Commit only the production workflow and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/patch-hf-kernel-torch-runtime-final.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/hf-kernel-card-publish.yml
          git diff --cached --check
          git commit \
            -m 'fix(hf): install torch27 CPU selfcheck runtime' \
            -m 'Pin PyTorch 2.7.1 from the official CPU wheel index so the exact published governed-norm kernel revision can execute its selfcheck without changing Hub bytes.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/hf-governed-norm-selfcheck-runtime-final-20260722
