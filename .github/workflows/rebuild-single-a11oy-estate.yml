name: Rebuild official HF estate as single A11oy

on:
  push:
    branches: [hf/estate-official-api-v2-final]
    paths:
      - .github/workflows/rebuild-single-a11oy-estate.yml

permissions:
  contents: write

concurrency:
  group: rebuild-single-a11oy-estate
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: hf/estate-official-api-v2-final
          fetch-depth: 0

      - name: Apply the single-Space rebuild
        run: python .github/scripts/rebuild_single_a11oy_branch.py

      - name: Install pinned Hub client
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.10,<2" \
            "requests>=2.32,<3"

      - name: Verify rebuilt publisher
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/hf_estate_command_centers_v2.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_command_centers_v2.py
          python .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_command_centers_v2.py
          python - <<'PY'
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path('.github/scripts').resolve()))
          import hf_estate_upgrade as base
          import hf_estate_canonicalize as single
          import hf_estate_command_centers_v2 as official

          assert base.CLONE_IDS == []
          assert single.legacy.CLONE_IDS == []
          assert official.legacy.CLONE_IDS == []
          workflow = Path('.github/workflows/hf-estate-upgrade.yml').read_text()
          assert 'python .github/scripts/hf_estate_command_centers_v2.py' in workflow
          assert 'python .github/scripts/hf_estate_canonicalize.py' not in workflow
          assert 'managed_clone_ids' not in workflow
          assert 'Retained command center' not in workflow
          print('single canonical A11oy publisher contract: PASS')
          PY
          git diff --check

      - name: Commit rebuilt publisher and self-remove
        run: |
          set -euo pipefail
          rm \
            .github/scripts/rebuild_single_a11oy_branch.py \
            .github/workflows/rebuild-single-a11oy-estate.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit \
            -m 'fix(hf): consolidate newest A11oy content and permanently retire clones' \
            -m 'Adopt only genuinely newer clone content into SZLHOLDINGS/a11oy, verify public Docker runtime and key read-only routes before deletion, remove collection references, delete the four exact historical clones, disable all clone creation paths, and retain official API estate validation.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:hf/estate-official-api-v2-final
