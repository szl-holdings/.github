name: Repair HF estate to one canonical A11oy

on:
  push:
    branches: [fix/remove-a11oy-clones]
    paths:
      - .github/workflows/repair-single-a11oy.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/remove-a11oy-clones
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Remove clone creation and install canonical-only cleanup
        shell: python
        run: |
          from pathlib import Path
          import re

          root = Path('.')
          legacy_path = root / '.github/scripts/hf_estate_upgrade.py'
          legacy = legacy_path.read_text(encoding='utf-8')
          legacy = legacy.replace(
              '- creates/refreshes four private CPU-basic clones of the flagship a11oy Space;',
              '- never creates or refreshes duplicate A11oy Spaces; the canonical Space is SZLHOLDINGS/a11oy;',
          )
          legacy = legacy.replace(
              'CLONE_IDS = [f"{ORG}/a11oy-clone-{index}" for index in range(1, 5)]',
              'CLONE_IDS: list[str] = []',
          )
          legacy, count = re.subn(
              r'\n    def create_or_refresh_clones\(self\) -> None:\n.*?\n    def _ensure_collection',
              '\n    def create_or_refresh_clones(self) -> None:\n'
              '        """Clone creation is retired; canonical A11oy is the only retained Space."""\n'
              '        self.record(FLAGSHIP_SPACE, "clone-policy", "ok", "canonical-only; no clones created")\n\n'
              '    def _ensure_collection',
              legacy,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'expected one clone factory body, replaced {count}')
          if 'a11oy-clone-' in legacy:
              raise SystemExit('legacy clone identifiers remain after patch')
          legacy_path.write_text(legacy, encoding='utf-8', newline='\n')

          canonicalize = '''#!/usr/bin/env python3
          """Reconcile SZLHOLDINGS around one canonical A11oy Space.

          ``SZLHOLDINGS/a11oy`` is the sole retained governed A11oy runtime. The four
          exact historical automation-created repositories ``a11oy-clone-1`` through
          ``a11oy-clone-4`` are retired. Publish mode removes their collection entries,
          deletes those exact repositories, verifies they are absent, and never creates
          a replacement clone.

          All other estate maintenance remains inherited from ``hf_estate_upgrade``.
          """
          from __future__ import annotations

          import argparse
          import json
          import os
          import re
          import sys
          import time
          from datetime import datetime, timezone
          from typing import Any

          import hf_estate_upgrade as legacy

          RETIRED_CLONE_IDS = tuple(
              f"{legacy.ORG}/a11oy-clone-{index}" for index in range(1, 5)
          )
          KEEP_SPACE_IDS = frozenset({legacy.FLAGSHIP_SPACE})
          legacy.CLONE_IDS = []


          def _runtime_stage(info: Any) -> str:
              runtime = getattr(info, "runtime", None)
              raw = getattr(runtime, "stage", None)
              raw = getattr(raw, "value", raw)
              return str(raw or "UNKNOWN").split(".")[-1].upper()


          def _snapshot(info: Any) -> dict[str, Any]:
              return {
                  "sha": str(getattr(info, "sha", "") or ""),
                  "private": getattr(info, "private", None),
                  "stage": _runtime_stage(info),
                  "last_modified": str(getattr(info, "last_modified", "") or ""),
              }


          class SingleA11oyEstateUpgrade(legacy.EstateUpgrade):
              """Estate upgrade that retains only the canonical A11oy Space."""

              def _verify_canonical_flagship(self) -> dict[str, Any]:
                  if not self.api.repo_exists(legacy.FLAGSHIP_SPACE, repo_type="space"):
                      raise RuntimeError(f"Canonical Space is missing: {legacy.FLAGSHIP_SPACE}")
                  info = self.api.space_info(legacy.FLAGSHIP_SPACE)
                  stage = _runtime_stage(info)
                  sha = str(getattr(info, "sha", "") or "")
                  private = getattr(info, "private", None)
                  files = set(self.api.list_repo_files(legacy.FLAGSHIP_SPACE, repo_type="space"))
                  if stage != "RUNNING":
                      raise RuntimeError(
                          f"Canonical Space is not RUNNING: {legacy.FLAGSHIP_SPACE} stage={stage}"
                      )
                  if not re.fullmatch(r"[0-9a-f]{40}", sha):
                      raise RuntimeError(f"Canonical revision is not an immutable SHA: {sha!r}")
                  if private is True:
                      raise RuntimeError(f"Canonical Space became private: {legacy.FLAGSHIP_SPACE}")
                  if "Dockerfile" not in files:
                      raise RuntimeError(f"Canonical Docker Space lacks Dockerfile: {legacy.FLAGSHIP_SPACE}")
                  snapshot = {
                      "repo_id": legacy.FLAGSHIP_SPACE,
                      **_snapshot(info),
                      "dockerfile_present": True,
                  }
                  self.record(
                      legacy.FLAGSHIP_SPACE,
                      "canonical-space-preflight",
                      "validated",
                      f"stage={stage}; sha={sha}; private={private}",
                  )
                  return snapshot

              def _remove_collection_references(self, repo_ids: set[str]) -> None:
                  if not repo_ids:
                      return
                  for summary in self.api.list_collections(owner=legacy.ORG, limit=100):
                      collection = self.api.get_collection(summary.slug)
                      for item in collection.items:
                          if item.item_type != "space" or item.item_id not in repo_ids:
                              continue
                          target = f"{collection.slug}:{item.item_id}"
                          if not self.publish:
                              self.record(target, "collection-remove-retired-clone", "dry-run")
                              continue
                          self.api.delete_collection_item(
                              collection_slug=collection.slug,
                              item_object_id=item.item_object_id,
                              missing_ok=True,
                          )
                          self.record(target, "collection-remove-retired-clone", "deleted")

              def create_or_refresh_clones(self) -> None:
                  self.canonical_flagship = self._verify_canonical_flagship()
                  existing: dict[str, dict[str, Any]] = {}
                  for repo_id in RETIRED_CLONE_IDS:
                      if self.api.repo_exists(repo_id, repo_type="space"):
                          existing[repo_id] = _snapshot(self.api.space_info(repo_id))
                          self.record(
                              repo_id,
                              "retired-clone-preflight",
                              "ok",
                              json.dumps(existing[repo_id], sort_keys=True),
                          )
                      else:
                          self.record(repo_id, "retired-clone-preflight", "ok", "already absent")

                  self._remove_collection_references(set(existing))
                  self.deleted_clone_snapshots = []
                  for repo_id, before in existing.items():
                      if not self.publish:
                          self.record(
                              repo_id,
                              "delete-retired-clone",
                              "dry-run",
                              f"former_sha={before['sha']}",
                          )
                          self.deleted_clone_snapshots.append({"repo_id": repo_id, **before, "planned": True})
                          continue
                      self.api.delete_repo(repo_id=repo_id, repo_type="space", missing_ok=True)
                      if self.api.repo_exists(repo_id, repo_type="space"):
                          raise RuntimeError(f"Retired clone still exists after deletion: {repo_id}")
                      self.record(
                          repo_id,
                          "delete-retired-clone",
                          "deleted",
                          f"former_sha={before['sha']}",
                      )
                      self.deleted_clone_snapshots.append({"repo_id": repo_id, **before})

                  remaining = [
                      repo_id
                      for repo_id in RETIRED_CLONE_IDS
                      if self.api.repo_exists(repo_id, repo_type="space")
                  ]
                  if self.publish and remaining:
                      raise RuntimeError(f"Retired A11oy clones remain: {remaining}")

                  self.inventory["spaces"] = self._paginate(
                      f"{legacy.HF_BASE}/api/spaces?author={legacy.ORG}&limit=1000&full=true"
                  )
                  self.record(
                      legacy.FLAGSHIP_SPACE,
                      "canonical-only-policy",
                      "validated",
                      f"retired_clones_remaining={len(remaining)}",
                  )

              def report(self) -> dict[str, Any]:
                  report = super().report()
                  report["canonical_flagship_space"] = getattr(
                      self, "canonical_flagship", {"repo_id": legacy.FLAGSHIP_SPACE}
                  )
                  report["managed_clone_ids"] = []
                  report["retired_clone_ids"] = list(RETIRED_CLONE_IDS)
                  report["deleted_clone_snapshots"] = getattr(
                      self, "deleted_clone_snapshots", []
                  )
                  report["command_center_keep_set"] = sorted(KEEP_SPACE_IDS)
                  report["summary"]["ok"] = sum(
                      action.status in {
                          "ok", "updated", "created", "validated", "requested", "deleted"
                      }
                      for action in self.actions
                  )
                  report["boundaries"] = [
                      "SZLHOLDINGS/a11oy is the sole retained governed A11oy Space.",
                      "The exact historical a11oy-clone-1..4 repositories are deleted in publish mode and never recreated.",
                      "No unrelated Hugging Face repository is deleted or renamed.",
                      "No model weights or dataset payloads are changed.",
                      "No paid hardware tier is changed.",
                      "Healthy non-A11oy dynamic Spaces are not rewritten or restarted.",
                      "Kernel repositories are validated; first-class kernel publishing remains governed by kernel-builder release workflows.",
                  ]
                  return report


          def main() -> int:
              parser = argparse.ArgumentParser(description=__doc__)
              parser.add_argument("--publish", action="store_true")
              parser.add_argument(
                  "--generation",
                  default=os.environ.get("GITHUB_SHA") or f"manual-{int(time.time())}",
              )
              args = parser.parse_args()
              token = (
                  os.environ.get("HF_ORG_TOKEN")
                  or os.environ.get("HF_ORG_TOKEN1")
                  or os.environ.get("HF_TOKEN")
              )
              if not token:
                  print("FATAL: HF_ORG_TOKEN/HF_ORG_TOKEN1/HF_TOKEN is not set.", file=sys.stderr)
                  return 2
              try:
                  report = SingleA11oyEstateUpgrade(
                      token=token,
                      generation=args.generation,
                      publish=args.publish,
                  ).run()
              except Exception as exc:
                  print(f"FATAL: {exc!r}", file=sys.stderr)
                  return 2
              summary = report["summary"]
              print(json.dumps(summary, indent=2))
              return 1 if summary["error"] else 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          canonicalize = '\n'.join(line[10:] if line.startswith('          ') else line for line in canonicalize.splitlines()) + '\n'
          (root / '.github/scripts/hf_estate_canonicalize.py').write_text(
              canonicalize, encoding='utf-8', newline='\n'
          )

          tests = '''#!/usr/bin/env python3
          from __future__ import annotations

          import importlib
          import pathlib
          import sys
          import unittest

          SCRIPT_DIR = pathlib.Path(__file__).resolve().parent
          if str(SCRIPT_DIR) not in sys.path:
              sys.path.insert(0, str(SCRIPT_DIR))

          estate = importlib.import_module("hf_estate_canonicalize")


          class SingleA11oyEstateContractTests(unittest.TestCase):
              def test_only_canonical_space_is_retained(self) -> None:
                  self.assertEqual(
                      estate.RETIRED_CLONE_IDS,
                      tuple(f"SZLHOLDINGS/a11oy-clone-{index}" for index in range(1, 5)),
                  )
                  self.assertEqual(estate.KEEP_SPACE_IDS, frozenset({"SZLHOLDINGS/a11oy"}))
                  self.assertEqual(estate.legacy.CLONE_IDS, [])

              def test_no_clone_creation_path_remains(self) -> None:
                  source = (SCRIPT_DIR / "hf_estate_canonicalize.py").read_text(encoding="utf-8")
                  self.assertNotIn("duplicate_repo(", source)
                  self.assertNotIn("create_repo(", source)
                  self.assertNotIn("update_repo_settings", source)
                  self.assertIn("delete_repo(", source)
                  self.assertIn("delete-retired-clone", source)

              def test_legacy_factory_is_retired(self) -> None:
                  source = (SCRIPT_DIR / "hf_estate_upgrade.py").read_text(encoding="utf-8")
                  self.assertIn("CLONE_IDS: list[str] = []", source)
                  self.assertNotIn("a11oy-clone-", source)
                  self.assertIn("canonical-only; no clones created", source)

              def test_workflow_is_canonical_only(self) -> None:
                  workflow = (SCRIPT_DIR.parent / "workflows" / "hf-estate-upgrade.yml").read_text(encoding="utf-8")
                  self.assertIn("Keep one canonical A11oy Space", workflow)
                  self.assertNotIn("Retain four", workflow)
                  self.assertNotIn("a11oy-clone-1", workflow)
                  self.assertIn("retired_clone_ids", workflow)

              def test_runtime_stage_normalization(self) -> None:
                  class Runtime:
                      stage = "SpaceStage.RUNNING"
                  class Info:
                      runtime = Runtime()
                  self.assertEqual(estate._runtime_stage(Info()), "RUNNING")


          if __name__ == "__main__":
              unittest.main()
          '''
          tests = '\n'.join(line[10:] if line.startswith('          ') else line for line in tests.splitlines()) + '\n'
          (root / '.github/scripts/test_hf_estate_canonicalize.py').write_text(
              tests, encoding='utf-8', newline='\n'
          )

          workflow = '''name: HF Estate — Canonical A11oy Only

          # One governed production Space: SZLHOLDINGS/a11oy. The four exact
          # automation-created a11oy-clone-* repositories are retired and deleted.
          on:
            push:
              branches: [main]
              paths:
                - .github/scripts/hf_estate_upgrade.py
                - .github/scripts/hf_estate_canonicalize.py
                - .github/scripts/test_hf_estate_canonicalize.py
                - .github/workflows/hf-estate-upgrade.yml
            pull_request:
              branches: [main]
              paths:
                - .github/scripts/hf_estate_upgrade.py
                - .github/scripts/hf_estate_canonicalize.py
                - .github/scripts/test_hf_estate_canonicalize.py
                - .github/workflows/hf-estate-upgrade.yml
            workflow_dispatch:
              inputs:
                publish:
                  description: Delete the four exact retired clones and reconcile the estate
                  required: false
                  default: "true"

          permissions:
            contents: write

          concurrency:
            group: hf-estate-canonical-a11oy-${{ github.event_name }}-${{ github.ref }}
            cancel-in-progress: false

          jobs:
            reconcile:
              name: Keep one canonical A11oy Space
              runs-on: ubuntu-latest
              timeout-minutes: 120
              env:
                HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
                HF_TOKEN: ${{ secrets.HF_TOKEN }}
                HF_HUB_DISABLE_PROGRESS_BARS: "1"
                TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
              steps:
                - name: Checkout triggering revision
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                  with:
                    ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
                    fetch-depth: 1

                - name: Record credential preflight
                  id: credentials
                  shell: bash
                  run: |
                    set -euo pipefail
                    publish=true
                    if [ "${{ github.event_name }}" = "pull_request" ]; then publish=false; fi
                    if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then publish=false; fi
                    if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
                      echo "has_token=false" >> "$GITHUB_OUTPUT"
                      mkdir -p reports
                      cat > reports/hf-estate-upgrade-latest.json <<JSON
                    {
                      "schema": "szl.hf-estate-upgrade-report/v1",
                      "organization": "SZLHOLDINGS",
                      "generation": "${GITHUB_SHA}",
                      "publish": ${publish},
                      "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                      "counts": {},
                      "canonical_flagship_space": {"repo_id": "SZLHOLDINGS/a11oy"},
                      "managed_clone_ids": [],
                      "retired_clone_ids": [],
                      "collections": {},
                      "actions": [{
                        "target": "SZLHOLDINGS",
                        "action": "credential-preflight",
                        "status": "error",
                        "detail": "No supported Hugging Face Actions secret is configured."
                      }],
                      "summary": {"ok": 0, "warning": 0, "error": 1, "dry_run": 0},
                      "boundaries": ["No Hugging Face mutation was attempted without an authenticated org-scoped write token."]
                    }
                    JSON
                      echo "::error::No supported Hugging Face Actions secret is configured."
                    else
                      echo "has_token=true" >> "$GITHUB_OUTPUT"
                    fi

                - name: Set up Python
                  if: steps.credentials.outputs.has_token == 'true'
                  uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
                  with:
                    python-version: "3.12"

                - name: Install pinned Hub client range
                  if: steps.credentials.outputs.has_token == 'true'
                  run: |
                    python -m pip install --disable-pip-version-check \
                      "huggingface_hub>=1.3,<2" \
                      "requests>=2.32,<3"

                - name: Verify canonical-only estate contract
                  if: steps.credentials.outputs.has_token == 'true'
                  run: |
                    python -m py_compile \
                      .github/scripts/hf_estate_upgrade.py \
                      .github/scripts/hf_estate_canonicalize.py \
                      .github/scripts/test_hf_estate_canonicalize.py
                    python .github/scripts/test_hf_estate_canonicalize.py

                - name: Execute canonical-only estate reconciliation
                  if: steps.credentials.outputs.has_token == 'true'
                  id: estate
                  shell: bash
                  run: |
                    set +e
                    publish_flag="--publish"
                    if [ "${{ github.event_name }}" = "pull_request" ]; then
                      publish_flag=""
                    elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
                      publish_flag=""
                    fi
                    python .github/scripts/hf_estate_canonicalize.py \
                      ${publish_flag} \
                      --generation "${GITHUB_SHA}"
                    code=$?
                    echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
                    exit 0

                - name: Upload pull-request dry-run evidence
                  if: always() && github.event_name == 'pull_request'
                  uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                  with:
                    name: hf-estate-canonical-a11oy-dry-run-${{ github.run_id }}
                    path: reports/hf-estate-upgrade-latest.json
                    if-no-files-found: error
                    retention-days: 30

                - name: Commit the evidence report
                  if: always() && github.event_name != 'pull_request'
                  shell: bash
                  run: |
                    set -euo pipefail
                    if [ ! -f reports/hf-estate-upgrade-latest.json ]; then
                      echo "::warning::No estate report was produced."
                      exit 0
                    fi
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add reports/hf-estate-upgrade-latest.json
                    if git diff --cached --quiet; then
                      echo "Report is unchanged."
                      exit 0
                    fi
                    git commit -s -m "chore(hf): record canonical-only estate report [skip ci]"
                    git push origin "HEAD:${TARGET_BRANCH}"

                - name: Publish job summary
                  if: always()
                  shell: bash
                  run: |
                    python - <<'PY'
                    import json
                    import os
                    from pathlib import Path
                    path = Path("reports/hf-estate-upgrade-latest.json")
                    with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
                        out.write("## Hugging Face canonical A11oy estate\n\n")
                        if not path.exists():
                            out.write("No report was produced.\n")
                        else:
                            report = json.loads(path.read_text(encoding="utf-8"))
                            canonical = report.get("canonical_flagship_space", {})
                            out.write(f"Canonical A11oy: `{canonical.get('repo_id', 'UNKNOWN')}` at `{canonical.get('sha', 'UNVERIFIED')}` ({canonical.get('stage', 'UNKNOWN')})\n\n")
                            out.write(f"Retired clone IDs: `{len(report.get('retired_clone_ids', []))}`\n\n")
                            out.write(f"Deleted/planned snapshots: `{len(report.get('deleted_clone_snapshots', []))}`\n\n")
                            out.write("| Inventory | Count |\n|---|---:|\n")
                            for key, value in report.get("counts", {}).items():
                                out.write(f"| {key} | {value} |\n")
                            out.write("\n| Result | Count |\n|---|---:|\n")
                            for key, value in report.get("summary", {}).items():
                                out.write(f"| {key} | {value} |\n")
                    PY

                - name: Enforce fail-closed completion
                  if: always()
                  shell: bash
                  run: |
                    if [ "${{ steps.credentials.outputs.has_token }}" != "true" ]; then exit 2; fi
                    code="${{ steps.estate.outputs.exit_code }}"
                    if [ -z "$code" ]; then code=2; fi
                    if [ "$code" -ne 0 ]; then
                      echo "::error::Canonical-only reconciliation failed with exit code $code; inspect the report."
                      exit "$code"
                    fi
          '''
          workflow = '\n'.join(line[10:] if line.startswith('          ') else line for line in workflow.splitlines()) + '\n'
          (root / '.github/workflows/hf-estate-upgrade.yml').write_text(
              workflow, encoding='utf-8', newline='\n'
          )

          temporary = root / '.github/workflows/repair-single-a11oy.yml'
          temporary.unlink()
      - name: Validate repaired estate controls
        run: |
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_canonicalize.py
          git diff --check
          ! grep -R "Retain four\|creates/refreshes four\|a11oy-clone-1" \
            .github/scripts/hf_estate_upgrade.py \
            .github/workflows/hf-estate-upgrade.yml
      - name: Commit canonical-only controls
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/hf-estate-upgrade.yml \
            .github/workflows/repair-single-a11oy.yml
          git commit -m 'fix(hf): retain only canonical A11oy Space' \
            -m 'Remove every automated clone-creation path and add a fail-closed cleanup for the four exact historical clone repositories.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/remove-a11oy-clones