name: Pin Check

# Enforces SHA-pinning on every workflow file in this repo. The reusable
# workflows here are consumed by every other repo in the org, so they MUST
# be SHA-pinned themselves — `@main` would let an attacker who compromised
# this repo silently swap out the action.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/reusable_workflow_target_check.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/scripts/reusable_workflow_target_check.py'

permissions:
  contents: read

jobs:
  check:
    name: All actions SHA-pinned
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify SHA-pins
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW_DIR=".github/workflows"
          VIOLATIONS=$(mktemp)
          for file in "$WORKFLOW_DIR"/*.yml "$WORKFLOW_DIR"/*.yaml; do
            [ -f "$file" ] || continue
            while IFS= read -r line; do
              ref=$(echo "$line" | sed -n 's/.*uses:[[:space:]]*\([^[:space:]#]*\).*/\1/p')
              [ -z "$ref" ] && continue
              [[ "$ref" == ./* ]] && continue
              # Org reusable-workflow calls are validated by the next step.
              [[ "$ref" == szl-holdings/* ]] && continue
              after_at="${ref##*@}"
              if ! echo "$after_at" | grep -qE '^[0-9a-f]{40}$'; then
                echo "::error file=$file::Unpinned action — $ref" | tee -a "$VIOLATIONS"
              fi
            done < <(grep -E '^\s*(-\s+)?uses:\s+\S' "$file" | grep -v '^\s*#')
          done
          if [ -s "$VIOLATIONS" ]; then
            echo ""
            echo "Pin every action to a 40-char SHA. Add '# v1.2.3' as a trailing comment."
            exit 1
          fi
          echo "✓ All action refs are SHA-pinned."

      - name: Verify reusable-workflow targets at pinned SHAs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 .github/scripts/reusable_workflow_target_check.py
          --workflow-dir .github/workflows
