name: Execute bounded Dataset Viewer retry repair

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/execute-viewer-retry-repair.yml

permissions:
  contents: write

concurrency:
  group: execute-viewer-retry-repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: fix/hf-viewer-transient-retry
      EXPECTED_HEAD: d0a52e34fa11320a6acaf373f355675d0be748df
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Verify immutable repair head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD" || {
            echo "::error::Repair branch moved; refusing to patch an unreviewed head."
            exit 2
          }

      - name: Apply bounded retry and regression tests
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source_path = Path('.github/scripts/hf_release_finalization.py')
          source = source_path.read_text(encoding='utf-8')
          if 'import time\n' not in source:
              source = source.replace('import os\n', 'import os\nimport time\n', 1)

          marker = '    def finalize_dataset(self) -> None:\n'
          helper = '''    def _wait_for_dataset_viewer(
        self,
        attempts: int = 12,
    ) -> tuple[requests.Response, dict[str, Any], int]:
        """Wait for Dataset Viewer materialization without accepting failure.

        Retry only bounded network failures, 429/5xx responses, or explicit
        busy/not-ready payloads. A final HTTP 200 JSON object with no error field
        remains mandatory.
        """
        if attempts < 1:
            raise ValueError("attempts must be positive")
        retryable_statuses = {429, 500, 502, 503, 504}
        transient_markers = ("busy", "not ready", "retry", "processing", "loading")
        last_detail = "no response"
        for attempt in range(1, attempts + 1):
            try:
                response = requests.get(
                    VIEWER_URL,
                    headers={
                        "Accept": "application/json",
                        "Cache-Control": "no-cache",
                        "User-Agent": "szl-hf-release-finalizer/1.1",
                    },
                    timeout=90,
                )
            except requests.RequestException as exc:
                last_detail = f"{type(exc).__name__}: {exc}"
                retryable = True
            else:
                payload: Any = None
                if response.status_code == 200:
                    try:
                        payload = response.json()
                    except ValueError as exc:
                        raise RuntimeError(
                            f"Dataset Viewer returned invalid JSON: {exc}"
                        ) from exc
                    if isinstance(payload, dict) and not payload.get("error"):
                        return response, payload, attempt
                    error_text = str(
                        payload.get("error") if isinstance(payload, dict) else payload
                    )
                    last_detail = f"HTTP 200 error payload: {error_text[:300]}"
                    lowered = error_text.lower()
                    retryable = any(value in lowered for value in transient_markers)
                else:
                    last_detail = f"HTTP {response.status_code}: {response.text[:300]}"
                    retryable = response.status_code in retryable_statuses

            if not retryable:
                raise RuntimeError(
                    f"Dataset Viewer contract failed non-transiently: {last_detail}"
                )
            if attempt == attempts:
                raise RuntimeError(
                    "Dataset Viewer contract did not converge after "
                    f"{attempts} attempts: {last_detail}"
                )
            delay = min(15 * attempt, 60)
            self.record(
                DATASET_ID,
                "dataset-viewer-wait",
                "warning",
                f"attempt={attempt}/{attempts}; retry_in={delay}s; {last_detail}",
            )
            time.sleep(delay)

'''
          if helper not in source:
              if source.count(marker) != 1:
                  raise SystemExit('expected finalize_dataset marker exactly once')
              source = source.replace(marker, helper + marker, 1)

          old = '''        response = requests.get(VIEWER_URL, timeout=90)
        if response.status_code != 200:
            raise RuntimeError(
                f"Dataset Viewer contract did not return HTTP 200: {response.status_code} "
                f"{response.text[:300]}"
            )
        payload = response.json()
        if not isinstance(payload, dict) or payload.get("error"):
            raise RuntimeError(f"Dataset Viewer returned an error payload: {payload}")
'''
          new = '        response, payload, viewer_attempts = self._wait_for_dataset_viewer()\n'
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise SystemExit('expected Dataset Viewer verification block was not found')

          source = source.replace(
              'f"after={after}; files={len(remote_files)}; viewer=HTTP-200",',
              'f"after={after}; files={len(remote_files)}; viewer=HTTP-200; attempts={viewer_attempts}",',
              1,
          )
          source = source.replace(
              '"viewer_http_status": response.status_code,\n',
              '"viewer_http_status": response.status_code,\n            "viewer_attempts": viewer_attempts,\n',
              1,
          )
          source_path.write_text(source, encoding='utf-8')

          test_path = Path('.github/scripts/test_hf_release_finalization.py')
          tests = test_path.read_text(encoding='utf-8')
          if 'from unittest import mock\n' not in tests:
              tests = tests.replace('import unittest\n', 'import unittest\nfrom unittest import mock\n', 1)
          insertion = '''    def test_dataset_viewer_retries_only_transient_states(self) -> None:
        class Response:
            def __init__(self, status: int, payload: dict[str, object]) -> None:
                self.status_code = status
                self._payload = payload
                self.text = str(payload)

            def json(self) -> dict[str, object]:
                return self._payload

        responses = iter(
            [
                Response(500, {"error": "server busy and not ready; retry later"}),
                Response(200, {"rows": [], "features": []}),
            ]
        )
        instance = object.__new__(finalizer.Finalizer)
        instance.actions = []
        with mock.patch.object(finalizer.requests, "get", side_effect=lambda *a, **k: next(responses)), mock.patch.object(finalizer.time, "sleep"):
            response, payload, attempts = instance._wait_for_dataset_viewer(attempts=3)
        self.assertEqual(response.status_code, 200)
        self.assertEqual(payload, {"rows": [], "features": []})
        self.assertEqual(attempts, 2)
        self.assertEqual(len(instance.actions), 1)

    def test_dataset_viewer_fails_immediately_on_non_transient_response(self) -> None:
        class Response:
            status_code = 404
            text = '{"error":"missing"}'

            @staticmethod
            def json() -> dict[str, str]:
                return {"error": "missing"}

        instance = object.__new__(finalizer.Finalizer)
        instance.actions = []
        with mock.patch.object(finalizer.requests, "get", return_value=Response()), mock.patch.object(finalizer.time, "sleep") as sleep:
            with self.assertRaisesRegex(RuntimeError, "non-transiently"):
                instance._wait_for_dataset_viewer(attempts=3)
        sleep.assert_not_called()

'''
          anchor = '    def test_no_model_or_training_target(self) -> None:\n'
          if 'test_dataset_viewer_retries_only_transient_states' not in tests:
              if tests.count(anchor) != 1:
                  raise SystemExit('expected test insertion anchor exactly once')
              tests = tests.replace(anchor, insertion + anchor, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

          python -m py_compile \
            .github/scripts/hf_release_finalization.py \
            .github/scripts/test_hf_release_finalization.py
          python .github/scripts/test_hf_release_finalization.py
          git diff --check

      - name: Commit reviewed product repair to the feature branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/repair-hf-viewer-retry.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/scripts/hf_release_finalization.py \
            .github/scripts/test_hf_release_finalization.py \
            .github/workflows/repair-hf-viewer-retry.yml
          git commit \
            -m 'fix(hf): retry transient Dataset Viewer materialization' \
            -m 'Bound retries to network errors, 429/5xx, and explicit materialization states while retaining a mandatory final HTTP 200 non-error JSON response.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin "HEAD:${TARGET_BRANCH}"