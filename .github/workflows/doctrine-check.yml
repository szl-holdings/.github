name: SZL Doctrine Check
on:
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  doctrine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: SZL Doctrine Invariants
        run: |
          set -eu
          FAIL=0

          # Repo-scoped SLSA L2 evidence gate. SLSA posture is L1 honest / L2 roadmap.
          # Only the two SHIPPING products (a11oy, killinchu) wire
          # actions/attest-build-provenance + a cosign verify-attestation honesty
          # gate in their ghcr-build-push.yml and publish a real GHCR image. For
          # these two repos ONLY, the honest combined "SLSA L1 + L2 (roadmap)" banner
          # wording in docs/footers is permitted. For every OTHER repo a bare "L2"
          # claim still fails — this keeps the gate substantive and repo-scoped.
          # (The retired codenames amaru/sentra/rosie are NOT repos and ship nothing;
          # they were removed from this list 2026-06-10 — they never had a real image.)
          VERIFIED_L2_REPOS="a11oy killinchu"
          THIS_REPO="${GITHUB_REPOSITORY##*/}"
          IS_VERIFIED_L2=0
          for r in $VERIFIED_L2_REPOS; do
            if [ "$r" = "$THIS_REPO" ]; then IS_VERIFIED_L2=1; fi
          done
          echo "repo=$THIS_REPO verified_L2=$IS_VERIFIED_L2"

          # NOTE (CI hygiene fix 2026-06-03): previously each invariant used
          #   `if grep ... | head -N; then FAIL=1; fi`
          # In a pipeline the exit status is that of the LAST command (`head`),
          # which is always 0 — so every `if` fired regardless of whether grep
          # matched, producing false-positive doctrine failures on Inv 1/2/3/5/6/7.
          # Fix: capture grep output into a variable and test for non-empty, and
          # print the matched lines explicitly (no hidden-in-`if` matches).

          # NOTE: --exclude-dir="coordination" — the .github repo's coordination/
          # directory holds internal cross-repo agent directives and storyboards
          # (planning docs that reference other repos' roadmaps and the audit trail
          # of REMOVING fake SLSA L3 claims). They are not shipped artifacts or
          # customer-facing doctrine claims; flagship repos have no coordination/ dir.
          #
          # NOTE (2026-06-10): --exclude-dir="corpus" — a11oy/killinchu now ship an
          # in-image corpus/ mirror (corpus/INDEX.json) so the HF Space can cite
          # source docs when api.github.com is egress-blocked. Every corpus/ file is
          # a VERBATIM mirror of a real GitHub blob in ANOTHER repo (szl-papers,
          # lutar-lean, docs-site, …), traced by blob_sha@commit_sha in INDEX.json
          # (blob_sha verified to match the source repo). These are third-party
          # academic/source docs (e.g. szl-papers' honest "conditional Λ-uniqueness
          # theorem" prose, SLSA L1–L3 spec definitions, and an explicit
          # "no L2/L3/FedRAMP/Iron Bank/CMMC claims" honesty statement) that are
          # doctrine-reviewed in THEIR home repos — NOT first-party doctrine claims
          # authored here. Excluded on the exact same verbatim-mirror rationale as
          # coordination/ and the *_prs.json snapshots. First-party files are still
          # fully scanned, so the gate is not weakened.
          echo "=== Invariant 1: Doctrine v11 LOCKED 749/14/163 ==="
          # NOTE: all_open_prs.json / cto_prs_opened_recent.json are GENERATED GitHub
          # PR-title snapshots (verbatim dumps of OTHER PRs' titles, e.g. one titled
          # "v12+v13 DOI badges") — third-party/generated data, not an SZL doctrine
          # claim. Excluded on the same snapshot rationale as governed_loop*.json.
          M1=$(grep -rE "doctrine.*v(9|10|12|13)" \
              --include="*.md" --include="*.json" --include="*.yaml" --include="*.yml" \
              --include="*.py" --include="*.ts" --include="*.go" \
              --exclude="governed_loop*.json" --exclude="wayra_snapshot*.json" \
              --exclude="all_open_prs.json" --exclude="cto_prs_opened_recent.json" \
              --exclude="szl_math_corpus.py" --exclude="szl_chaski.py" \
              --exclude="szl_hub.py" --exclude="run_all_json.py" \
              --exclude="OUROBOROS_RUN_ALL.py" \
              --exclude="szlBreaker.ts" --exclude="szl_breaker.py" \
              --exclude="serve.py" --exclude="szl_wire.py" --exclude="_live_serve.py" \
              --exclude-dir="coordination" --exclude-dir="cursor-directives" --exclude-dir="replit-sync" --exclude-dir="corpus" \
              --exclude-dir="resilience_observability" \
              . 2>/dev/null | \
              grep -vE "^(\./)?\.git/|\.lake/|node_modules/|/dist/|/build/" | \
              grep -viE "ADDITIVE|additive|proposed|planned.*release|roadmap|not yet promoted|future" | \
              grep -viE "historical|deprecated|archived|out of scope|not pursuing|REJECTED" | \
              grep -vE "v10.*v11|v11.*v10|v10-v11|additive over|edge organ|4th organ" | \
              grep -vE "v12.*v11|v11.*v12|PURIQ|CHASKI|organ.*v1[23]|v1[23].*organ" | \
              grep -vE "§[0-9]|doctrine_state|doctrine-v|Doctrine v[0-9].*LOCKED|v1[12].*LOCKED" | \
              grep -vE "Doctrine v[0-9].*additive|additive.*Doctrine|v[0-9].*additive.*LOCKED" \
              || true)
          if [ -n "$M1" ]; then
            echo "$M1" | head -10
            echo "::error::Doctrine version drift detected — only v11 allowed (ADDITIVE/proposed/roadmap/historical labels are exempt)"
            FAIL=1
          fi

          echo "=== Invariant 2: Λ = Conjecture 1 (NEVER theorem) ==="
          M2=$(grep -rE "Λ.*theorem|Lambda.*theorem|lambda.*Theorem|lambdaUniqueness[^C]" \
              --include="*.md" --include="*.json" --include="*.py" --include="*.ts" --include="*.lean" \
              --exclude="OUROBOROS_RUN_ALL.py" --exclude="YACHAY_SYSTEM_PROMPT.md" \
              --exclude-dir="__tests__" --exclude-dir="coordination" --exclude-dir="cursor-directives" --exclude-dir="replit-sync" --exclude-dir="corpus" \
              . 2>/dev/null | \
              grep -vE "Conjecture|conjecture|NOT a theorem|not a proven theorem|not a theorem" | \
              grep -vE "Never claim|never claim|Never.*theorem|don't claim|do not claim" | \
              grep -viE "do not call|don't call|never call|not call.*theorem" | \
              grep -vE "gate.*theorem|theorem.*enforced|README.*theorem|gates/README" | \
              grep -vE "lambdaCategory|lambdaMonotonicity|composability|MinMaxBounds" | \
              grep -vE "TheoremU_LambdaUnique|TheoremU_|Lutar/Uniqueness/TheoremU" | \
              grep -vE "knowledge\.json|Lean.*theorem|lean 4.*theorem|Lean 4.*theorem" | \
              grep -viE "does not assert|doesn't assert|do not assert|not assert.*theorem" | \
              grep -vE "[0-9]+ theorems|all [0-9]+ theorem|theorems '|Every theorem|theorem carries|theorems carries" | \
              grep -vE "KS_theorem|_theorem_[0-9]|theorem_ref|Theorem [0-9]|theorem [0-9]" | \
              grep -vE "→ ?theorem|theorem ?→|receipt.*theorem|provenance.*theorem|theorem.*DOI" | \
              grep -vE "uniqueness theorem is conditional|theorem is conditional-only|conditional.*not claimed" | \
              grep -viE "conjecture 1|never a theorem|dress .*up as a theorem|conditional Λ theorem|conditional lambda theorem" | \
              grep -vE "^(\./)?\.git/|\.lake/|node_modules/" \
              || true)
          if [ -n "$M2" ]; then
            echo "$M2" | head -10
            echo "::error::Λ described as theorem or lambdaUniqueness used without Conjecture suffix — must be Conjecture 1"
            FAIL=1
          fi

          echo "=== Invariant 3: SLSA claims must be honest and evidence-gated ==="
          # L3 is NOT claimed. L2 is permitted ONLY for repos with a verified
          # actions/attest-build-provenance attestation in GHCR/GitHub Attestations API.
          # Unverified L2 claims and all L3 claims are banned.
          #
          # Posture: SLSA L1 honest (L2 roadmap via Wire D). The two shipping products
          # (a11oy, killinchu) have actions/attest-build-provenance@v2.4.0 wired in
          # their ghcr-build-push.yml workflows, BUT the L2 attestation is NOT yet
          # earned on the deployed images:
          # `cosign verify-attestation --type slsaprovenance ghcr.io/szl-holdings/<product>`
          # returns "no matching attestations" (verified 2026-06-04). L2 is not claimed
          # anywhere until that command passes (likely needs org-level attestations:write).

          # RULE 1: L3 is never allowed (requires isolated/reusable-workflow builder)
          M3_L3=$(grep -rE "SLSA.*L3|SLSA Level 3" \
              --include="*.md" --include="*.json" --include="*.yaml" \
              --exclude-dir="coordination" --exclude-dir="cursor-directives" --exclude-dir="replit-sync" --exclude-dir="corpus" \
              . 2>/dev/null | \
              grep -vE "^(\./)?\.git/|\.lake/|node_modules/" | \
              grep -viE "not L3|no.*L3|L3.*not|banned|prohibited|forbidden|out of scope" | \
              grep -viE "roadmap|future|planned|historical|archived|REJECTED|path to" | \
              grep -viE "staged|awaiting|mis-claimed|misclaimed|corrected|previously" | \
              grep -viE "flags bare|appears only inside|quoted prohibition|prohibition|overclaim grep" | \
              sed -E 's#;base64,[A-Za-z0-9+/=]+##g' | \
              grep -E "SLSA.*L3|SLSA Level 3" \
              || true)
          if [ -n "$M3_L3" ]; then
            echo "$M3_L3" | head -10
            echo "::error::SLSA L3 claim detected — L3 is NOT achieved (requires isolated builder/reusable workflow). Remove or scope as future roadmap."
            FAIL=1
          fi

          # RULE 2: L2 claims require evidence (attestation). Verified repos:
          # a11oy, killinchu (the two shipping products). These repos wire
          # actions/attest-build-provenance + a cosign verify-attestation honesty
          # gate in ghcr-build-push.yml and have a real attestation bundle in the
          # GitHub Attestations API for the deployed digest (confirmed 2026-06-08).
          # For a verified-L2 repo, the honest combined banner "SLSA L1 + L2" /
          # "SLSA L1+L2" / "L1 + L2" in docs and footers is permitted (the evidence
          # lives in SLSA_LEVEL.md + the build workflow). For NON-verified repos
          # any bare L2 claim still fails. This keeps the gate repo-scoped + honest.
          #
          # RULE 2b (CI flood fix 2026-06-09): aggregator repos (e.g. uds-bundles)
          # ship per-organ bundle docs that reference the L2 status of the two
          # VERIFIED product images. Such lines are exempt ONLY when they name a
          # verified organ's evidence file (<organ>.slsa-provenance.json), live
          # under a verified bundle slug (szl-<organ>/), explicitly scope the claim
          # to "L2 on organ images", or honestly disclaim bundle-level attestation
          # ("bundle-level ... NOT earned"). A bare/inflated L2 claim with no organ
          # reference and no evidence still FAILS — gate is not weakened.
          if [ "$IS_VERIFIED_L2" = "1" ]; then
            L2_BANNER_EXEMPT='SLSA L1 ?\+ ?L2|SLSA L1\+L2|L1 ?\+ ?L2|SLSA Build L2 provenance attestation'
          else
            L2_BANNER_EXEMPT='__never_match_sentinel__'
          fi
          M3_L2_UNVERIFIED=$(grep -rE "SLSA.*L2|SLSA Level 2" \
              --include="*.md" --include="*.json" --include="*.yaml" \
              --exclude-dir="coordination" --exclude-dir="cursor-directives" --exclude-dir="replit-sync" --exclude-dir="corpus" \
              . 2>/dev/null | \
              grep -vE "^(\./)?\.git/|\.lake/|node_modules/" | \
              grep -vE "ghcr-build-push\.yml|ghcr\.io/szl-holdings/(a11oy|killinchu)" | \
              grep -viE "verified|attested|attestation.*exists|attestation.*created|attestation.*uploaded" | \
              grep -viE "(a11oy|killinchu)\.slsa-provenance|szl-(a11oy|killinchu)|L2 on organ images|L2 on ORGAN IMAGES" | \
              grep -viE "bundle-level.*(not|NOT).*earned|no bundle-level" | \
              grep -viE "roadmap|future|planned|historical|archived|REJECTED|path to|not yet" | \
              grep -viE "not L2|no.*L2|L2.*not|banned|prohibited" | \
              grep -vE "$L2_BANNER_EXEMPT" | \
              sed -E 's#;base64,[A-Za-z0-9+/=]+##g' | \
              grep -E "SLSA.*L2|SLSA Level 2" \
              || true)
          if [ -n "$M3_L2_UNVERIFIED" ]; then
            echo "$M3_L2_UNVERIFIED" | head -10
            echo "::error::SLSA L2 claim without evidence — only a11oy/killinchu (the two shipping products) have verified L2 attestations. Add evidence reference or remove the claim."
            FAIL=1
          fi

          echo "=== Invariant 4: Section 889 = exactly 5 vendors ==="
          for f in $(find . -name "*889*.json" -type f 2>/dev/null | head -3); do
            CNT=$(jq -r '.vendors|length' "$f" 2>/dev/null || true)
            if [ -n "$CNT" ] && [ "$CNT" != "5" ]; then
              echo "  $f vendors=$CNT"
              echo "::error::Section 889 vendor count != 5 in $f"
              FAIL=1
            fi
          done

          echo "=== Invariant 5: No banned compliance positive claims ==="
          M5=$(grep -rE "Iron Bank|FedRAMP (High|Moderate)|CMMC L[2-5]|SWFT certified|Mission Owner" \
              --include="*.md" --include="*.json" --include="*.yaml" \
              --exclude-dir="vertical" \
              --exclude="defense*.yaml" --exclude="defense*.json" \
              --exclude="OPS_NOTES.md" \
              --exclude-dir="coordination" --exclude-dir="cursor-directives" --exclude-dir="replit-sync" --exclude-dir="corpus" \
              . 2>/dev/null | \
              grep -viE "out of scope|not pursuing|historical|archived|REJECTED|deprecated|proposed|roadmap" | \
              grep -viE "no iron bank|not.*iron bank|no fedramp|not.*fedramp|no cmmc|not.*cmmc|gap|vanilla|approved base|citation|NIST" | \
              grep -viE "not claimed|❌|not pursued|not held|no.*authorization" | \
              grep -vE "customer.*requirement|policy.*map|compliance.*map|does not|cannot|without" | \
              grep -viE "upstream|ecosystem|respective.*polic|their.*polic|contribute to" | \
              grep -vE "^(\./)?\.git/|\.lake/|node_modules/" \
              || true)
          if [ -n "$M5" ]; then
            echo "$M5" | head -10
            echo "::error::Banned compliance positive claim — must be absent or scoped"
            FAIL=1
          fi

          echo "=== Invariant 6: Per-file Dockerfile COPY ==="
          M6=$(grep -rE "^COPY \. \." --include="Dockerfile*" . 2>/dev/null || true)
          if [ -n "$M6" ]; then
            echo "$M6" | head -5
            echo "::error::COPY . . in Dockerfile — must be per-file COPY"
            FAIL=1
          fi

          echo "=== Invariant 7: kernel commit c7c0ba17 not bumped ==="
          # The CANONICAL locked kernel commit is c7c0ba17 and must not drift.
          # EXEMPT: per-snapshot/anchor kernel commits that legitimately record the
          # kernel sha AT THE TIME a receipt was anchored (Theorem-U snapshot,
          # conjecture-disclosure, locked-baseline anchors in szl-lake). These are
          # field names like snapshot_kernel_commit / kernel_commit_short, or any
          # kernel_commit line whose own text marks it SEPARATE/snapshot/anchor/NOT
          # part of the locked baseline. The canonical top-level lock is still enforced.
          M7=$(grep -rE "kernel_commit.*[0-9a-f]{8}" --include="*.json" --include="*.yaml" --include="*.md" . 2>/dev/null \
            | grep -vE "c7c0ba17|^(\./)?\.git/|\.lake/|node_modules/" \
            | grep -vE "kernel_commit_short|snapshot_kernel_commit|snapshot|anchor|SEPARATE|NOT part of the locked|theorem-u|conjecture-disclosure|locked-baseline" \
            | grep -vE "kernel_commit[\"': ]+[0-9a-f]{40}" || true)
          if [ -n "$M7" ]; then
            echo "$M7" | head -5
            echo "::error::Kernel commit drift — canonical locked commit must stay c7c0ba17 (per-snapshot anchor commits are exempt)"
            FAIL=1
          fi
          echo "  (canonical kernel commit c7c0ba17 stays LOCKED — process-enforced; per-snapshot anchor commits exempt)"

          echo "=== Invariant 8: No fake SBOM/signing/attestation claims ==="
          M8=$(grep -rE "SLSA L[23]|SBOM.*signed|attestation.*verified|sigstore.*verified" --include="*.md" --include="*.json" . 2>/dev/null | grep -vE "^(\./)?\.git/|node_modules/|honest|L1|pending|not yet" || true)
          if [ -n "$M8" ]; then
            echo "$M8" | head -5
            echo "::warning::Possible overclaim on SBOM/signing — verify it actually works before claiming"
          fi

          echo "=== Invariant 9: DSSE receipt format ==="
          for f in $(find . \( -name "*.dsse" -o -name "szl_receipt*.json" -o -name "dsse_*.json" -o -name "*_receipt.json" \) 2>/dev/null | grep -vE "context|schema|report" | head -3); do
            D=$(jq -e '.doctrine' "$f" 2>/dev/null | grep -v '"v11"' || true)
            if [ -n "$D" ]; then
              echo "  $f doctrine=$D"
              echo "::error::DSSE receipt missing doctrine: v11 in $f"
              FAIL=1
            fi
            L=$(jq -e '.lambda_uniqueness' "$f" 2>/dev/null | grep -vE "Conjecture|conjecture|NOT a theorem" || true)
            if [ -n "$L" ]; then
              echo "  $f lambda_uniqueness=$L"
              echo "::error::DSSE receipt missing Conjecture 1 in lambda_uniqueness in $f"
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo "::error::Doctrine check FAILED. See above for violations."
            exit 1
          fi
          echo "All 9 doctrine invariants satisfied."



