name: Anatomy-map public-surface drift watch (HF Space + a-11-oy.com)

# The single honest "SZL Anatomy" map ships on several independently-edited
# surfaces. The GitHub SOURCE surfaces (a11oy /console, killinchu /elite, and the
# szl-holdings/anatomy source deck) each wire the reusable push-time gate, so a
# GitHub-side edit to their anatomy block is validated IMMEDIATELY on push.
#
# The two PUBLIC-FACING renderings, however, deploy on their OWN pipelines and
# produce NO GitHub push when they change:
#   * the standalone HF static Space SZLHOLDINGS/anatomy (edited/deployed on HF), and
#   * the live public site a-11-oy.com/anatomy-map (serves its OWN built bundle
#     behind nginx/CDN, so it can go stale even when both repos agree).
# A divergence on either is otherwise only caught by the weekly cross-surface
# sweep -- up to a week of undetected drift on the public map.
#
# This watcher closes that latency gap. It runs the SAME checker + registry
# (scripts/anatomy_map_drift.py, scoped to the two public surfaces via --only)
# on a tight schedule, so a direct HF-side edit or a stale a-11-oy.com deploy that
# drops/relabels the locked-8 ladder {F1,F4,F7,F11,F12,F18,F19,F22} or the
# Λ = Conjecture 1 honesty label is caught within minutes, not a week.
# `repository_dispatch: hf-anatomy-edited` also lets a future HF org webhook
# trigger this instantly on a Space update. The weekly cross-surface sweep
# (anatomy-map-drift.yml) stays as the full a11oy/killinchu/source/HF backstop;
# this one watches only the public surfaces and is read-only (never commits).
#
# On real drift (exit 1) an ntfy alert is pushed through the team's shared relay
# (SLACK_WEBHOOK_URL -> a-11-oy.com/relay). A fetch failure is exit 2 (ERROR),
# never a silent pass -- coverage can't look clean when the check couldn't run
# (this deliberately also surfaces a public-site outage: the map being
# unreachable is itself an alignment problem worth paging on).

on:
  schedule:
    # Every ~5 min (GitHub's minimum granularity), offset off the top of the
    # 5-min mark to dodge scheduler congestion (GitHub cron is best-effort).
    # Worst-case detection latency <= ~5 min vs the weekly sweep. All anatomy
    # repos are PUBLIC, so Actions minutes are free -- tighter cadence costs nothing.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    # A future HF webhook (org -> repo dispatch) can fire this the moment the
    # Space is edited, for near-instant detection.
    types: [hf-anatomy-edited]
  push:
    branches: [main]
    paths:
      - ".github/scripts/anatomy_map_drift.py"
      - ".github/scripts/test_anatomy_map_drift.py"
      - ".github/data/anatomy_map_registry.json"
      - ".github/workflows/anatomy-map-hf-drift.yml"

permissions:
  contents: read

concurrency:
  group: anatomy-map-hf-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hf-drift:
    name: Public anatomy surfaces honest (HF Space + a-11-oy.com, locked-8 + Λ=Conjecture-1)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Self-test the drift guard (negative fixtures)
        # Proves the guard actually FAILS when a surface is mutated, so a future
        # weakening can't turn this into a silent always-green no-op.
        run: python3 .github/scripts/test_anatomy_map_drift.py

      - name: Check the public anatomy surfaces (HF Space + a-11-oy.com mirror)
        run: |
          set +e
          python3 .github/scripts/anatomy_map_drift.py \
            --only hf-anatomy,a11oy-anatomy-mirror \
            --report anatomy_map_hf_report.out.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: anatomy-map-hf-drift-report
          path: anatomy_map_hf_report.out.json
          if-no-files-found: ignore

      - name: Alert ntfy on public anatomy-map drift
        # Fires only when a public surface actually diverged (exit 1). Routed
        # through the shared relay so it renders in the team's ntfy app. No-ops
        # (with a warning) if the webhook secret is unset -- never masking the red job.
        if: env.CHECK_EXIT == '1'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set; skipping ntfy push (the red job is still the signal)."
            exit 0
          fi
          drift="$(python3 -c '
          import json
          r = json.load(open("anatomy_map_hf_report.out.json"))
          print(" | ".join(r.get("findings", [])) or "(see report)")
          ')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          text=":rotating_light: SZL anatomy-map DRIFT (public surface): the HF Space SZLHOLDINGS/anatomy and/or the live a-11-oy.com/anatomy-map diverged from the honest doctrine (locked-8 ladder {F1,F4,F7,F11,F12,F18,F19,F22} or Λ=Conjecture-1 label) via an out-of-band edit/deploy. ${drift} Run: ${run_url}"
          payload="$(python3 -c 'import json,sys; print(json.dumps({"text": sys.argv[1]}))' "$text")"
          code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" || echo 000)"
          echo "ntfy relay responded HTTP ${code}"
          [ "$code" = "200" ] || echo "::warning::ntfy relay returned ${code} (not 200); check the relay."

      - name: Fail if public anatomy-map drift or the check could not run
        run: |
          case "${CHECK_EXIT:-2}" in
            0)
              echo "✓ The public anatomy surfaces (HF Space + a-11-oy.com mirror) are honest: locked-8 ladder and Λ=Conjecture-1 label intact."
              ;;
            1)
              echo "::error::Public anatomy-map drift detected (HF Space and/or a-11-oy.com) --"
              echo "::error::see the step output and the uploaded"
              echo "::error::anatomy_map_hf_report.out.json artifact. Re-sync the"
              echo "::error::locked-8 ladder {F1,F4,F7,F11,F12,F18,F19,F22} and the"
              echo "::error::Λ=Conjecture-1 label on the diverged public surface"
              echo "::error::(HF Space data.js + index.html, and/or the a-11-oy.com"
              echo "::error::deploy) back to the honest doctrine."
              exit 1
              ;;
            *)
              echo "::error::Could not complete the public anatomy-map drift check"
              echo "::error::(a public surface failed to fetch -- HF Space or"
              echo "::error::a-11-oy.com unreachable). Failed (not passed) so coverage"
              echo "::error::can never look green when the check could not actually run;"
              echo "::error::a public surface being down is itself an alignment problem."
              exit 1
              ;;
          esac
