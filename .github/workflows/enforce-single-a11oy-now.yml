name: Enforce one canonical A11oy Space now

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/enforce-single-a11oy-now.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: enforce-single-a11oy-now
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      TARGET_BRANCH: fix/single-a11oy-canonical-final-20260722
      REVIEWED_REVISION: d11b55f24dc443bd7c44591cfc23d47e88ed363e
    steps:
      - name: Require owner-authorized GitHub token
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured.'
            exit 2
          }
      - name: Checkout current protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Rebuild exact canonical-only branch
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B "${TARGET_BRANCH}" origin/main
          git checkout "${REVIEWED_REVISION}" -- \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/hf-estate-upgrade.yml
          rm -f .github/workflows/estate-finalization.yml
          rm -f .github/workflows/restore-single-a11oy-canonical.yml
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_canonicalize.py
          ! grep -Fq '_create_missing_clone' .github/scripts/hf_estate_canonicalize.py
          ! grep -Fq 'update_repo_settings' .github/scripts/hf_estate_canonicalize.py
          ! grep -Fq 'clone-refresh' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'select-newest-a11oy-source' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'retire-a11oy-clone' .github/scripts/hf_estate_canonicalize.py
      - name: Commit and push exact branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          if git diff --cached --quiet; then
            echo 'Branch already contains the reviewed canonical-only implementation.'
          else
            git commit \
              -m 'fix(hf): keep only the newest canonical A11oy Space' \
              -m 'Select the newest valid canonical-or-clone content, copy only byte-different files into SZLHOLDINGS/a11oy, verify public Docker RUNNING parity, remove collection references, delete a11oy-clone-1..4, and permanently disable clone recreation.' \
              -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          fi
          git push --force-with-lease origin "HEAD:${TARGET_BRANCH}"
      - name: Open or refresh canonical-only pull request
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/body.md <<'EOF'
          ## Required outcome

          Keep exactly one governed Hugging Face A11oy Space: `SZLHOLDINGS/a11oy`.

          Before deleting anything, the reconciler inventories the canonical Space and `a11oy-clone-1..4`, selects the newest valid Docker revision by authenticated Hub metadata, copies only byte-different files into the canonical repository, waits for a public immutable `RUNNING` canonical revision, proves file-tree parity, removes clone references from every collection, deletes the four exact clones, and verifies absence.

          Permanent controls force `legacy.CLONE_IDS = []` and contain no clone creation, duplication, visibility-update, refresh, or collection-add path.

          Signed-off-by: Stephen Lutar <stephenlutar2@gmail.com>
          EOF
          existing="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "${TARGET_BRANCH}" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$GITHUB_REPOSITORY" --body-file /tmp/body.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "${TARGET_BRANCH}" \
              --title 'fix(hf): keep one canonical A11oy and delete every clone' \
              --body-file /tmp/body.md
          fi
