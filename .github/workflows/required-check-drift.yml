name: Required-check Drift (security-load-bearing merge blocks)

# Some status-check contexts are made REQUIRED on `main` so a red run genuinely
# BLOCKS merge. Two such merge blocks are watched here:
#   1. lockfile-registry (Task #308): the context
#        lockfiles / No lockfile references a Replit-internal registry host
#      on the six repos that commit lockfiles (a11oy, ouroboros, platform,
#      vsp-otel, szl-uds-deployment, docs-site).
#   2. overclaim-honesty (Task #393): the context
#        overclaim / Governed surfaces are honest (Theorem U citation rule)
#      on lutar-lean + szl-papers (classic protection on both).
# But "required" is just GitHub config — an admin can drop it, or a
# ruleset/classic-protection rewrite can silently remove it, and nothing would
# notice. The protection only matters if it stays in place.
#
# This job watches for that drift. For each wired repo it reads BOTH mechanisms
# GitHub unions together (ruleset `required_status_checks` + classic
# `branches/<default>/protection/required_status_checks`) and fails if the
# context is no longer required via either. On drift it also pushes a clean
# ntfy alert through the team's shared relay (SLACK_WEBHOOK_URL ->
# a-11-oy.com/relay -> a11oy-uptime-notify), the same channel the box uptime
# monitor uses, so the team is paged immediately rather than only seeing a red
# scheduled run.
#
# Rulesets + classic protection require repo-admin, so the built-in Actions
# GITHUB_TOKEN is NOT sufficient — the SZL_GITHUB_TOKEN PAT secret is used. A
# missing/insufficient token is reported as an ERROR (exit 2), never a silent
# pass, so a merge block can never look protected when the check could not run.

on:
  schedule:
    # Daily (06:19 UTC) — offset from the other org guards; this protection is
    # security-load-bearing so a weekly cadence is too slow to catch a removal.
    - cron: "19 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/scripts/required_check_drift.py"
      - ".github/data/required_check_config.json"
      - ".github/data/required_check_allowlist.json"
      - ".github/workflows/required-check-drift.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: required-check-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Required merge blocks still enforced on every wired repo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # only to commit the refreshed report in szl-holdings/.github
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Verify every required merge-block context is still required on its wired repos
        env:
          # repo-admin PAT preferred (the built-in token can't read rulesets /
          # classic protection on the other repos)
          SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 .github/scripts/required_check_drift.py \
            --config .github/data/required_check_config.json \
            --allowlist .github/data/required_check_allowlist.json \
            --report .github/data/required_check_report.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit refreshed report if changed
        # Best-effort: if main is protected (or the token can't push), this must
        # NOT mask the real signal. The drift gate below is the source of truth.
        continue-on-error: true
        if: github.repository == 'szl-holdings/.github' && github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- .github/data/required_check_report.json; then
            echo "Report unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "Stephen P. Lutar Jr."
          git config user.email "stephenlutar2@gmail.com"
          git add .github/data/required_check_report.json
          git commit -s -m "chore(security): refresh required-check drift report [skip ci]"
          git push

      - name: Alert ntfy on drift
        # Fires only when a repo actually lost a requirement (exit 1). Routed
        # through the shared relay so it renders cleanly in the team's ntfy app.
        # No-ops (with a warning) if the webhook secret is unset, never masking
        # the red job below.
        if: env.CHECK_EXIT == '1'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set; skipping ntfy push (the red job is still the signal)."
            exit 0
          fi
          drift="$(python3 -c '
          import json
          r = json.load(open(".github/data/required_check_report.json"))
          print("; ".join(r.get("errors", [])) or "(see report)")
          ')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          text=":rotating_light: Required merge-block DRIFT: a security-load-bearing required status check (lockfile-registry and/or overclaim-honesty) was removed from one or more repos. A bad change can now be merged past it. ${drift} Run: ${run_url}"
          payload="$(python3 -c 'import json,sys; print(json.dumps({"text": sys.argv[1]}))' "$text")"
          code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" || echo 000)"
          echo "ntfy relay responded HTTP ${code}"
          [ "$code" = "200" ] || echo "::warning::ntfy relay returned ${code} (not 200); check the relay."

      - name: Fail if drift or the check could not run
        run: |
          case "${CHECK_EXIT:-2}" in
            0)
              echo "✓ Every required merge-block context is still required on every wired repo."
              ;;
            1)
              echo "::error::Required-status-check DRIFT: at least one wired repo no"
              echo "::error::longer requires its security-load-bearing context (the"
              echo "::error::lockfile-registry and/or overclaim-honesty merge block) on"
              echo "::error::its default branch — a bad change can now be merged past it."
              echo "::error::See the step output and .github/data/required_check_report.json."
              echo "::error::Re-add it via the ruleset required_status_checks rule or"
              echo "::error::classic branches/<default>/protection/required_status_checks."
              exit 1
              ;;
            *)
              echo "::error::Could not complete the required-check drift watch"
              echo "::error::(auth/API failure). Rulesets + classic protection need a"
              echo "::error::repo-admin token — set the SZL_GITHUB_TOKEN secret. This is"
              echo "::error::failed (not passed) so a merge block can never look"
              echo "::error::protected when the check could not actually run."
              exit 1
              ;;
          esac
