name: Finalize Hugging Face release evidence now

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-hf-release-evidence-now.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: finalize-hf-release-evidence-now
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      REPORT_TITLE: "[hf-release-finalization-report] Lake viewer and kernel selfchecks"
    steps:
      - name: Require governed publishing credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured.'
            exit 2
          }
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo '::error::No supported Hugging Face organization write token is configured.'
            exit 2
          fi
      - name: Checkout current release controller
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/.github
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: controller
          fetch-depth: 0
      - name: Checkout merged Lake source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lake
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: lake
          fetch-depth: 0
      - name: Checkout merged energy-kernel source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-energy-attest
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: energy
          fetch-depth: 0
      - name: Checkout merged governed-norm source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lambda-gate
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: lambda-gate
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install pinned release clients and test dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "kernels==0.16.0" \
            "requests>=2.32,<3" \
            "pytest>=8,<9" \
            "pyarrow>=18,<24" \
            "PyYAML>=6,<7"
      - name: Verify source lineage and contracts
        shell: bash
        run: |
          set -euo pipefail
          git -C lake merge-base --is-ancestor 9c3819e3eb65af862aa0234db7e595c4e423932a HEAD
          git -C energy merge-base --is-ancestor 14c1d8fdbb19dbd69f4dfc365d7f74d515bc4bdb HEAD
          git -C lambda-gate merge-base --is-ancestor 8b95ca47571fda65a52b0b6189677ec089a6e503 HEAD
          python -m py_compile \
            controller/.github/scripts/hf_release_finalization.py \
            controller/.github/scripts/test_hf_release_finalization.py
          python controller/.github/scripts/test_hf_release_finalization.py
          python lake/scripts/test_hf_dataset_contract.py
          PYTHONPATH=energy python -m pytest -q energy/tests/test_hf_kernel_contract.py
          PYTHONPATH=lambda-gate/torch-ext:lambda-gate \
            python -m pytest -q lambda-gate/tests/test_hf_governed_norm_contract.py
      - name: Publish and independently read back exact Hub revisions
        id: release
        shell: bash
        run: |
          set +e
          lake_sha="$(git -C lake rev-parse HEAD)"
          energy_sha="$(git -C energy rev-parse HEAD)"
          lambda_sha="$(git -C lambda-gate rev-parse HEAD)"
          (
            cd controller
            SZL_LAKE_SHA="$lake_sha" \
            SZL_ENERGY_ATTEST_SHA="$energy_sha" \
            SZL_LAMBDA_GATE_SHA="$lambda_sha" \
            python .github/scripts/hf_release_finalization.py \
              --publish \
              --generation "${GITHUB_SHA}" \
              --lake-root ../lake \
              --energy-root ../energy \
              --lambda-root ../lambda-gate
          )
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Persist machine-readable report and remove one-shot executors
        if: always()
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          report=controller/reports/hf-release-finalization-latest.json
          test -f "$report"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo '<!-- szl-hf-release-finalization-report -->'
            echo '# Hugging Face release finalization'
            echo
            echo "- Run: ${run_url}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat "$report"
            echo '```'
          } > /tmp/report.md
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state all \
            --search "${REPORT_TITLE} in:title" --json number,title \
            --jq ".[] | select(.title == env.REPORT_TITLE) | .number" | head -n1)"
          if [ -n "$issue" ]; then
            gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --body-file /tmp/report.md
          else
            issue="$(gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_TITLE" --body-file /tmp/report.md --json number --jq .number)"
          fi
          if [ "${{ steps.release.outputs.exit_code }}" = "0" ]; then
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --reason completed \
              --comment 'Exact Lake viewer and both kernel readback/selfcheck verifications passed.' || true
          else
            gh issue reopen "$issue" --repo "$GITHUB_REPOSITORY" || true
          fi
          cd controller
          rm -f .github/workflows/finalize-hf-release-evidence-now.yml
          rm -f .github/workflows/execute-hf-finalizer-243.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/hf-release-finalization-latest.json \
            .github/workflows/finalize-hf-release-evidence-now.yml \
            .github/workflows/execute-hf-finalizer-243.yml
          if ! git diff --cached --quiet; then
            git commit \
              -m 'chore(hf): persist release evidence and remove one-shot executors' \
              -m "Run ${GITHUB_RUN_ID}; exit ${{ steps.release.outputs.exit_code }}." \
              -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
            git push origin HEAD:main
          fi
      - name: Enforce fail-closed publication result
        if: always()
        run: |
          code="${{ steps.release.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo '::error::HF release finalization failed; inspect the deterministic report issue.'
            exit "$code"
          fi
