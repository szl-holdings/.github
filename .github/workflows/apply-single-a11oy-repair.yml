name: Apply canonical-only A11oy repair

on:
  push:
    branches: [fix/remove-a11oy-clones]
    paths:
      - .github/workflows/apply-single-a11oy-repair.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-single-a11oy-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/remove-a11oy-clones
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
      - name: Apply deterministic repair
        run: python .github/scripts/apply_single_a11oy_repair.py
      - name: Validate canonical-only controls
        run: |
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_canonicalize.py
          git diff --check
          ! grep -R "Retain four\|creates/refreshes four" \
            .github/scripts/hf_estate_upgrade.py \
            .github/workflows/hf-estate-upgrade.yml
      - name: Commit repaired controls
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(hf): retain only canonical A11oy Space' \
            -m 'Delete the four exact historical clone repositories in publish mode and remove every automated clone-creation path.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/remove-a11oy-clones
