name: Reusable — Release Please

# Automates changelog generation and release-PR maintenance using
# conventional commits. The action keeps an open release-PR up-to-date with
# every conventional commit landed on main; merging the release-PR tags the
# release and creates a GitHub Release with notes.
#
# Releases produced here can be picked up by downstream workflows for
# Sigstore-signed artifact publishing, npm publish via OIDC, SBOM attachment,
# etc. — kept decoupled so each repo opts in to what it needs.
#
# NOTE: release-please-action v5 removed `package-name` input (deprecated).
# Use `path` for monorepo paths if needed; omit for single-package repos.

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release type (node, python, simple, go, ...).'
        required: false
        type: string
        default: 'node'
      target-branch:
        description: 'Branch release-please tracks (default main).'
        required: false
        type: string
        default: 'main'
      config-file:
        description: 'Path to a release-please-config.json (registers custom commit types so non-standard subjects like doctrine:/bundle:/compliance: do not crash the parser). Optional.'
        required: false
        type: string
        default: ''
      manifest-file:
        description: 'Path to a .release-please-manifest.json. Optional; pair with config-file.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # create release PRs and tags
      pull-requests: write  # update the release PR body
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.target-branch }}
          # When a config-file/manifest-file is supplied, release-please uses the
          # manifest-driven mode: custom commit types declared in changelog-sections
          # are parsed instead of crashing on non-standard subjects (the
          # "unexpected token" error seen on doctrine:/bundle:/compliance: and
          # double-scope chore(deps)(deps): commits).
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          # Note: `package-name` removed (deprecated in v5; not in valid inputs list)
          # GitHub Actions PR creation requires `Allow GitHub Actions to create PRs`
          # enabled in Settings → Actions → General.
