name: Reusable — Trivy filesystem scan

# Runs Trivy in filesystem mode against the checked-out tree. Catches
# vulnerable dependencies, exposed secrets, and misconfigured IaC files.

on:
  workflow_call:
    inputs:
      severity:
        description: 'Comma-separated severities that fail the build (UNKNOWN, LOW, MEDIUM, HIGH, CRITICAL)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      ignore-unfixed:
        description: 'Skip vulnerabilities with no upstream fix'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: '1'

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.30.10
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
