name: Reusable — Trivy filesystem scan

# Runs Trivy in filesystem mode against the checked-out tree. Catches
# vulnerable dependencies, exposed secrets, and misconfigured IaC files.

on:
  workflow_call:
    inputs:
      severity:
        description: 'Comma-separated severities that fail the build (UNKNOWN, LOW, MEDIUM, HIGH, CRITICAL)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      ignore-unfixed:
        description: 'Skip vulnerabilities with no upstream fix'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  scan:
    name: Trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: '1'

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
