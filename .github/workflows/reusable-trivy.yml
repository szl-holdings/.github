name: Reusable — Trivy filesystem scan

# Runs Trivy in filesystem mode against the checked-out tree. Catches
# vulnerable dependencies, exposed secrets, and misconfigured IaC files.

on:
  workflow_call:
    inputs:
      severity:
        description: 'Comma-separated severities that fail the build (UNKNOWN, LOW, MEDIUM, HIGH, CRITICAL)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      ignore-unfixed:
        description: 'Skip vulnerabilities with no upstream fix'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  scan:
    name: Trivy fs scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: '1'

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
