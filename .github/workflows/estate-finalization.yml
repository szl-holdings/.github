name: Finalize zero-review protections and canonical HF estate

on:
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/finalize_zero_review_protections.py
      - .github/scripts/test_finalize_zero_review_protections.py
      - .github/scripts/hf_estate_upgrade.py
      - .github/scripts/hf_estate_canonicalize.py
      - .github/workflows/estate-finalization.yml
  push:
    branches: [main]
    paths:
      - .github/scripts/finalize_zero_review_protections.py
      - .github/scripts/test_finalize_zero_review_protections.py
      - .github/scripts/hf_estate_upgrade.py
      - .github/scripts/hf_estate_canonicalize.py
      - .github/workflows/estate-finalization.yml
  workflow_dispatch:
    inputs:
      execute:
        description: Execute protection and Hugging Face finalization
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: estate-finalization
  cancel-in-progress: false

jobs:
  finalize:
    name: Verify and finalize estate controls
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Install pinned Hub client
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
      - name: Compile and test exact finalization contracts
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/finalize_zero_review_protections.py \
            .github/scripts/test_finalize_zero_review_protections.py \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py
          python .github/scripts/test_finalize_zero_review_protections.py
          python .github/scripts/test_hf_estate_canonicalize.py
          git diff --check
      - name: Determine execution mode
        id: mode
        run: |
          execute=false
          if [ "${GITHUB_EVENT_NAME}" = push ]; then
            execute=true
          elif [ "${GITHUB_EVENT_NAME}" = workflow_dispatch ] && [ "${{ inputs.execute }}" = true ]; then
            execute=true
          fi
          echo "execute=${execute}" >> "$GITHUB_OUTPUT"
      - name: Verify required credentials without exposing them
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || { echo '::error::SZL_GITHUB_TOKEN absent'; exit 2; }
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo '::error::No Hugging Face organization write credential is configured'
            exit 2
          fi
      - name: Finalize GitHub protection state
        id: protections
        shell: bash
        run: |
          set +e
          args=(--report protection-finalization-report.json)
          if [ "${{ steps.mode.outputs.execute }}" = true ]; then args+=(--execute); fi
          python .github/scripts/finalize_zero_review_protections.py "${args[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Canonicalize Hugging Face estate
        id: hf
        if: steps.protections.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          args=(--generation "${GITHUB_SHA}")
          if [ "${{ steps.mode.outputs.execute }}" = true ]; then args+=(--publish); fi
          python .github/scripts/hf_estate_canonicalize.py "${args[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload immutable evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: estate-finalization-${{ github.run_id }}
          path: |
            protection-finalization-report.json
            reports/hf-estate-upgrade-latest.json
          if-no-files-found: error
          retention-days: 90
      - name: Persist execution receipts in GitHub issues
        if: always() && steps.mode.outputs.execute == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for spec in \
            "[protection-finalization-report] zero-review controls|protection-finalization-report.json" \
            "[hf-canonicalization-report] single A11oy Space|reports/hf-estate-upgrade-latest.json"; do
            title="${spec%%|*}"
            file="${spec#*|}"
            test -f "$file"
            {
              echo '<!-- szl-estate-finalization-report -->'
              echo "# ${title}"
              echo
              echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "- Source revision: \`${GITHUB_SHA}\`"
              echo
              echo '```json'
              cat "$file"
              echo '```'
            } > /tmp/report.md
            issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n1)"
            if [ -n "$issue" ]; then
              gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --body-file /tmp/report.md
            else
              gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file /tmp/report.md
            fi
          done
      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Estate finalization'
            echo
            for file in protection-finalization-report.json reports/hf-estate-upgrade-latest.json; do
              echo "### ${file}"
              if [ -f "$file" ]; then
                echo '```json'
                cat "$file"
                echo '```'
              else
                echo 'Missing.'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce fail-closed result
        if: always()
        run: |
          protection_code="${{ steps.protections.outputs.exit_code }}"
          hf_code="${{ steps.hf.outputs.exit_code }}"
          if [ -z "$protection_code" ]; then protection_code=2; fi
          if [ -z "$hf_code" ]; then hf_code=2; fi
          if [ "$protection_code" -ne 0 ] || [ "$hf_code" -ne 0 ]; then
            echo "::error::Estate finalization failed: protections=${protection_code}, hf=${hf_code}"
            exit 1
          fi
          echo 'Estate finalization completed successfully.'
