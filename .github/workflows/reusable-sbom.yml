name: Reusable — SBOM (CycloneDX + SPDX)

# Generates a Software Bill of Materials for the caller repo using Anchore's
# Syft via the sbom-action. Produces both CycloneDX JSON (industry standard,
# investor-friendly) and SPDX (GitHub-native). Uploads as build artifact and,
# on tagged releases, attaches to the GitHub Release.
#
# Required by CIS Software Supply Chain Benchmark 2.4.4 and increasingly by
# enterprise procurement (Series A diligence checklist item).

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory to scan (default repo root).'
        required: false
        type: string
        default: '.'
      attach-to-release:
        description: 'Attach SBOM to GitHub Release when tag pushed (default true).'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # only used when attach-to-release runs on a tag push
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.working-directory }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: ${{ inputs.attach-to-release && startsWith(github.ref, 'refs/tags/') }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.working-directory }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: ${{ inputs.attach-to-release && startsWith(github.ref, 'refs/tags/') }}

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.working-directory }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'   # report-only; Dependabot handles blocking on PRs
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
