name: Reusable — SBOM (CycloneDX + SPDX)

# Generates a Software Bill of Materials for the caller repo using Anchore's
# Syft via the sbom-action. Produces both CycloneDX JSON (industry standard,
# investor-friendly) and SPDX (GitHub-native). Uploads as build artifact and,
# on tagged releases, attaches to the GitHub Release.
#
# Required by CIS Software Supply Chain Benchmark 2.4.4 and increasingly by
# enterprise procurement (Series A diligence checklist item).

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory to scan (default repo root).'
        required: false
        type: string
        default: '.'
      attach-to-release:
        description: 'Attach SBOM to GitHub Release when tag pushed (default true).'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # only used when attach-to-release runs on a tag push
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.working-directory }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: ${{ inputs.attach-to-release && startsWith(github.ref, 'refs/tags/') }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.working-directory }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: ${{ inputs.attach-to-release && startsWith(github.ref, 'refs/tags/') }}

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.working-directory }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'   # report-only; Dependabot handles blocking on PRs
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
