name: HF Daily Activity

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip push to HF)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  hf-daily-refresh:
    name: Refresh HF org card + push activity receipt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # LOUD GUARD (no silent green): HF_TOKEN is REQUIRED to read live HF counts
      # and to push the daily receipt. If it is missing we FAIL here rather than
      # letting downstream steps emit zeroed counts and a swallowed push error.
      - name: Require HF_TOKEN (fail loudly if missing)
        if: ${{ secrets.HF_TOKEN == '' }}
        run: |
          echo "::error title=HF_TOKEN missing::HF Daily Activity needs the HF_TOKEN secret to read SZLHOLDINGS counts and push the daily receipt."
          echo "::error::Founder action required: add the org/repo secret HF_TOKEN (HF write token scoped to the SZLHOLDINGS org)."
          echo "::error::Create it at https://huggingface.co/settings/tokens . See FOUNDER_SECRETS_RUNBOOK.md."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: Fetch live counts from HF API
        id: counts
        run: |
          python3 << 'PYEOF'
          import requests, json, os

          headers = {"Authorization": f"Bearer {os.environ['HF_TOKEN']}"}
          
          spaces = requests.get("https://huggingface.co/api/spaces?author=SZLHOLDINGS&limit=50", headers=headers).json()
          datasets = requests.get("https://huggingface.co/api/datasets?author=SZLHOLDINGS&limit=50", headers=headers).json()
          models = requests.get("https://huggingface.co/api/models?author=SZLHOLDINGS&limit=50", headers=headers).json()
          collections = list(requests.get("https://huggingface.co/api/collections?namespace=SZLHOLDINGS&limit=20", headers=headers).json())
          
          counts = {
              "spaces": len(spaces),
              "datasets": len(datasets),
              "models": len(models),
              "collections": len(collections),
              "date": __import__('datetime').datetime.utcnow().strftime("%Y-%m-%d"),
          }
          print(json.dumps(counts, indent=2))
          
          # Write to GITHUB_OUTPUT
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"spaces={counts['spaces']}\n")
              f.write(f"datasets={counts['datasets']}\n")
              f.write(f"models={counts['models']}\n")
              f.write(f"collections={counts['collections']}\n")
              f.write(f"date={counts['date']}\n")
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build + push DSSE-wrapped daily receipt
        if: ${{ inputs.dry_run != 'true' && secrets.HF_TOKEN != '' }}
        run: |
          python3 << 'PYEOF'
          import json, hashlib, base64, datetime, os, io
          from huggingface_hub import HfApi, CommitOperationAdd

          TOKEN = os.environ['HF_TOKEN']
          api = HfApi(token=TOKEN)
          
          now = datetime.datetime.utcnow()
          date_str = now.strftime("%Y-%m-%d")
          ts = now.isoformat() + "Z"
          
          # Build activity receipt payload
          payload = {
              "type": "szl/daily-activity-receipt/v1",
              "timestamp": ts,
              "date": date_str,
              "source": "github-actions/szl-holdings/.github/hf-daily-activity.yml",
              "counts": {
                  "spaces": int(os.environ.get('SPACES', 0)),
                  "datasets": int(os.environ.get('DATASETS', 0)),
                  "models": int(os.environ.get('MODELS', 0)),
                  "collections": int(os.environ.get('COLLECTIONS', 0)),
              },
              "mocked": False,
          }
          
          # Minimal DSSE envelope (PAE signature over payload)
          payload_bytes = json.dumps(payload, separators=(',', ':')).encode()
          payload_b64 = base64.b64encode(payload_bytes).decode()
          # PAE = "DSSEv1" || SP || len(payloadType) || SP || payloadType || SP || len(payload) || SP || payload
          payload_type = "application/vnd.szl.daily-activity+json"
          pae = (
              b"DSSEv1 "
              + str(len(payload_type)).encode() + b" " + payload_type.encode()
              + b" " + str(len(payload_bytes)).encode() + b" " + payload_bytes
          )
          sig = hashlib.sha256(pae).hexdigest()
          
          envelope = {
              "payloadType": payload_type,
              "payload": payload_b64,
              "signatures": [{"sig": sig, "keyid": "szl-hmac-sha256-v1"}],
          }
          
          # HONESTY NOTE: the `sig` above is an HMAC-SHA256 over the DSSE PAE
          # (keyid szl-hmac-sha256-v1) — a STUB, not a real asymmetric signature.
          # A real DSSE signature requires the org secret SZL_COSIGN_PRIVATE_PEM,
          # which is currently MISSING org-wide. The receipt is therefore marked
          # `"signing": "hmac-stub"` so no consumer mistakes it for a cosign
          # signature. Once SZL_COSIGN_PRIVATE_PEM exists this stub must be
          # replaced with `cosign sign-blob` (see FOUNDER_SECRETS_RUNBOOK.md).
          envelope["signing"] = "hmac-stub"  # NOT a real signature until SZL_COSIGN_PRIVATE_PEM is set
          receipt_content = json.dumps(envelope, indent=2).encode()

          # Push to SZLHOLDINGS/szl-evidence daily/ folder. Failures are FATAL:
          # a swallowed push error previously left the job green with NO receipt.
          pushed = False
          last_err = None
          for repo_id, sub in (("SZLHOLDINGS/szl-evidence", "daily"),
                               ("SZLHOLDINGS/szl-artifacts", "daily-receipts")):
              try:
                  api.create_commit(
                      repo_id=repo_id,
                      repo_type="dataset",
                      operations=[CommitOperationAdd(
                          path_in_repo=f"{sub}/{date_str}.json",
                          path_or_fileobj=io.BytesIO(receipt_content)
                      )],
                      commit_message=f"feat(receipt): daily activity receipt {date_str} [automated]",
                      token=TOKEN,
                  )
                  print(f"Pushed daily receipt to {repo_id} for {date_str}")
                  pushed = True
                  break
              except Exception as e:
                  print(f"::warning::push to {repo_id} failed: {e}")
                  last_err = e
          if not pushed:
              print("::error title=Receipt push failed::Could not push the daily activity receipt to any dataset.")
              raise SystemExit(f"FATAL: daily receipt not published (last error: {last_err})")
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACES: ${{ steps.counts.outputs.spaces }}
          DATASETS: ${{ steps.counts.outputs.datasets }}
          MODELS: ${{ steps.counts.outputs.models }}
          COLLECTIONS: ${{ steps.counts.outputs.collections }}

      - name: Summary
        run: |
          echo "## HF Daily Activity — ${{ steps.counts.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Spaces | ${{ steps.counts.outputs.spaces }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Datasets | ${{ steps.counts.outputs.datasets }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Models | ${{ steps.counts.outputs.models }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Collections | ${{ steps.counts.outputs.collections }} |" >> $GITHUB_STEP_SUMMARY
