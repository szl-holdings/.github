name: Repair singleton source authority to protected HEAD

on:
  push:
    branches: [fix/hf-singleton-verifier-v3-20260722]
    paths:
      - .github/workflows/repair-singleton-source-head.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact verifier branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: fix/hf-singleton-verifier-v3-20260722
          fetch-depth: 0

      - name: Bind verifier to exact protected main HEAD
        shell: python
        run: |
          from pathlib import Path

          path = Path('.github/workflows/hf-estate-upgrade.yml')
          text = path.read_text(encoding='utf-8')
          old = '''      - name: Bind latest deploy-triggering A11oy revision
        id: source
        shell: bash
        run: |
          set -euo pipefail
          expected="$(git -C a11oy-source log -1 --format=%H -- \\
            Dockerfile serve.py \\
            ':(glob)**/*.py' \\
            console pages web static static-vendor numerics src schemas corpus model_release \\
            ':(glob)*.html' knowledge.json README.md .github/workflows/hf-sync.yml)"
          if ! [[ "$expected" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not derive exact deploy-triggering A11oy source revision."
            exit 2
          fi
          echo "sha=$expected" >> "$GITHUB_OUTPUT"
          echo "A11OY_EXPECTED_GITHUB_SHA=$expected" >> "$GITHUB_ENV"
          echo "Expected protected A11oy source: `{$expected}`" >> "$GITHUB_STEP_SUMMARY"
'''
          # The brace spelling in the checked-in echo is normal shell `$expected`,
          # so use a narrower exact prefix/suffix replacement below.
          start = text.index('      - name: Bind latest deploy-triggering A11oy revision\n')
          end = text.index('\n      - name: Determine execution mode\n', start)
          new = '''      - name: Bind exact protected A11oy main revision
        id: source
        shell: bash
        run: |
          set -euo pipefail
          expected="$(git -C a11oy-source rev-parse HEAD)"
          if ! [[ "$expected" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve exact protected A11oy main revision."
            exit 2
          fi
          echo "sha=$expected" >> "$GITHUB_OUTPUT"
          echo "A11OY_EXPECTED_GITHUB_SHA=$expected" >> "$GITHUB_ENV"
          echo "Expected protected A11oy main: `$expected`" >> "$GITHUB_STEP_SUMMARY"
'''
          text = text[:start] + new + text[end:]
          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Verify workflow and contract tests
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
          python -m py_compile \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py
          python .github/scripts/test_hf_a11oy_singleton_verify.py
          grep -F 'expected="$(git -C a11oy-source rev-parse HEAD)"' \
            .github/workflows/hf-estate-upgrade.yml
          git diff --check

      - name: Commit repair and remove bootstrap
        run: |
          set -euo pipefail
          rm .github/workflows/repair-singleton-source-head.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/workflows/hf-estate-upgrade.yml \
            .github/workflows/repair-singleton-source-head.yml
          git commit \
            -s \
            -m 'fix(hf): bind singleton proof to protected main HEAD' \
            -m 'Require build identity and byte parity against the exact current protected a11oy/main revision rather than a historical path-filtered commit.'
          git push origin HEAD:fix/hf-singleton-verifier-v3-20260722
