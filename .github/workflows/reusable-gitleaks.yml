name: Reusable — Gitleaks

# Secondary secret-detection layer in CI. GitHub's native push-protection
# blocks pushes containing known patterns; gitleaks catches everything else
# (entropy-based, custom org patterns, historical commits on PR branches).

on:
  workflow_call:
    inputs:
      fail-on-leak:
        description: 'Fail the build if any leak is found (default true).'
        required: false
        type: boolean
        default: true
      config-path:
        description: 'Path to .gitleaks.toml in the caller repo (optional).'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Gitleaks needs depth>1 to scan PR commits. fetch-depth=0 gets all.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_CONFIG: ${{ inputs.config-path }}
        continue-on-error: ${{ !inputs.fail-on-leak }}
