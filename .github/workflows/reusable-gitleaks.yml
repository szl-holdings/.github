name: Reusable — Gitleaks

# Secondary secret-detection layer in CI. GitHub's native push-protection
# blocks pushes containing known patterns; gitleaks catches everything else
# (entropy-based, custom org patterns, historical commits on PR branches).

on:
  workflow_call:
    inputs:
      fail-on-leak:
        description: 'Fail the build if any leak is found (default true).'
        required: false
        type: boolean
        default: true
      config-path:
        description: 'Path to .gitleaks.toml in the caller repo (optional).'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Gitleaks needs depth>1 to scan PR commits. fetch-depth=0 gets all.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_CONFIG: ${{ inputs.config-path }}
        continue-on-error: ${{ !inputs.fail-on-leak }}
