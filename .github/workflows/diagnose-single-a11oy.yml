name: Diagnose canonical-only A11oy cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-single-a11oy.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: '1'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/remove-a11oy-clones
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
      - name: Run dry diagnostic
        id: run
        shell: bash
        run: |
          set +e
          rm -f reports/hf-estate-upgrade-latest.json
          mkdir -p reports
          python .github/scripts/hf_estate_canonicalize.py \
            --generation "${GITHUB_SHA}" \
            2>&1 | tee reports/hf-estate-canonical-only.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload exact diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-canonical-only-diagnostic-${{ github.run_id }}
          path: |
            reports/hf-estate-canonical-only.log
            reports/hf-estate-upgrade-latest.json
          if-no-files-found: warn
          retention-days: 7
      - name: Surface exit code
        if: always()
        run: |
          echo "diagnostic exit=${{ steps.run.outputs.exit_code }}"
          test "${{ steps.run.outputs.exit_code }}" = '0'
