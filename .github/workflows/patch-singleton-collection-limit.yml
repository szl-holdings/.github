name: Patch singleton Collections pagination edge

on:
  push:
    branches: [fix/hf-singleton-verifier-v3-20260722]
    paths:
      - .github/workflows/patch-singleton-collection-limit.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/hf-singleton-verifier-v3-20260722
          fetch-depth: 0
      - name: Apply bounded Collections listing and verify
        shell: python
        run: |
          from pathlib import Path
          path = Path('.github/scripts/hf_a11oy_singleton_verify.py')
          text = path.read_text(encoding='utf-8')
          old = 'self.api.list_collections(owner=ORG, limit=100)'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'expected two Collections calls, found {count}')
          path.write_text(text.replace(old, 'self.api.list_collections(owner=ORG, limit=99)'), encoding='utf-8', newline='\n')
      - name: Run focused contracts
        run: |
          python -m pip install --disable-pip-version-check --quiet \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
          python -m py_compile \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py
          python .github/scripts/test_hf_a11oy_singleton_verify.py
          git diff --check
      - name: Commit repair and self-remove
        run: |
          set -euo pipefail
          rm .github/workflows/patch-singleton-collection-limit.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit \
            -m 'fix(hf): bound singleton Collections pagination below API edge' \
            -m 'Use a 99-item bounded listing for both collection inventory and stale-reference cleanup, avoiding the Hub limit=100 validation edge while retaining full readback of the current eight-collection estate.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/hf-singleton-verifier-v3-20260722
