name: Pin Check (reusable)

# Reusable SHA-pin enforcement. Called by a thin caller in every org repo so that
# EVERY repo's workflow files are validated, not just this one. Converted from
# .github/workflows/pin-check.yml (identical 40-char-SHA logic) per
# replit-sync/FORGE_UPGRADE_pincheck-orgwide.md. This closes the gap where the
# original check only ran inside the .github repo and never validated other repos.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: All actions SHA-pinned
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout caller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: caller

      - name: Checkout exact reusable-workflow revision (shared validator)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: tools

      - name: Verify SHA-pins
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW_DIR="caller/.github/workflows"
          VIOLATIONS=$(mktemp)
          for file in "$WORKFLOW_DIR"/*.yml "$WORKFLOW_DIR"/*.yaml; do
            [ -f "$file" ] || continue
            while IFS= read -r line; do
              ref=$(echo "$line" | sed -n 's/.*uses:[[:space:]]*\([^[:space:]#]*\).*/\1/p')
              [ -z "$ref" ] && continue
              [[ "$ref" == ./* ]] && continue
              # Org reusable-workflow calls are validated by the next step.
              [[ "$ref" == szl-holdings/* ]] && continue
              after_at="${ref##*@}"
              if ! echo "$after_at" | grep -qE '^[0-9a-f]{40}$'; then
                echo "::error file=$file::Unpinned action — $ref" | tee -a "$VIOLATIONS"
              fi
            done < <(grep -E '^\s*(-\s+)?uses:\s+\S' "$file" | grep -v '^\s*#')
          done
          if [ -s "$VIOLATIONS" ]; then
            echo ""
            echo "Pin every action to a 40-char SHA. Add '# v1.2.3' as a trailing comment."
            exit 1
          fi
          echo "✓ All action refs are SHA-pinned."

      - name: Verify reusable-workflow targets at pinned SHAs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 tools/.github/scripts/reusable_workflow_target_check.py
          --workflow-dir caller/.github/workflows
