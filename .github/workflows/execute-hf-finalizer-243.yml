name: Execute exact HF release finalizer 243

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/execute-hf-finalizer-243.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: execute-hf-release-finalizer-243
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      CONTROLLER_SHA: e2bb99c603997a7e8aac41af42fd5792be6ca721
      CONTROLLER_PR: "243"
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    steps:
      - name: Require owner-authorized release credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo "::error::SZL_GITHUB_TOKEN is not configured."
            exit 2
          }
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::No supported Hugging Face organization write token is configured."
            exit 2
          fi

      - name: Checkout current protected organization main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: mainrepo
          fetch-depth: 0

      - name: Verify exact reviewed controller identity and scope
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          actual="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${CONTROLLER_PR}" --jq .head.sha)"
          test "$actual" = "$CONTROLLER_SHA" || {
            echo "::error::PR #${CONTROLLER_PR} head moved: expected ${CONTROLLER_SHA}, observed ${actual}"
            exit 1
          }
          mapfile -t files < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${CONTROLLER_PR}/files?per_page=100" \
              --jq '.[].filename' | sort
          )
          expected=(
            ".github/scripts/hf_release_finalization.py"
            ".github/scripts/test_hf_release_finalization.py"
            ".github/workflows/hf-release-finalization.yml"
          )
          test "${#files[@]}" = "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${files[$index]}" = "${expected[$index]}" || {
              printf '::error::Unexpected controller scope at index %s: expected %s observed %s\n' \
                "$index" "${expected[$index]}" "${files[$index]}"
              exit 1
            }
          done

      - name: Checkout exact reviewed controller
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/.github
          ref: ${{ env.CONTROLLER_SHA }}
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: controller
          fetch-depth: 1

      - name: Checkout merged Lake source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lake
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: lake
          fetch-depth: 0

      - name: Checkout merged energy-kernel source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-energy-attest
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: energy
          fetch-depth: 0

      - name: Checkout merged governed-norm source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/szl-lambda-gate
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          path: lambda-gate
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install pinned release clients and test dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "kernels==0.16.0" \
            "requests>=2.32,<3" \
            "pytest>=8,<9" \
            "pyarrow>=18,<24" \
            "PyYAML>=6,<7"

      - name: Execute source verification and authenticated publication
        id: release
        shell: bash
        run: |
          set +e
          phase="source-lineage"
          code=0
          lake_sha="$(git -C lake rev-parse HEAD)"
          energy_sha="$(git -C energy rev-parse HEAD)"
          lambda_sha="$(git -C lambda-gate rev-parse HEAD)"

          git -C lake merge-base --is-ancestor 9c3819e3eb65af862aa0234db7e595c4e423932a HEAD || code=$?
          if [ "$code" -eq 0 ]; then git -C energy merge-base --is-ancestor 14c1d8fdbb19dbd69f4dfc365d7f74d515bc4bdb HEAD || code=$?; fi
          if [ "$code" -eq 0 ]; then git -C lambda-gate merge-base --is-ancestor 8b95ca47571fda65a52b0b6189677ec089a6e503 HEAD || code=$?; fi

          if [ "$code" -eq 0 ]; then
            phase="controller-contract"
            (cd controller && python -m py_compile \
              .github/scripts/hf_release_finalization.py \
              .github/scripts/test_hf_release_finalization.py \
              && python .github/scripts/test_hf_release_finalization.py) || code=$?
          fi

          if [ "$code" -eq 0 ]; then
            phase="lake-contract"
            python lake/scripts/test_hf_dataset_contract.py || code=$?
          fi
          if [ "$code" -eq 0 ]; then
            phase="energy-kernel-contract"
            PYTHONPATH=energy python -m pytest -q energy/tests/test_hf_kernel_contract.py || code=$?
          fi
          if [ "$code" -eq 0 ]; then
            phase="lambda-kernel-contract"
            PYTHONPATH=lambda-gate/torch-ext:lambda-gate \
              python -m pytest -q lambda-gate/tests/test_hf_governed_norm_contract.py || code=$?
          fi

          if [ "$code" -eq 0 ]; then
            phase="hub-publication"
            (
              cd controller
              SZL_LAKE_SHA="$lake_sha" \
              SZL_ENERGY_ATTEST_SHA="$energy_sha" \
              SZL_LAMBDA_GATE_SHA="$lambda_sha" \
              python .github/scripts/hf_release_finalization.py \
                --publish \
                --generation "$CONTROLLER_SHA" \
                --lake-root ../lake \
                --energy-root ../energy \
                --lambda-root ../lambda-gate
            ) || code=$?
          fi

          if [ ! -f controller/reports/hf-release-finalization-latest.json ]; then
            mkdir -p controller/reports
            PHASE="$phase" CODE="$code" LAKE_SHA="$lake_sha" ENERGY_SHA="$energy_sha" LAMBDA_SHA="$lambda_sha" \
              python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          report = {
              "schema": "szl.hf-release-finalization/v1",
              "generation": os.environ["CONTROLLER_SHA"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "publish": True,
              "fatal_phase": os.environ["PHASE"],
              "exit_code": int(os.environ["CODE"]),
              "sources": {
                  "szl_lake": os.environ["LAKE_SHA"],
                  "szl_energy_attest": os.environ["ENERGY_SHA"],
                  "szl_lambda_gate": os.environ["LAMBDA_SHA"],
              },
              "summary": {"ok": 0, "warning": 0, "error": 1, "dry_run": 0},
          }
          Path("controller/reports/hf-release-finalization-latest.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          fi

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "phase=$phase" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable execution evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-release-finalization-controller-${{ env.CONTROLLER_SHA }}
          path: controller/reports/hf-release-finalization-latest.json
          if-no-files-found: error
          retention-days: 90

      - name: Persist report on protected main and self-remove
        if: always()
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -f controller/reports/hf-release-finalization-latest.json
          mkdir -p mainrepo/reports
          cp controller/reports/hf-release-finalization-latest.json \
            mainrepo/reports/hf-release-finalization-latest.json
          rm -f mainrepo/.github/workflows/execute-hf-finalizer-243.yml
          cd mainrepo
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/hf-release-finalization-latest.json \
            .github/workflows/execute-hf-finalizer-243.yml
          if ! git diff --cached --quiet; then
            git commit \
              -m 'chore(hf): record exact release finalization and remove executor' \
              -m "Controller: ${CONTROLLER_SHA}; execution phase: ${{ steps.release.outputs.phase }}; exit: ${{ steps.release.outputs.exit_code }}" \
              -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
            git push origin HEAD:main
          fi

          summary="$(python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('reports/hf-release-finalization-latest.json').read_text())
          print(json.dumps(report.get('summary', {}), sort_keys=True))
          PY
          )"
          gh pr comment "$CONTROLLER_PR" --repo "$GITHUB_REPOSITORY" \
            --body "Trusted protected-main execution completed for exact controller \`${CONTROLLER_SHA}\`. Phase: \`${{ steps.release.outputs.phase }}\`; exit: \`${{ steps.release.outputs.exit_code }}\`; summary: \`${summary}\`. The machine-readable report is committed at \`reports/hf-release-finalization-latest.json\` and retained as an Actions artifact."

      - name: Enforce fail-closed release outcome
        if: always()
        shell: bash
        run: |
          code="${{ steps.release.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Exact Hub release finalization failed in phase ${{ steps.release.outputs.phase }}; inspect the committed report."
            exit "$code"
          fi
