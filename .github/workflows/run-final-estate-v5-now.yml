name: Run Final Estate Reconciliation v5 Now

on:
  push:
    branches: [ops/run-final-estate-v5-20260722]
    paths:
      - .github/workflows/run-final-estate-v5-now.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: run-final-estate-v5-now
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ github.token }}
  GH_TOKEN: ${{ github.token }}
  REPORT_PATH: reports/final-estate-reconciliation-v5-now.json

jobs:
  reconcile:
    name: Wait for immutable deployment, then enforce every active-estate gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout permanent reconciler from protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install exact verifier dependency
        run: python -m pip install --disable-pip-version-check 'requests==2.32.5'

      - name: Compile and test the permanent v5 contracts
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/final_estate_reconciliation_v5.py \
            .github/scripts/final_estate_v5_core.py \
            .github/scripts/final_estate_v5_evidence.py \
            .github/scripts/final_estate_v5_probes.py \
            .github/scripts/test_final_estate_v5_evidence.py \
            .github/scripts/test_final_estate_v5_probes.py
          python .github/scripts/test_final_estate_v5_evidence.py
          python .github/scripts/test_final_estate_v5_probes.py
          git diff --check

      - name: Wait for protected-main A11oy deployment and all gates to converge
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          operational=false
          for attempt in $(seq 1 60); do
            python .github/scripts/final_estate_reconciliation_v5.py \
              --output "$REPORT_PATH"
            operational="$(python - <<'PY'
          import json, os
          with open(os.environ['REPORT_PATH'], encoding='utf-8') as handle:
              print(str(bool(json.load(handle).get('operational_verified'))).lower())
          PY
            )"
            if [ "$operational" = true ]; then
              echo "All active-estate gates converged on attempt ${attempt}."
              break
            fi
            echo "Attempt ${attempt}: estate not yet terminal; preserving fail-closed state."
            sleep 20
          done
          if [ "$operational" != true ]; then
            echo '::error::The active estate did not converge within the bounded verification window.'
            cat "$REPORT_PATH"
            exit 1
          fi

      - name: Publish and enforce the single terminal evidence run
        run: |
          set -euo pipefail
          python .github/scripts/final_estate_reconciliation_v5.py \
            --output "$REPORT_PATH" \
            --publish-issue \
            --enforce

      - name: Upload immutable terminal evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: final-estate-reconciliation-v5-now-${{ github.run_id }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: error
          retention-days: 90

  cleanup:
    name: Remove one-shot terminal runner
    needs: reconcile
    if: needs.reconcile.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout trigger branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/run-final-estate-v5-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Self-remove after OPERATIONAL_VERIFIED evidence
        run: |
          set -euo pipefail
          git rm .github/workflows/run-final-estate-v5-now.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): remove completed terminal estate runner' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/run-final-estate-v5-20260722
