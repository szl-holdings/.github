name: Merge HF official inventory after checks

on:
  push:
    branches: [hf/estate-official-api-v2]
    paths:
      - .github/workflows/merge-hf-estate-official-api-v2.yml

permissions:
  contents: read

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      TARGET_BRANCH: hf/estate-official-api-v2
    steps:
      - name: Require owner-authorized token
        run: |
          test -n "${GH_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured.'
            exit 2
          }
      - name: Checkout exact branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ env.GH_TOKEN }}
          fetch-depth: 0
      - name: Remove one-shot merge lane
        run: |
          set -euo pipefail
          rm .github/workflows/merge-hf-estate-official-api-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/merge-hf-estate-official-api-v2.yml
          git commit \
            -m 'chore(hf): remove completed official-inventory merge lane' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:${TARGET_BRANCH}
      - name: Resolve exact pull request
        id: pr
        run: |
          set -euo pipefail
          number="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$TARGET_BRANCH" --json number --jq '.[0].number // empty')"
          test -n "$number" || {
            echo '::error::No open PR for official inventory branch.'
            exit 1
          }
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Wait for protected checks
        run: |
          gh pr checks '${{ steps.pr.outputs.number }}' \
            --repo "$GITHUB_REPOSITORY" \
            --watch \
            --interval 20 \
            --fail-fast
      - name: Merge exact green head
        run: |
          gh pr merge '${{ steps.pr.outputs.number }}' \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --match-head-commit '${{ steps.pr.outputs.head }}'
