name: Install permanent singleton verifier

on:
  push:
    branches:
      - fix/hf-singleton-verifier-20260722
    paths:
      - .github/workflows/install-singleton-verifier.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: fix/hf-singleton-verifier-20260722
          fetch-depth: 0
      - name: Install standalone verifier and remove clone-capable publishers
        shell: bash
        env:
          VERIFIER_GZ_B64: ''
          TEST_GZ_B64: ''
          WORKFLOW_GZ_B64: ''
        run: |
          set -euo pipefail
          printf '%s' "${VERIFIER_GZ_B64}" | base64 -d | gzip -d > .github/scripts/hf_a11oy_singleton_verify.py
          printf '%s' "${TEST_GZ_B64}" | base64 -d | gzip -d > .github/scripts/test_hf_a11oy_singleton_verify.py
          printf '%s' "${WORKFLOW_GZ_B64}" | base64 -d | gzip -d > .github/workflows/hf-estate-upgrade.yml
          rm -f \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/install-singleton-verifier.yml
      - name: Verify installed controller
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            'huggingface_hub>=1.3,<2' 'requests>=2.32,<3'
          python -m py_compile \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py \
            .github/scripts/hf_module_drift_check.py
          python .github/scripts/test_hf_a11oy_singleton_verify.py
          git diff --check
          ! grep -R -n -E \
            'hf_estate_canonicalize\.py|select-newest-a11oy-source|duplicate_repo\(' \
            .github/scripts .github/workflows
      - name: Commit exact permanent topology
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit \
            -m 'fix(hf): replace clone migration with singleton verifier' \
            -m 'Remove every clone-capable publisher and migration path. Install a standalone scheduled verifier that binds canonical A11oy to protected GitHub source, checks Dockerfile-derived byte parity, probes critical routes, enforces clone absence, and only removes stale collection references.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/hf-singleton-verifier-20260722
