name: Reusable — HF Module Drift Check

# Per-repo guard for a repo whose Hugging Face Space is built by Dockerfile COPY
# from its GitHub source-of-truth. It supports direct live comparison, a legacy
# committed-lock baseline, and a stronger source-bound live baseline for Spaces
# that expose their exact protected Git SHA through a read-only build-info route.
# No mode auto-overwrites either side.

on:
  workflow_call:
    inputs:
      hf-repo:
        description: "HF Space repo (e.g. SZLHOLDINGS/a11oy). Empty = derive SZLHOLDINGS/<github-repo-name>."
        required: false
        type: string
        default: ""
      ref:
        description: "Backwards-compatible common ref for both sides."
        required: false
        type: string
        default: "main"
      github-ref:
        description: "GitHub checkout/API ref. Empty preserves the common ref."
        required: false
        type: string
        default: ""
      hf-ref:
        description: "Hugging Face revision. Empty preserves the common ref."
        required: false
        type: string
        default: ""
      mode:
        description: "direct, trusted-baseline, or source-bound-baseline for PR-safe immutable deployment verification."
        required: false
        type: string
        default: "direct"
      deployment-lock-path:
        description: "Legacy trusted-baseline mode: repo-relative lock path read from trusted-base-ref."
        required: false
        type: string
        default: ".github/hf-deployment-lock.json"
      trusted-base-ref:
        description: "Exact 40-character PR base SHA."
        required: false
        type: string
        default: ""
      candidate-ref:
        description: "Optional exact 40-character PR head SHA; GitHub-only delta report, never deployed."
        required: false
        type: string
        default: ""
      dockerfile-path:
        description: "Repo-relative Dockerfile path used to derive managed files."
        required: false
        type: string
        default: "Dockerfile"
      source-probe-path:
        description: "Source-bound mode: same-host read-only JSON path exposing build.state and exact build.revision."
        required: false
        type: string
        default: "/api/build-info"

permissions:
  contents: read

jobs:
  hf-module-drift:
    name: Source in sync with the live HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Validate comparison mode
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          case "${MODE}" in
            direct|trusted-baseline|source-bound-baseline) ;;
            *) echo "::error::mode must be direct, trusted-baseline, or source-bound-baseline"; exit 1 ;;
          esac

      - name: Checkout caller for direct comparison
        if: inputs.mode == 'direct'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: caller
          ref: ${{ inputs.github-ref != '' && inputs.github-ref || inputs.ref }}
          persist-credentials: false

      - name: Validate immutable PR-baseline inputs
        if: inputs.mode == 'trusted-baseline' || inputs.mode == 'source-bound-baseline'
        env:
          MODE: ${{ inputs.mode }}
          TRUSTED_BASE_REF: ${{ inputs.trusted-base-ref }}
          CANDIDATE_REF: ${{ inputs.candidate-ref }}
          LOCK_PATH: ${{ inputs.deployment-lock-path }}
          SOURCE_PROBE_PATH: ${{ inputs.source-probe-path }}
        run: |
          set -euo pipefail
          sha_re='^[0-9a-f]{40}$'
          [[ "${TRUSTED_BASE_REF}" =~ ${sha_re} ]] || {
            echo "::error::trusted-base-ref must be an exact lowercase 40-character SHA"
            exit 1
          }
          if [ -n "${CANDIDATE_REF}" ]; then
            [[ "${CANDIDATE_REF}" =~ ${sha_re} ]] || {
              echo "::error::candidate-ref must be an exact lowercase 40-character SHA"
              exit 1
            }
          fi
          if [ "${MODE}" = 'trusted-baseline' ]; then
            case "${LOCK_PATH}" in
              /*|*..*|*\*)
                echo "::error::deployment-lock-path must be a safe repo-relative path"
                exit 1
                ;;
            esac
          else
            case "${SOURCE_PROBE_PATH}" in
              /*) ;;
              *) echo "::error::source-probe-path must be a same-host absolute path"; exit 1 ;;
            esac
          fi

      - name: Checkout trusted base lock authority
        if: inputs.mode == 'trusted-baseline'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: trusted-base
          ref: ${{ inputs.trusted-base-ref }}
          persist-credentials: false

      - name: Checkout exact reusable-workflow revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: tools
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Compare COPY'd modules against the live HF Space
        if: inputs.mode == 'direct'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HF_REPO_IN: ${{ inputs.hf-repo }}
          REF: ${{ inputs.ref }}
          GITHUB_REF_IN: ${{ inputs.github-ref }}
          HF_REF_IN: ${{ inputs.hf-ref }}
        run: |
          set -euo pipefail
          GH_SOURCE_REF="${GITHUB_REF_IN:-${REF}}"
          HF_SOURCE_REF="${HF_REF_IN:-${REF}}"
          if [ -n "${HF_REPO_IN}" ]; then
            HF_REPO="${HF_REPO_IN}"
          else
            HF_REPO="SZLHOLDINGS/${GH_REPO##*/}"
          fi
          echo "Comparing ${GH_REPO} @ ${GH_SOURCE_REF} <-> ${HF_REPO} @ ${HF_SOURCE_REF}"
          python3 tools/.github/scripts/hf_module_drift_check.py \
            --repo-root caller \
            --github-repo "${GH_REPO}" \
            --hf-repo "${HF_REPO}" \
            --ref "${REF}" \
            --github-ref "${GH_SOURCE_REF}" \
            --hf-ref "${HF_SOURCE_REF}" \
            --allow caller/.github/hf-module-drift-allow.json \
            --report-out hf-module-drift-report.out.json

      - name: Verify committed immutable deployed baseline and report candidate plan
        if: inputs.mode == 'trusted-baseline'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HF_REPO_IN: ${{ inputs.hf-repo }}
          TRUSTED_BASE_REF: ${{ inputs.trusted-base-ref }}
          CANDIDATE_REF: ${{ inputs.candidate-ref }}
          LOCK_PATH: ${{ inputs.deployment-lock-path }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
        run: |
          set -euo pipefail
          if [ -n "${HF_REPO_IN}" ]; then
            HF_REPO="${HF_REPO_IN}"
          else
            HF_REPO="SZLHOLDINGS/${GH_REPO##*/}"
          fi
          python3 tools/.github/scripts/hf_module_drift_check.py \
            --github-repo "${GH_REPO}" \
            --hf-repo "${HF_REPO}" \
            --dockerfile-path "${DOCKERFILE_PATH}" \
            --deployment-lock "trusted-base/${LOCK_PATH}" \
            --trusted-base-ref "${TRUSTED_BASE_REF}" \
            --candidate-ref "${CANDIDATE_REF}" \
            --report-out hf-module-drift-report.out.json \
            --candidate-report-out hf-managed-candidate-plan.out.json

      - name: Verify source-bound immutable live baseline and report candidate plan
        if: inputs.mode == 'source-bound-baseline'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HF_REPO_IN: ${{ inputs.hf-repo }}
          TRUSTED_BASE_REF: ${{ inputs.trusted-base-ref }}
          CANDIDATE_REF: ${{ inputs.candidate-ref }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
          SOURCE_PROBE_PATH: ${{ inputs.source-probe-path }}
        run: |
          set -euo pipefail
          if [ -n "${HF_REPO_IN}" ]; then
            HF_REPO="${HF_REPO_IN}"
          else
            HF_REPO="SZLHOLDINGS/${GH_REPO##*/}"
          fi
          python3 tools/.github/scripts/hf_source_bound_baseline.py \
            --github-repo "${GH_REPO}" \
            --hf-repo "${HF_REPO}" \
            --trusted-base-ref "${TRUSTED_BASE_REF}" \
            --candidate-ref "${CANDIDATE_REF}" \
            --dockerfile-path "${DOCKERFILE_PATH}" \
            --source-probe-path "${SOURCE_PROBE_PATH}" \
            --report-out hf-module-drift-report.out.json \
            --candidate-report-out hf-managed-candidate-plan.out.json

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-module-drift-report
          path: |
            hf-module-drift-report.out.json
            hf-managed-candidate-plan.out.json
          if-no-files-found: ignore
          retention-days: 90
