name: Reusable — Node CI

# Standard Node/TypeScript CI: install, lint, typecheck, test, build.
# Caller can opt-out of any stage by passing `false` for that input.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      package-manager:
        description: 'Package manager (npm, pnpm, yarn)'
        required: false
        type: string
        default: 'pnpm'
      pnpm-version:
        description: 'pnpm version (only used when package-manager=pnpm)'
        required: false
        type: string
        default: '10'
      run-lint:
        description: 'Run lint script'
        required: false
        type: boolean
        default: true
      run-typecheck:
        description: 'Run typecheck script'
        required: false
        type: boolean
        default: true
      run-test:
        description: 'Run test script'
        required: false
        type: boolean
        default: true
      run-build:
        description: 'Run build script'
        required: false
        type: boolean
        default: true
      working-directory:
        description: 'Working directory for all commands'
        required: false
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test, build]
    steps:
      - name: Skip if disabled
        id: skip
        shell: bash
        run: |
          case "${{ matrix.task }}" in
            lint)      enabled="${{ inputs.run-lint }}";;
            typecheck) enabled="${{ inputs.run-typecheck }}";;
            test)      enabled="${{ inputs.run-test }}";;
            build)     enabled="${{ inputs.run-build }}";;
          esac
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Harden runner
        if: steps.skip.outputs.enabled == 'true'
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        if: steps.skip.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Setup pnpm
        if: steps.skip.outputs.enabled == 'true' && inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.1.0
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node
        if: steps.skip.outputs.enabled == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || (inputs.package-manager == 'yarn' && 'yarn.lock' || 'package-lock.json') }}

      - name: Install dependencies
        if: steps.skip.outputs.enabled == 'true'
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm install --frozen-lockfile;;
            yarn) yarn install --frozen-lockfile;;
            npm)  npm ci;;
          esac

      - name: Run ${{ matrix.task }}
        if: steps.skip.outputs.enabled == 'true'
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          PM="${{ inputs.package-manager }}"
          # Skip silently if the script isn't defined
          if ! node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['${{ matrix.task }}'] ? 0 : 1)"; then
            echo "::notice::No '${{ matrix.task }}' script in package.json — skipping"
            exit 0
          fi
          $PM run ${{ matrix.task }}
