name: Reusable — Node CI

# Standard Node/TypeScript CI: install, lint, typecheck, test, build.
# Caller can opt-out of any stage by passing `false` for that input.
# Tolerates repos without a committed lockfile (cache + frozen-lockfile
# are skipped automatically — see `Detect lockfile` step below).

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      package-manager:
        description: 'Package manager (npm, pnpm, yarn)'
        required: false
        type: string
        default: 'pnpm'
      pnpm-version:
        description: 'pnpm version (only used when package-manager=pnpm)'
        required: false
        type: string
        default: '10'
      run-lint:
        description: 'Run lint script'
        required: false
        type: boolean
        default: true
      run-typecheck:
        description: 'Run typecheck script'
        required: false
        type: boolean
        default: true
      run-test:
        description: 'Run test script'
        required: false
        type: boolean
        default: true
      run-build:
        description: 'Run build script'
        required: false
        type: boolean
        default: true
      working-directory:
        description: 'Working directory for all commands'
        required: false
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test, build]
    steps:
      - name: Skip if disabled
        id: skip
        shell: bash
        run: |
          case "${{ matrix.task }}" in
            lint)      enabled="${{ inputs.run-lint }}";;
            typecheck) enabled="${{ inputs.run-typecheck }}";;
            test)      enabled="${{ inputs.run-test }}";;
            build)     enabled="${{ inputs.run-build }}";;
          esac
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Harden runner
        if: steps.skip.outputs.enabled == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        if: steps.skip.outputs.enabled == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect lockfile
        if: steps.skip.outputs.enabled == 'true'
        id: lockfile
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          PM="${{ inputs.package-manager }}"
          case "$PM" in
            pnpm) FILE="pnpm-lock.yaml";;
            yarn) FILE="yarn.lock";;
            npm)  FILE="package-lock.json";;
          esac
          if [ -f "$FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
            echo "::notice::Found lockfile $FILE — enabling cache + frozen install"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No $FILE found — cache disabled, install will not be frozen"
          fi

      - name: Detect packageManager in package.json
        if: steps.skip.outputs.enabled == 'true' && inputs.package-manager == 'pnpm'
        id: pkgmgr
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          if [ -f package.json ] && grep -qE '"packageManager"\s*:\s*"pnpm@' package.json; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json has packageManager — letting pnpm/action-setup read it"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm (from package.json packageManager)
        if: steps.skip.outputs.enabled == 'true' && inputs.package-manager == 'pnpm' && steps.pkgmgr.outputs.present == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4.1.0

      - name: Setup pnpm (from input version)
        if: steps.skip.outputs.enabled == 'true' && inputs.package-manager == 'pnpm' && steps.pkgmgr.outputs.present != 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4.1.0
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node (with cache)
        if: steps.skip.outputs.enabled == 'true' && steps.lockfile.outputs.found == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/${{ steps.lockfile.outputs.file }}

      - name: Setup Node (no cache)
        if: steps.skip.outputs.enabled == 'true' && steps.lockfile.outputs.found != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: steps.skip.outputs.enabled == 'true'
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          HAS_LOCKFILE: ${{ steps.lockfile.outputs.found }}
        run: |
          PM="${{ inputs.package-manager }}"
          if [ "$HAS_LOCKFILE" = "true" ]; then
            case "$PM" in
              pnpm) pnpm install --frozen-lockfile;;
              yarn) yarn install --frozen-lockfile;;
              npm)  npm ci;;
            esac
          else
            case "$PM" in
              pnpm) pnpm install --no-frozen-lockfile;;
              yarn) yarn install;;
              npm)  npm install --no-package-lock;;
            esac
          fi

      - name: Run ${{ matrix.task }}
        if: steps.skip.outputs.enabled == 'true'
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: |
          PM="${{ inputs.package-manager }}"
          # Skip silently if the script isn't defined
          if ! node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['${{ matrix.task }}'] ? 0 : 1)"; then
            echo "::notice::No '${{ matrix.task }}' script in package.json — skipping"
            exit 0
          fi
          $PM run ${{ matrix.task }}
