name: HF Estate — Official API Command Centers

# Organization-wide Hugging Face maintenance with one canonical A11oy production
# Space, four public synchronized command centers, and complete official-API
# inventory/readback for models, datasets, Spaces, kernels, collections, buckets,
# and every collection reference.
on:
  push:
    branches: [main]
    paths:
      - .github/scripts/hf_estate_upgrade.py
      - .github/scripts/hf_estate_canonicalize.py
      - .github/scripts/hf_estate_command_centers_v2.py
      - .github/scripts/test_hf_estate_canonicalize.py
      - .github/scripts/test_hf_estate_command_centers_v2.py
      - .github/workflows/hf-estate-upgrade.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/hf_estate_upgrade.py
      - .github/scripts/hf_estate_canonicalize.py
      - .github/scripts/hf_estate_command_centers_v2.py
      - .github/scripts/test_hf_estate_canonicalize.py
      - .github/scripts/test_hf_estate_command_centers_v2.py
      - .github/workflows/hf-estate-upgrade.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Apply the estate reconciliation rather than run a dry run
        required: false
        default: "true"

permissions:
  contents: write
  issues: write

concurrency:
  group: hf-estate-official-api-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    name: Verify and reconcile the full Hugging Face estate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_ORG_TOKEN1: ${{ secrets.HF_ORG_TOKEN1 }}
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      REPORT_ISSUE_TITLE: '[hf-estate-report] official API command centers'
    steps:
      - name: Checkout triggering revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 1

      - name: Determine execution mode and credential
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          publish=true
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then publish=false; fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then publish=false; fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

          if [ -n "${HF_ORG_TOKEN1:-}" ]; then
            echo "credential=HF_ORG_TOKEN1" >> "$GITHUB_OUTPUT"
          elif [ -n "${HF_ORG_TOKEN:-}" ]; then
            echo "credential=HF_ORG_TOKEN" >> "$GITHUB_OUTPUT"
          elif [ -n "${HF_TOKEN:-}" ]; then
            echo "credential=HF_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "credential=missing" >> "$GITHUB_OUTPUT"
            mkdir -p reports
            cat > reports/hf-estate-upgrade-latest.json <<JSON
          {
            "schema": "szl.hf-estate-upgrade-report/v2",
            "organization": "SZLHOLDINGS",
            "generation": "${GITHUB_SHA}",
            "publish": ${publish},
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "inventory_contract": "huggingface_hub-supported-api/v2",
            "counts": {},
            "canonical_flagship_space": {
              "repo_id": "SZLHOLDINGS/a11oy"
            },
            "managed_clone_ids": [
              "SZLHOLDINGS/a11oy-clone-1",
              "SZLHOLDINGS/a11oy-clone-2",
              "SZLHOLDINGS/a11oy-clone-3",
              "SZLHOLDINGS/a11oy-clone-4"
            ],
            "collection_validation": {},
            "bucket_snapshots": {},
            "actions": [
              {
                "target": "SZLHOLDINGS",
                "action": "credential-preflight",
                "status": "error",
                "detail": "HF_ORG_TOKEN1/HF_ORG_TOKEN/HF_TOKEN is not configured."
              }
            ],
            "summary": {
              "ok": 0,
              "warning": 0,
              "error": 1,
              "dry_run": 0
            },
            "boundaries": [
              "No Hugging Face mutation was attempted without an authenticated organization write token."
            ]
          }
          JSON
          fi

      - name: Set up Python
        if: steps.preflight.outputs.credential != 'missing'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Hub client with Collections and Buckets APIs
        if: steps.preflight.outputs.credential != 'missing'
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.10,<2" \
            "requests>=2.32,<3"

      - name: Verify command-center and official-API contracts
        if: steps.preflight.outputs.credential != 'missing'
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/hf_estate_command_centers_v2.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_command_centers_v2.py
          python .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_command_centers_v2.py
          git diff --check

      - name: Execute official-API estate reconciliation
        if: steps.preflight.outputs.credential != 'missing'
        id: estate
        shell: bash
        run: |
          set +e
          args=(--generation "${GITHUB_SHA}")
          if [ "${{ steps.preflight.outputs.publish }}" = "true" ]; then
            args+=(--publish)
          fi
          python .github/scripts/hf_estate_command_centers_v2.py "${args[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable estate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-estate-official-api-${{ github.run_id }}
          path: reports/hf-estate-upgrade-latest.json
          if-no-files-found: warn
          retention-days: 90

      - name: Commit the latest publish-mode report
        if: always() && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f reports/hf-estate-upgrade-latest.json ]; then
            echo "::warning::No estate report was produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/hf-estate-upgrade-latest.json
          if git diff --cached --quiet; then
            echo "Report is unchanged."
            exit 0
          fi
          git commit -s -m "chore(hf): record official-API estate report [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Persist publish result in deterministic issue
        if: always() && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f reports/hf-estate-upgrade-latest.json ]; then
            exit 0
          fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo '<!-- szl-hf-estate-official-api-report -->'
            echo '# Hugging Face estate — official API verification'
            echo
            echo "- Run: ${run_url}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo "- Credential selected: \`${{ steps.preflight.outputs.credential }}\`"
            echo
            echo '```json'
            cat reports/hf-estate-upgrade-latest.json
            echo '```'
          } > /tmp/hf-estate-report.md

          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state all \
            --search "${REPORT_ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
            | head -n1)"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/hf-estate-report.md
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_ISSUE_TITLE" \
              --body-file /tmp/hf-estate-report.md >/dev/null
            issue_number="$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state all \
              --search "${REPORT_ISSUE_TITLE} in:title" \
              --json number,title \
              --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
              | head -n1)"
          fi

          if python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("reports/hf-estate-upgrade-latest.json").read_text())
          raise SystemExit(0 if report.get("summary", {}).get("error") == 0 else 1)
          PY
          then
            gh issue close "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --reason completed \
              --comment 'Official-API publish reconciliation completed with zero recorded errors.' || true
          else
            gh issue reopen "$issue_number" --repo "$GITHUB_REPOSITORY" || true
          fi

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("reports/hf-estate-upgrade-latest.json")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("## Hugging Face estate — official API\n\n")
              if not path.exists():
                  out.write("No report was produced.\n")
              else:
                  report = json.loads(path.read_text(encoding="utf-8"))
                  out.write(f"Generation: `{report.get('generation')}`\n\n")
                  out.write(f"Inventory contract: `{report.get('inventory_contract')}`\n\n")
                  canonical = report.get("canonical_flagship_space", {})
                  out.write(
                      "Canonical A11oy: "
                      f"`{canonical.get('repo_id', 'UNKNOWN')}` "
                      f"at `{canonical.get('sha', 'UNVERIFIED')}` "
                      f"({canonical.get('stage', 'UNKNOWN')})\n\n"
                  )
                  clones = report.get("managed_clone_snapshots", {})
                  out.write("| Retained command center | Visibility | Runtime | Revision |\n")
                  out.write("|---|---|---|---|\n")
                  for repo_id in report.get("managed_clone_ids", []):
                      item = clones.get(repo_id, {})
                      visibility = "public" if item.get("private") is False else "unknown"
                      out.write(
                          f"| `{repo_id}` | {visibility} | "
                          f"{item.get('stage', 'UNKNOWN')} | "
                          f"`{item.get('sha', 'UNVERIFIED')}` |\n"
                      )
                  out.write("\n| Inventory | Count |\n|---|---:|\n")
                  for key, value in report.get("counts", {}).items():
                      out.write(f"| {key} | {value} |\n")
                  out.write(
                      f"\nCollections read back: "
                      f"{len(report.get('collection_validation', {}))}\n\n"
                  )
                  out.write(
                      f"Buckets read back: "
                      f"{len(report.get('bucket_snapshots', {}))}\n\n"
                  )
                  out.write("| Result | Count |\n|---|---:|\n")
                  for key, value in report.get("summary", {}).items():
                      out.write(f"| {key} | {value} |\n")
          PY

      - name: Enforce fail-closed completion
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.preflight.outputs.credential }}" = "missing" ]; then
            exit 2
          fi
          code="${{ steps.estate.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Official-API estate reconciliation completed with exit code $code."
            exit "$code"
          fi
          echo 'Official-API Hugging Face estate reconciliation completed successfully.'
