name: HF Estate — Canonical A11oy Verification

# Permanent post-migration enforcement. Exact protected GitHub main is authoritative;
# historical clone repositories must remain absent and are never adoption inputs.
on:
  push:
    branches: [main]
    paths:
      - .github/scripts/hf_a11oy_singleton_verify.py
      - .github/scripts/test_hf_a11oy_singleton_verify.py
      - .github/scripts/hf_module_drift_check.py
      - .github/workflows/hf-estate-upgrade.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/hf_a11oy_singleton_verify.py
      - .github/scripts/test_hf_a11oy_singleton_verify.py
      - .github/scripts/hf_module_drift_check.py
      - .github/workflows/hf-estate-upgrade.yml
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:
    inputs:
      publish:
        description: Verify singleton topology and refresh evidence
        required: false
        default: "true"

permissions:
  contents: read
  issues: write

concurrency:
  group: hf-canonical-a11oy-verification-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify one canonical A11oy Space
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      REPORT_ISSUE_TITLE: '[hf-canonicalization-report] single A11oy Space'
    steps:
      - name: Checkout singleton verifier
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout authoritative protected A11oy source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/a11oy
          ref: main
          path: a11oy-source
          fetch-depth: 0
          persist-credentials: false

      - name: Bind exact protected A11oy main revision
        id: source
        shell: bash
        run: |
          set -euo pipefail
          expected="$(git -C a11oy-source rev-parse HEAD)"
          if ! [[ "$expected" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve exact protected A11oy main revision."
            exit 2
          fi
          echo "sha=$expected" >> "$GITHUB_OUTPUT"
          echo "A11OY_EXPECTED_GITHUB_SHA=$expected" >> "$GITHUB_ENV"
          echo "Expected protected A11oy main: \`$expected\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Determine execution mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          publish=true
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then publish=false; fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then publish=false; fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

      - name: Verify Hugging Face credential without exposing it
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::No Hugging Face organization write credential is configured"
            exit 2
          fi

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install pinned Hub client range
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"

      - name: Verify permanent no-clone contract
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/hf_a11oy_singleton_verify.py \
            .github/scripts/test_hf_a11oy_singleton_verify.py \
            .github/scripts/hf_module_drift_check.py
          python .github/scripts/test_hf_a11oy_singleton_verify.py
          git diff --check

          # Scan only other workflows and executable, non-test Python sources.
          # This workflow and its regression tests intentionally contain retired
          # names as negative assertions.
          mapfile -t executable_sources < <(
            {
              find .github/workflows -maxdepth 1 -type f -name '*.yml' \
                ! -name 'hf-estate-upgrade.yml' -print
              find .github/scripts -maxdepth 1 -type f -name '*.py' \
                ! -name 'test_*' -print
            } | sort
          )
          if ((${#executable_sources[@]})) && grep -n -E \
            'hf_estate_upgrade\.py|hf_estate_canonicalize\.py|hf_estate_single_canonical_v2\.py|select-newest-a11oy-source|duplicate_repo\(' \
            "${executable_sources[@]}"; then
            echo "::error::Clone migration or recreation logic still exists in executable sources."
            exit 2
          fi

      - name: Prove Dockerfile-derived byte parity with canonical Space
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/hf_module_drift_check.py \
            --repo-root a11oy-source \
            --github-repo szl-holdings/a11oy \
            --hf-repo SZLHOLDINGS/a11oy \
            --github-ref "${{ steps.source.outputs.sha }}" \
            --hf-ref main \
            --allow a11oy-source/.github/hf-module-drift-allow.json \
            --report-out hf-canonical-a11oy-drift.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('hf-canonical-a11oy-drift.json').read_text())
          errors = report.get('errors') or report.get('drift_errors') or []
          if errors:
              raise SystemExit(f'Canonical byte parity failed: {errors}')
          print(json.dumps({'status': report.get('status') or 'checker-exit-zero'}, indent=2))
          PY

      - name: Verify canonical runtime, routes, collections, and clone absence
        id: estate
        shell: bash
        run: |
          set +e
          args=(--generation "${GITHUB_SHA}")
          if [ "${{ steps.mode.outputs.publish }}" = "true" ]; then args+=(--publish); fi
          python .github/scripts/hf_a11oy_singleton_verify.py "${args[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable singleton evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-canonical-a11oy-${{ github.run_id }}
          path: |
            reports/hf-estate-upgrade-latest.json
            hf-canonical-a11oy-drift.json
          if-no-files-found: error
          retention-days: 90

      - name: Persist current result in deterministic issue
        if: always() && steps.mode.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f reports/hf-estate-upgrade-latest.json
          {
            echo '<!-- szl-hf-single-a11oy-report -->'
            echo '# Single governed A11oy Space'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Verifier revision: \`${GITHUB_SHA}\`"
            echo "- Expected A11oy source: \`${{ steps.source.outputs.sha }}\`"
            echo
            echo '```json'
            cat reports/hf-estate-upgrade-latest.json
            echo '```'
          } > /tmp/hf-single-a11oy.md
          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state all \
            --search "${REPORT_ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
            | head -n1)"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" --body-file /tmp/hf-single-a11oy.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$REPORT_ISSUE_TITLE" --body-file /tmp/hf-single-a11oy.md
          fi

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path('reports/hf-estate-upgrade-latest.json')
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as out:
              out.write('## Canonical A11oy verification\n\n')
              if not path.exists():
                  out.write('No report was produced.\n')
              else:
                  report = json.loads(path.read_text(encoding='utf-8'))
                  canonical = report.get('canonical_flagship_space') or {}
                  out.write(f"- Space: `{canonical.get('repo_id', 'UNKNOWN')}`\n")
                  out.write(f"- Hub revision: `{canonical.get('sha', 'UNKNOWN')}`\n")
                  out.write(f"- Runtime: `{canonical.get('stage', 'UNKNOWN')}`\n")
                  out.write(f"- GitHub source: `{report.get('expected_github_source_sha', 'UNKNOWN')}`\n")
                  out.write(f"- Clone creation enabled: `{report.get('singleton_policy', {}).get('clone_creation_enabled')}`\n")
                  out.write(f"- Clone adoption enabled: `{report.get('singleton_policy', {}).get('clone_adoption_enabled')}`\n")
                  out.write('\n| Historical clone | Absent |\n|---|---|\n')
                  for repo_id, absent in report.get('clone_absence', {}).items():
                      out.write(f"| `{repo_id}` | `{absent}` |\n")
                  out.write('\n```json\n')
                  out.write(json.dumps(report.get('summary', {}), indent=2))
                  out.write('\n```\n')
          PY

      - name: Enforce fail-closed completion
        if: always()
        run: |
          code="${{ steps.estate.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Canonical-A11oy verification failed with exit ${code}"
            exit "$code"
          fi
          echo 'Canonical A11oy is current, byte-aligned, public, Docker-backed, RUNNING, route-verified, and clone-free.'
