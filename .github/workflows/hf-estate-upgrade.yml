name: HF Estate Upgrade

# Organization-wide, non-destructive Hub maintenance.
on:
  push:
    branches:
      - main
      - agent/hf-estate-upgrade-20260722
    paths:
      - .github/scripts/hf_estate_upgrade.py
      - .github/workflows/hf-estate-upgrade.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/hf_estate_upgrade.py
      - .github/workflows/hf-estate-upgrade.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Apply the upgrade rather than produce a dry-run report
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: hf-estate-upgrade-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upgrade:
    name: Upgrade SZLHOLDINGS Hub estate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - name: Checkout triggering revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 1

      - name: Record credential preflight
        id: credentials
        shell: bash
        run: |
          set -euo pipefail
          publish=true
          if [ "${{ github.event_name }}" = "pull_request" ]; then publish=false; fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then publish=false; fi
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            mkdir -p reports
            cat > reports/hf-estate-upgrade-latest.json <<JSON
          {
            "schema": "szl.hf-estate-upgrade-report/v1",
            "organization": "SZLHOLDINGS",
            "generation": "${GITHUB_SHA}",
            "publish": ${publish},
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "counts": {},
            "clone_ids": [
              "SZLHOLDINGS/a11oy-clone-1",
              "SZLHOLDINGS/a11oy-clone-2",
              "SZLHOLDINGS/a11oy-clone-3",
              "SZLHOLDINGS/a11oy-clone-4"
            ],
            "collections": {},
            "actions": [
              {
                "target": "SZLHOLDINGS",
                "action": "credential-preflight",
                "status": "error",
                "detail": "Neither GitHub Actions secret HF_ORG_TOKEN nor HF_TOKEN is configured for this repository."
              }
            ],
            "summary": {
              "ok": 0,
              "warning": 0,
              "error": 1,
              "dry_run": 0
            },
            "boundaries": [
              "No Hugging Face mutation was attempted without an authenticated org-scoped write token."
            ]
          }
          JSON
            echo "::error::Neither HF_ORG_TOKEN nor HF_TOKEN is configured."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.credentials.outputs.has_token == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install pinned Hub client range
        if: steps.credentials.outputs.has_token == 'true'
        run: |
          python -m pip install --disable-pip-version-check \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"

      - name: Execute estate upgrade
        if: steps.credentials.outputs.has_token == 'true'
        id: estate
        shell: bash
        run: |
          set +e
          publish_flag="--publish"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            publish_flag=""
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            publish_flag=""
          fi
          python .github/scripts/hf_estate_upgrade.py \
            ${publish_flag} \
            --generation "${GITHUB_SHA}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit the evidence report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f reports/hf-estate-upgrade-latest.json ]; then
            echo "::warning::No estate report was produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/hf-estate-upgrade-latest.json
          if git diff --cached --quiet; then
            echo "Report is unchanged."
            exit 0
          fi
          git commit -s -m "chore(hf): record estate upgrade report [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("reports/hf-estate-upgrade-latest.json")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("## Hugging Face estate upgrade\n\n")
              if not path.exists():
                  out.write("No report was produced.\n")
              else:
                  report = json.loads(path.read_text(encoding="utf-8"))
                  out.write(f"Generation: `{report.get('generation')}`\n\n")
                  out.write("| Inventory | Count |\n|---|---:|\n")
                  for key, value in report.get("counts", {}).items():
                      out.write(f"| {key} | {value} |\n")
                  out.write("\n| Result | Count |\n|---|---:|\n")
                  for key, value in report.get("summary", {}).items():
                      out.write(f"| {key} | {value} |\n")
          PY

      - name: Enforce fail-closed completion
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.credentials.outputs.has_token }}" != "true" ]; then
            exit 2
          fi
          code="${{ steps.estate.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Estate upgrade completed with exit code $code; inspect the committed report."
            exit "$code"
          fi
