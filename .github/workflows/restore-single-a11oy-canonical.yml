name: Restore single canonical A11oy estate

on:
  push:
    branches: [fix/single-a11oy-canonical-final-20260722]
    paths:
      - .github/workflows/restore-single-a11oy-canonical.yml

permissions:
  contents: write

concurrency:
  group: restore-single-a11oy-canonical
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: fix/single-a11oy-canonical-final-20260722
          fetch-depth: 0
      - name: Restore reviewed one-Space reconciler
        shell: bash
        run: |
          set -euo pipefail
          git checkout d11b55f24dc443bd7c44591cfc23d47e88ed363e -- \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py \
            .github/workflows/hf-estate-upgrade.yml
          rm -f .github/workflows/estate-finalization.yml
          rm -f .github/workflows/restore-single-a11oy-canonical.yml
      - name: Verify permanent no-clone contract
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/hf_estate_upgrade.py \
            .github/scripts/hf_estate_canonicalize.py \
            .github/scripts/test_hf_estate_canonicalize.py
          python .github/scripts/test_hf_estate_canonicalize.py
          ! grep -Fq '_create_missing_clone' .github/scripts/hf_estate_canonicalize.py
          ! grep -Fq 'update_repo_settings' .github/scripts/hf_estate_canonicalize.py
          ! grep -Fq 'clone-refresh' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'select-newest-a11oy-source' .github/scripts/hf_estate_canonicalize.py
          grep -Fq 'retire-a11oy-clone' .github/scripts/hf_estate_canonicalize.py
      - name: Commit reviewed canonical-only implementation and self-remove
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit \
            -m 'fix(hf): keep only the newest canonical A11oy Space' \
            -m 'Restore the reviewed single-Space reconciler: select the newest valid canonical-or-clone content, adopt byte-different files into SZLHOLDINGS/a11oy, verify public Docker RUNNING parity, remove collection references, delete a11oy-clone-1..4, and permanently disable clone recreation.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/single-a11oy-canonical-final-20260722
