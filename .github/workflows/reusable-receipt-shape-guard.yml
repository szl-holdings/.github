name: Reusable — Receipt-Shape Honesty Guard

# Per-repo merge gate for receipt shape-conformance: committed attestation DATA
# (JSON / JSONL / DSSE payloads) that DECLARES a known format (in-toto Statement
# or DSSE envelope) must not carry a field that is present with the wrong TYPE.
# The org-wide sweep (workflows/receipt-shape-sweep.yml) already runs weekly and
# on pushes to szl-holdings/.github itself, but a corrupt declared-format receipt
# pushed straight into a consuming repo could otherwise sit undetected for up to
# a week. A consuming repo wires this into its own CI so an edit to its receipt
# data is validated IMMEDIATELY, on the PR head, before merge.
#
# The checker (scripts/receipt_shape_check.py) + its self-test + allowlist live
# ONCE in szl-holdings/.github, so a fix to the guard reaches every caller at
# once (mirrors reusable-anatomy-map-drift.yml). This wrapper is read-only:
# unlike the central sweep it never commits a report -- the red check is the
# signal. It runs the checker in --local mode over the caller's own checkout, so
# it needs NO token and NO network.
#
# It is TYPE-conformance, not completeness: an absent / null / empty field is
# honest UNAVAILABLE and is never flagged (unsigned envelopes and honest stubs
# with intentionally-empty digests pass on their merits).
#
# Wire it up from a consuming repo:
#   jobs:
#     receipt-shape:
#       uses: szl-holdings/.github/.github/workflows/reusable-receipt-shape-guard.yml@main

on:
  workflow_call:
    inputs:
      checker-ref:
        description: "Ref of szl-holdings/.github to take the shared checker + allowlist from."
        required: false
        type: string
        default: "main"

permissions:
  contents: read

concurrency:
  group: reusable-receipt-shape-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  receipt-shape:
    name: Declared-format receipts are structurally honest (type-conformant)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout caller (the data to scan)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: caller

      - name: Checkout szl-holdings/.github (shared checker + allowlist)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: szl-holdings/.github
          ref: ${{ inputs.checker-ref }}
          path: guard

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Self-test the receipt-shape guard (positive + negative fixtures)
        # Proves the guard FAILS on wrong-type corruption AND stays silent on
        # honest empty/absent fields before we trust a green result, so a future
        # change can neither make it an always-green no-op nor punish honesty.
        run: python3 guard/.github/scripts/test_receipt_shape_check.py

      - name: Scan the caller's committed receipt data
        run: |
          set +e
          python3 guard/.github/scripts/receipt_shape_check.py \
            --local caller \
            --allowlist guard/.github/data/receipt_shape_allowlist.json \
            --report receipt_shape_report.out.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Upload receipt-shape report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: receipt-shape-report
          path: receipt_shape_report.out.json
          if-no-files-found: ignore

      - name: Fail on a structurally corrupt declared-format receipt
        run: |
          case "${CHECK_EXIT:-2}" in
            0)
              echo "✓ Declared-format receipts are structurally honest (type-conformant)."
              ;;
            1)
              echo "::error::Receipt-shape violation in this repo's committed"
              echo "::error::attestation data (JSON / JSONL / a base64 DSSE payload): a"
              echo "::error::blob DECLARES an in-toto Statement or DSSE envelope but a"
              echo "::error::field is PRESENT with the WRONG TYPE."
              echo "::error::S1: in-toto \"subject\" (list) / \"digest\" (object of string"
              echo "::error::values) / \"predicateType\" (string), when present, must be"
              echo "::error::the right type. S2: a DSSE non-empty \"payload\" must be"
              echo "::error::base64-decodable and \"signatures\", when present, a list of"
              echo "::error::objects whose \"sig\" is a string."
              echo "::error::This is TYPE-conformance, not completeness: an absent /"
              echo "::error::null / empty field is honest UNAVAILABLE and is never"
              echo "::error::flagged -- never fabricate a pass. Fix the data (supply the"
              echo "::error::right type, or leave the field empty / absent). See the"
              echo "::error::uploaded receipt_shape_report.out.json artifact."
              exit 1
              ;;
            *)
              echo "::error::The receipt-shape check could not run (exit"
              echo "::error::${CHECK_EXIT:-2}). Failed (not passed) so coverage can"
              echo "::error::never look green when the check did not actually run."
              exit 1
              ;;
          esac
