name: Code Security Config Drift

# Task #307 created an org-level GitHub *code security configuration*
# ("SZL Holdings Managed Security", id 252588), attached it — enforced — to
# every repo in the org, and set it as the default for new repos. Nothing
# watched for drift afterwards. This job catches it: if a repo is detached,
# swapped onto the legacy enterprise/global config, lands new without coverage,
# or the default-for-new-repos changes, the check fails (and refreshes a
# committed report snapshot). Mirrors the weekly license / dead-link guards.
#
# The code-security configuration endpoints require org-admin, so the built-in
# Actions GITHUB_TOKEN is NOT sufficient — the SZL_GITHUB_TOKEN PAT secret is
# used. The two missing-vs-broken token cases are kept DISTINCT so a missing
# secret never looks like real drift and never looks like a pass:
#   * NO SZL_GITHUB_TOKEN configured -> the `check` job is SKIPPED (neutral) via
#     the `preflight` gate below. This is honest degrade: the check did not run,
#     so it is neither a red failure nor a green pass (coverage NOT verified).
#   * A token IS present but the API call fails (401/403 insufficient scope,
#     network) -> the checker exits 2 and this job FAILS loudly. A
#     configured-but-broken token is a real misconfiguration, never a silent
#     pass. A genuine drift (a repo not enforced under 252588) still FAILS.
# Minimal token scope + the single founder step to add the secret are documented
# in WORKFLOWS.md ("code-security-drift" section).

on:
  schedule:
    # Weekly sweep (Mondays 07:37 UTC) — offset from the other org guards.
    - cron: "37 7 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/scripts/code_security_drift.py"
      - ".github/data/code_security_allowlist.json"
      - ".github/workflows/code-security-drift.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: code-security-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Honest-degrade gate. secrets.* cannot be referenced directly in a job-level
  # `if:`, so this tiny job decides whether the drift check can actually run and
  # exposes it as a boolean output. It does NOT just check that the secret is
  # non-empty — an EXPIRED or under-scoped PAT is a non-empty string that still
  # cannot read the code-security endpoints, and reporting that as red makes a
  # token-plumbing gap look identical to genuine drift. So it PROBES the real
  # endpoint the check needs and treats "no usable credential" (missing, 401
  # bad/expired, or 403 insufficient scope) as a NEUTRAL skip: the `check` job
  # is then SKIPPED (neutral grey) — not failed red and not passed green,
  # because drift genuinely cannot be verified without a working token. A
  # working token (200) runs the real check, where genuine drift still FAILS.
  preflight:
    name: Token preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_token: ${{ steps.detect.outputs.has_token }}
    steps:
      - name: Determine whether the drift check can authenticate
        id: detect
        env:
          SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
        run: |
          set -u
          skip_notice() {
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=code-security-drift skipped::$1 The org code-security drift check needs an org-admin PAT (fine-grained Administration:Read, or classic admin:org) to read the code-security configuration endpoints, so it is SKIPPED (neutral) rather than reported as drift. This is NOT a pass — org coverage was NOT verified. A founder must set/refresh the SZL_GITHUB_TOKEN secret to enable it (see WORKFLOWS.md)."
          }
          if [ -z "${SZL_GITHUB_TOKEN:-}" ]; then
            skip_notice "SZL_GITHUB_TOKEN is not configured."
            exit 0
          fi
          # Probe the exact endpoint the checker reads. Only a 200 proves the
          # token can actually run the check; 401/403 mean the credential is
          # invalid/expired/under-scoped (a non-empty but unusable secret).
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: token ${SZL_GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${GITHUB_REPOSITORY_OWNER}/code-security/configurations?per_page=1" \
            || echo 000)"
          echo "Probe of code-security configurations endpoint returned HTTP ${code}."
          case "${code}" in
            200)
              echo "has_token=true" >> "$GITHUB_OUTPUT"
              echo "SZL_GITHUB_TOKEN authenticates — the drift check will run."
              ;;
            401)
              skip_notice "SZL_GITHUB_TOKEN is set but INVALID/EXPIRED (HTTP 401 Bad credentials)."
              ;;
            403)
              skip_notice "SZL_GITHUB_TOKEN is set but lacks org-admin scope (HTTP 403)."
              ;;
            *)
              # Transient/unknown (network, 5xx): let the real check run so it is
              # authoritative — a genuine persistent failure surfaces as exit 2.
              echo "has_token=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Preflight probe was inconclusive (HTTP ${code}); running the full check so its result is authoritative."
              ;;
          esac

  check:
    name: Managed security config attached + enforced everywhere
    needs: preflight
    if: needs.preflight.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # only to commit the refreshed report in szl-holdings/.github
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Check managed-security-config coverage across the org
        env:
          # org-admin PAT preferred (the built-in token can't read these endpoints)
          SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 .github/scripts/code_security_drift.py \
            --report .github/data/code_security_report.json 2>&1 | tee /tmp/drift-output.txt
          echo "CHECK_EXIT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Commit refreshed report if changed
        # Best-effort: if main is protected (or the token can't push), this must
        # NOT mask the real signal. The drift gate below is the source of truth.
        continue-on-error: true
        if: github.repository == 'szl-holdings/.github' && github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- .github/data/code_security_report.json; then
            echo "Report unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "Stephen P. Lutar Jr."
          git config user.email "stephenlutar2@gmail.com"
          git add .github/data/code_security_report.json
          git commit -s -m "chore(security): refresh code-security drift report [skip ci]"
          git push

      - name: Alert the team on drift / check failure (scheduled runs only)
        # Mirrors the release-receipt + pin-drift guards: the unattended weekly
        # cron is the only place a red X would otherwise sit unseen for days, so
        # page the shared ntfy alert relay there. Attended runs (push to main,
        # workflow_dispatch, workflow_call) already surface a visible check, so
        # they stay silent — no alert noise. Fires on drift (exit 1) AND on a
        # could-not-complete auth/API failure (exit 2), never on a clean run
        # (exit 0). continue-on-error so a relay hiccup never masks the real
        # signal — the drift gate below is the source of truth.
        if: always() && github.event_name == 'schedule' && env.CHECK_EXIT != '0'
        continue-on-error: true
        env:
          # Slack-compatible {"text":...} webhook pointed at the box alert relay
          # (https://a-11-oy.com/relay/ntfy/<token>), same channel as the other
          # org guards. The relay flattens the payload to clean ntfy text.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -u
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set; cannot page the alert relay."
            exit 0
          fi
          # Message-building is extracted into build_drift_alert.py and pinned by
          # test_build_drift_alert.py (run in tests.yml) so a future edit can't
          # silently produce an empty/malformed alert — the drift wording names
          # the offending repo(s), the exit-2 wording says COULD NOT COMPLETE,
          # and neither drops its \n\n separators. The script emits the final
          # Slack-compatible {"text": ...} payload (prefix included) to stdout.
          payload="$(python3 .github/scripts/build_drift_alert.py \
            --exit-code "${CHECK_EXIT}" \
            --report .github/data/code_security_report.json \
            --drift-output /tmp/drift-output.txt)"
          code="$(curl -sS -o /tmp/alert-resp.txt -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$SLACK_WEBHOOK_URL" || echo 000)"
          echo "Alert relay responded HTTP ${code}"
          if [ "${code#2}" = "${code}" ]; then
            echo "::warning::Alert relay did not return 2xx (got ${code}): $(cat /tmp/alert-resp.txt 2>/dev/null)"
          fi

      - name: Fail if managed-security-config drift
        run: |
          case "${CHECK_EXIT:-2}" in
            0)
              echo "✓ Managed security config 252588 is enforced on every non-archived repo and is the default for new repos."
              ;;
            1)
              echo "::error::Managed-security-config drift detected. A repo is not"
              echo "::error::enforced under config 252588, is attached to a different"
              echo "::error::configuration, or the default-for-new-repos changed. See the"
              echo "::error::step output and .github/data/code_security_report.json."
              echo "::error::Re-attach via POST .../configurations/252588/attach {\"scope\":\"all\"}"
              echo "::error::or add a reasoned entry to .github/data/code_security_allowlist.json."
              exit 1
              ;;
            3)
              # Defensive: this job only runs when the preflight gate saw a token,
              # so exit 3 (no token) should not reach here. Treat it as a neutral
              # skip rather than red — honest degrade, never a fake pass.
              echo "::notice::SZL_GITHUB_TOKEN not configured; org code-security"
              echo "::notice::drift check skipped (neutral). Coverage NOT verified."
              ;;
            *)
              echo "::error::Could not complete the managed-security-config check"
              echo "::error::(the token is present but the API call failed — likely"
              echo "::error::insufficient scope; needs an org-admin PAT). This is"
              echo "::error::failed (not passed) so coverage can never look green when"
              echo "::error::the check could not actually run."
              exit 1
              ;;
          esac
