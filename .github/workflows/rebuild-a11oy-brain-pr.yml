name: Rebuild A11oy Brain capabilities PR on current main

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rebuild-a11oy-brain-pr.yml

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      TARGET_REPOSITORY: szl-holdings/a11oy
      SOURCE_BRANCH: agent/holographic-brain-capabilities-docs-20260721
      SOURCE_HEAD: 938014cd882491f01c88564126b07462f4a4552d
      REPLACEMENT_BRANCH: agent/brain-capabilities-current-20260722
    steps:
      - name: Verify owner-authorized token
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured.'
            exit 2
          }
      - name: Checkout current protected A11oy main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: main
          token: ${{ env.SZL_GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Rebuild the exact feature diff as one DCO-signed commit
        run: |
          set -euo pipefail
          git fetch origin "${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}"
          test "$(git rev-parse "origin/${SOURCE_BRANCH}")" = "${SOURCE_HEAD}"
          base="$(git rev-parse origin/main)"
          files="$(git diff --name-only "${base}...${SOURCE_HEAD}")"
          test -n "$files"
          count="$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')"
          test "$count" = 39
          git checkout -B "${REPLACEMENT_BRANCH}" origin/main
          while IFS= read -r path; do
            test -n "$path" || continue
            git checkout "${SOURCE_HEAD}" -- "$path"
          done <<< "$files"
          git diff --check
          python -m py_compile \
            szl_brain_capabilities.py \
            szl_brain_memory_schema.py \
            szl_brain_quantum_evidence.py \
            serve.py
          python -m pytest -q \
            tests/test_brain_capabilities.py \
            tests/test_brain_memory_schema.py \
            tests/test_brain_quantum_evidence.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit \
            -m 'feat(brain): add honest capabilities and evidence manifest' \
            -m 'Rebuild the exact 39-file Brain capabilities slice on current protected main. Preserve PARTIALLY OPERATIONAL maturity, MEASURED_LOCAL_PILOT scope, zero proof/trust uplift, and fail-closed promotion boundaries.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push --force-with-lease origin "HEAD:${REPLACEMENT_BRANCH}"
      - name: Open replacement PR and close stale history-bearing PR
        env:
          GH_TOKEN: ${{ env.SZL_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > /tmp/body.md <<'EOF'
          ## Outcome

          Rebuilds the exact honest Brain capabilities/evidence slice from #1003 as one DCO-signed commit on current protected main.

          - adds `/api/a11oy/v1/brain/capabilities` and `/info`;
          - preserves the 9,464-node graph as `PARTIALLY OPERATIONAL`;
          - exposes the completed local retrieval result only as `MEASURED_LOCAL_PILOT`;
          - adds memory, contradiction, provenance, security, quantum-evidence, and residual-risk contracts;
          - grants zero proof credit and zero trust uplift;
          - does not train, sign, promote, or claim a production Brain model.

          Focused Brain tests and Python compilation run before the branch is pushed. Protected CI and normal deployment remain authoritative.

          Signed-off-by: Stephen Lutar <stephenlutar2@gmail.com>
          EOF
          existing="$(gh pr list --repo "$TARGET_REPOSITORY" --state open --head "$REPLACEMENT_BRANCH" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --repo "$TARGET_REPOSITORY" --body-file /tmp/body.md
          else
            gh pr create \
              --repo "$TARGET_REPOSITORY" \
              --base main \
              --head "$REPLACEMENT_BRANCH" \
              --title 'feat(brain): add honest capabilities and evidence manifest' \
              --body-file /tmp/body.md
          fi
          gh pr close 1003 --repo "$TARGET_REPOSITORY" \
            --comment 'Superseded by the current-main, single-commit DCO-signed replacement created by the owner-authorized rebuild lane.'
