name: HF License Consistency

# Issue #202 class of drift, Hugging Face edition: the org also publishes Spaces,
# models and datasets under huggingface.co/SZLHOLDINGS, where the license is
# declared in each repo's README front-matter (license:). Those HF declarations
# can drift from the matching GitHub repo's actual LICENSE (e.g. the killinchu
# GitHub<->HF content fork) with no guard — and HF has no PR CI like GitHub.
#
# This job runs .github/scripts/hf_license_consistency.py across every PUBLIC HF
# org repo, flags a missing front-matter license:, and cross-references the
# matching szl-holdings GitHub repo's detected SPDX id. Intentional cases
# (org-card Space, dual-license, HF-only repos) are explicitly allowlisted in
# .github/data/hf_license_allowlist.json — anything else fails the job.
#
# Auth: this sweep runs with --include-private to also cover PRIVATE HF repos,
# which requires the org-scoped HF_ORG_TOKEN secret. The script PREFLIGHTS that
# token (whoami + org access + an empirical "saw >=1 private repo" floor) and
# FAILS THE JOB LOUDLY if the token is missing/expired/revoked or cannot see
# private listings — so private coverage can never silently lapse to public-only
# while still reporting green. The built-in GITHUB_TOKEN covers the GitHub SPDX
# cross-reference of public repos.

on:
  schedule:
    # Weekly sweep (Mondays 07:41 UTC) so drift is caught fast even when idle.
    # Offset from license-consistency.yml (07:23) to avoid a thundering herd.
    - cron: "41 7 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/scripts/hf_license_consistency.py"
      - ".github/data/hf_license_allowlist.json"
      - ".github/workflows/hf-license-consistency.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: hf-license-consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: HF license claims match GitHub SPDX
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # only to commit the refreshed report in szl-holdings/.github
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Check HF license consistency across the org
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Org-scoped HF token so the sweep also covers PRIVATE HF repos
          # (private datasets like szl-org-infra, szl-payloads, szl-evidence,
          # szl-charts, test-results, etc. whose front-matter license: would
          # otherwise never be verified). REQUIRED: with --include-private the
          # script fails loudly (job red) if this secret is missing/expired or
          # cannot list private repos, rather than silently checking public only.
          HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN }}
        run: |
          set +e
          # --min-private is a conservative empirical floor: the org keeps
          # several private HF repos (~8 datasets) intentionally, so requiring at
          # least 5 catches a partial collapse of private visibility (not just a
          # total drop to public-only) while tolerating ordinary deletion churn.
          # Lower it only if private repos are deliberately retired below this.
          python3 .github/scripts/hf_license_consistency.py \
            --include-private \
            --min-private 5 \
            --report .github/data/hf_license_consistency_report.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit refreshed report if changed
        # Best-effort: if main is protected (or the token can't push), this must
        # NOT mask the real signal. The drift gate below is the source of truth.
        continue-on-error: true
        if: github.repository == 'szl-holdings/.github' && github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- .github/data/hf_license_consistency_report.json; then
            echo "Report unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "Stephen P. Lutar Jr."
          git config user.email "stephenlutar2@gmail.com"
          git add .github/data/hf_license_consistency_report.json
          git commit -s -m "chore(license): refresh HF license-consistency report [skip ci]"
          git push

      - name: Fail if any HF license-claim drift
        run: |
          if [ "${CHECK_EXIT:-1}" != "0" ]; then
            echo "::error::HF license-claim drift detected. See the step output above"
            echo "::error::and .github/data/hf_license_consistency_report.json. Fix the"
            echo "::error::HF README front-matter license:, the GitHub LICENSE, or add a"
            echo "::error::reasoned entry to .github/data/hf_license_allowlist.json."
            exit 1
          fi
          echo "✓ All public HF repos' license claims are consistent."
