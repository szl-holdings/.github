name: Reusable — Docs CI
# CI-HYGIENE 2026-06-03: DavidAnson/markdownlint-cli2-action replaced with npx.
# lycheeverse/lychee-action disabled (REQUIRES ORG WHITELIST: add lycheeverse/*
# to patterns_allowed). Both had isVerifiedOwner=false, blocked by org policy.

# CI for repos that ship documentation, papers, and metadata files only
# (no compiled code). Validates citation metadata (tolerant to LicenseRef-*
# expressions), markdown structure, external links, and required governance
# files.

on:
  workflow_call:
    inputs:
      run-link-check:
        description: 'Run external link check (lychee). Disable for repos with many private/internal links.'
        required: false
        type: boolean
        default: true
      required-files:
        description: 'Newline-separated list of governance files that must be present.'
        required: false
        type: string
        default: |
          README.md
          LICENSE
          SECURITY.md
          CODE_OF_CONDUCT.md
          CONTRIBUTING.md

permissions:
  contents: read

jobs:
  citation-validate:
    name: Validate CITATION.cff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate CITATION.cff
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f CITATION.cff ]; then
            echo "::warning::No CITATION.cff to validate"
            exit 0
          fi

          python3 -m pip install --quiet 'cffconvert>=2.0.0' 'pyyaml>=6.0'

          # cffconvert --validate strictly enforces:
          #   • SPDX enum (rejects LicenseRef-* even though SPDX 2.x §3.13 allows it)
          #   • type enum (only 'software' or 'dataset' — rejects 'article', 'book', etc.)
          # Both restrictions are stricter than CFF 1.2.0 and SPDX themselves.
          # When we detect either, fall back to a structural-only validator.
          python3 <<'PY'
          import sys
          import yaml

          with open('CITATION.cff') as f:
              data = yaml.safe_load(f)

          # Required CFF 1.2.0 keys
          required = ['cff-version', 'message', 'title', 'authors']
          missing = [k for k in required if k not in data]
          if missing:
              print(f"::error::CITATION.cff missing required keys: {missing}")
              sys.exit(1)

          # Authors must be a non-empty list
          if not isinstance(data['authors'], list) or not data['authors']:
              print("::error::CITATION.cff 'authors' must be a non-empty list")
              sys.exit(1)

          # Each author needs at least family-names or name (org).
          for i, a in enumerate(data['authors']):
              if not isinstance(a, dict):
                  print(f"::error::author[{i}] must be a mapping")
                  sys.exit(1)
              if not (a.get('family-names') or a.get('name')):
                  print(f"::error::author[{i}] must have 'family-names' or 'name'")
                  sys.exit(1)

          license_value = data.get('license')
          uses_license_ref = (
              isinstance(license_value, str)
              and license_value.startswith('LicenseRef-')
          )

          # CFF 1.2.0 'type' field officially only allows 'software' and 'dataset'
          # but academic publications commonly use 'article', 'book', etc.
          # We accept the broader academic set.
          extended_types = {
              'software', 'dataset', 'article', 'book', 'thesis',
              'preprint', 'report', 'conference-paper', 'proceedings'
          }
          type_value = data.get('type')
          uses_extended_type = (
              isinstance(type_value, str)
              and type_value not in {'software', 'dataset'}
              and type_value in extended_types
          )

          if uses_license_ref or uses_extended_type:
              reasons = []
              if uses_license_ref:
                  reasons.append(f"license='{license_value}' (LicenseRef-*)")
              if uses_extended_type:
                  reasons.append(f"type='{type_value}' (extended academic type)")
              print(f"::notice::CITATION.cff: structural-only validation "
                    f"(reason: {', '.join(reasons)}). cffconvert --validate is "
                    f"stricter than CFF 1.2.0 / SPDX 2.x specs.")
          else:
              # Defer to cffconvert for full strict validation
              import subprocess
              r = subprocess.run(['cffconvert', '--validate'],
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print(r.stdout)
                  print(r.stderr, file=sys.stderr)
                  sys.exit(r.returncode)

          print("✓ CITATION.cff valid")
          PY

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: markdownlint-cli2
        # CI-HYGIENE 2026-06-03: DavidAnson/markdownlint-cli2-action replaced with npx.
        # isVerifiedOwner=false — blocked by szl-holdings org policy. npx uses the
        # pre-installed Node.js on the runner; no external action needed.
        run: |
          npx --yes markdownlint-cli2 \
            "**/*.md" \
            "!node_modules/**/*.md" \
            "!CHANGELOG.md" \
            "!LICENSE" || true
        continue-on-error: true

  link-check:
    name: External link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: inputs.run-link-check
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: lychee link check
        # CI-HYGIENE 2026-06-03: lycheeverse/lychee-action removed — isVerifiedOwner=false
        # in GitHub Marketplace; blocked by szl-holdings org allowed_actions policy.
        # REQUIRES ORG ALLOWED-ACTIONS WHITELIST UPDATE: add lycheeverse/* to
        # patterns_allowed in org settings to re-enable lycheeverse/lychee-action.
        # Temporarily disabled (was non-blocking, fail=false).
        run: |
          echo "::warning::lychee link check disabled: lycheeverse/lychee-action is blocked"
          echo "::warning::by szl-holdings org policy (isVerifiedOwner=false). Add"
          echo "::warning::lycheeverse/* to org patterns_allowed to re-enable."
          exit 0

  required-files:
    name: Required files present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify required governance files
        shell: bash
        env:
          REQUIRED_FILES: ${{ inputs.required-files }}
        run: |
          missing=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            fi
          done <<< "$REQUIRED_FILES"
          [ $missing -eq 0 ] && echo "✓ All required governance files present"
          exit $missing
