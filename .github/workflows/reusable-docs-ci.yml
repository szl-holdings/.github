name: Reusable — Docs CI

# CI for repos that ship documentation, papers, and metadata files only
# (no compiled code). Validates citation metadata (tolerant to LicenseRef-*
# expressions), markdown structure, external links, and required governance
# files.

on:
  workflow_call:
    inputs:
      run-link-check:
        description: 'Run external link check (lychee). Disable for repos with many private/internal links.'
        required: false
        type: boolean
        default: true
      required-files:
        description: 'Newline-separated list of governance files that must be present.'
        required: false
        type: string
        default: |
          README.md
          LICENSE
          SECURITY.md
          CODE_OF_CONDUCT.md
          CONTRIBUTING.md

permissions:
  contents: read

jobs:
  citation-validate:
    name: Validate CITATION.cff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - name: Validate CITATION.cff
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f CITATION.cff ]; then
            echo "::warning::No CITATION.cff to validate"
            exit 0
          fi

          python3 -m pip install --quiet 'cffconvert>=2.0.0' 'pyyaml>=6.0'

          # cffconvert --validate strictly enforces the SPDX enum and rejects
          # LicenseRef-* expressions, even though those ARE valid per the
          # CFF and SPDX specs (see SPDX 2.x §3.13). For LicenseRef-* values
          # we run a structural-only validation: parse the YAML, check
          # required fields and basic types, then skip the strict license
          # enum check.
          python3 <<'PY'
          import sys
          import yaml

          with open('CITATION.cff') as f:
              data = yaml.safe_load(f)

          # Required CFF 1.2.0 keys
          required = ['cff-version', 'message', 'title', 'authors']
          missing = [k for k in required if k not in data]
          if missing:
              print(f"::error::CITATION.cff missing required keys: {missing}")
              sys.exit(1)

          # Authors must be a non-empty list
          if not isinstance(data['authors'], list) or not data['authors']:
              print("::error::CITATION.cff 'authors' must be a non-empty list")
              sys.exit(1)

          license_value = data.get('license')
          uses_license_ref = (
              isinstance(license_value, str)
              and license_value.startswith('LicenseRef-')
          )

          if uses_license_ref:
              print(f"::notice::CITATION.cff uses '{license_value}' — "
                    f"running structural validation only (LicenseRef-* "
                    f"is valid per SPDX 2.x but not in cffconvert's enum).")
          else:
              # Defer to cffconvert for full strict validation
              import subprocess
              r = subprocess.run(['cffconvert', '--validate'],
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print(r.stdout)
                  print(r.stderr, file=sys.stderr)
                  sys.exit(r.returncode)

          print("✓ CITATION.cff valid")
          PY

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !node_modules
            !CHANGELOG.md
            !LICENSE
        continue-on-error: true

  link-check:
    name: External link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: inputs.run-link-check
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - name: lychee link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --verbose --no-progress --max-concurrency 4 './**/*.md'
          fail: false

  required-files:
    name: Required files present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - name: Verify required governance files
        shell: bash
        env:
          REQUIRED_FILES: ${{ inputs.required-files }}
        run: |
          missing=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            fi
          done <<< "$REQUIRED_FILES"
          [ $missing -eq 0 ] && echo "✓ All required governance files present"
          exit $missing
