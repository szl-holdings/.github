name: Lockfile Registry Check

# Task #308 class of drift: a lockfile (package-lock.json / npm-shrinkwrap.json /
# pnpm-lock.yaml / yarn.lock) generated inside the Replit sandbox bakes `resolved`
# URLs pointing at Replit's internal package mirror
# (http://package-firewall.replit.local/npm/...). Those hosts do NOT resolve on
# GitHub runners, so `npm install` / `pnpm install` fails with
# `EAI_AGAIN getaddrinfo package-firewall.replit.local` and any workflow that
# depends on the install step goes permanently red — silently starving whatever
# it gates (this is exactly how the docs-site security-audit gate was starved).
# The failure looks like a flaky network error, not a committed-artifact bug.
#
# This job runs .github/scripts/lockfile_registry_check.py across every PUBLIC
# repo in the org, scanning committed lockfiles for any `*.replit.local` host and
# FAILING if any are found. The fix is safe and mechanical: rewrite the host back
# to https://registry.npmjs.org/ (tarball + integrity sha are identical). For a
# per-repo fail-fast gate that catches a poisoned lockfile on the PR/push that
# introduces it (before it ever lands on main), repos call
# .github/workflows/reusable-lockfile-registry-check.yml from their own CI.
#
# It ALSO runs a coverage check (--check-coverage): only repos that already commit
# a lockfile were wired with the per-repo fail-fast caller and made required. A
# repo that *later* adds its first lockfile would otherwise have neither guard,
# silently reopening the gap. The coverage check flags any repo that commits a
# lockfile but is missing the caller workflow
# (.github/workflows/lockfile-registry.yml) or the required status check on its
# default branch, so it can be wired + required like the existing ones. Reading
# branch protection / rulesets needs the org-owner SZL_GITHUB_TOKEN; repos it
# cannot read are reported "unverifiable" and never fail the run.
#
# A coverage GAP previously only surfaced as a red scheduled run, which nobody is
# guaranteed to notice. This workflow now also PAGES a human: when the sweep finds
# a NEW coverage gap it pushes an actionable alert to the team's shared a11oy-uptime
# ntfy topic (the same SLACK_WEBHOOK_URL -> a11oy.net/relay -> a11oy-uptime-notify
# channel the other org guards use), naming each offending repo and the piece it is
# missing. The alert is edge-triggered against the previous run's committed report,
# so a gap that already existed does not re-alert on every scheduled sweep; coverage
# being fully OK is a silent no-op.
#
# Public repo listing + git-tree + raw contents read fine with the built-in
# GITHUB_TOKEN; SZL_GITHUB_TOKEN is used when present (org-owner) but not required.

on:
  schedule:
    # Weekly sweep (Mondays 07:53 UTC) so a poisoned lockfile pushed anywhere in
    # the org is caught fast even when idle.
    - cron: "53 7 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/scripts/lockfile_registry_check.py"
      - ".github/data/lockfile_registry_allowlist.json"
      - ".github/workflows/lockfile-registry-check.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: lockfile-registry-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: No lockfile references a Replit-internal registry host
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # only to commit the refreshed report in szl-holdings/.github
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Capture previous coverage-gap set (edge-trigger baseline)
        # Read the gap set recorded in the committed report from the PREVIOUS run
        # (the file present at checkout) BEFORE the scan below overwrites it. The
        # alert step compares this against the fresh result so only a NEWLY-gapped
        # repo pages, never a gap that already existed (no spam on a standing gap).
        id: prev_cov
        run: |
          set -uo pipefail
          report=.github/data/lockfile_registry_report.json
          prev=""
          if [ -f "$report" ]; then
            prev="$(python3 -c '
          import json
          try:
              r = json.load(open(".github/data/lockfile_registry_report.json"))
          except Exception:
              r = {}
          gaps = sorted(c.get("repo", "") for c in r.get("coverage", []) if c.get("status") == "GAP")
          print(",".join(g for g in gaps if g))
          ')"
          fi
          echo "prev_gap_repos=${prev}" >> "$GITHUB_OUTPUT"
          echo "Previous coverage-gap repos: ${prev:-(none)}"

      - name: Scan org lockfiles for Replit-internal registry hosts
        env:
          # SZL_GITHUB_TOKEN (org-owner) if present lets the scan also see the
          # public repo listing without the built-in token's rate limits; the
          # built-in token is a sufficient fallback (all scanned repos are public).
          SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 .github/scripts/lockfile_registry_check.py \
            --include-archived \
            --check-coverage \
            --report .github/data/lockfile_registry_report.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit refreshed report if changed
        # Best-effort: if main is protected (or the token can't push), this must
        # NOT mask the real signal. The drift gate below is the source of truth.
        continue-on-error: true
        if: github.repository == 'szl-holdings/.github' && github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- .github/data/lockfile_registry_report.json; then
            echo "Report unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "Stephen P. Lutar Jr."
          git config user.email "stephenlutar2@gmail.com"
          git add .github/data/lockfile_registry_report.json
          git commit -s -m "chore(lockfile): refresh lockfile-registry report [skip ci]"
          git push

      - name: Alert ntfy on a NEW lockfile-guard coverage gap
        # Pages the team when a repo NEWLY enters the coverage-gap state — it
        # commits a lockfile but is missing its per-repo caller workflow and/or
        # the required status check, so a *.replit.local-poisoned lockfile could
        # merge unblocked. Routed through the shared relay (SLACK_WEBHOOK_URL ->
        # a11oy.net/relay -> a11oy-uptime-notify), the same channel the box uptime
        # monitor uses, so it pages immediately instead of only being a red run.
        # Edge-triggered: a gap that already existed on the previous sweep does NOT
        # re-alert, so a standing gap never spams. Silent no-op when coverage is
        # fully OK or when the webhook secret is unset (the red job below remains
        # the signal). This step never fails the job.
        if: always() && github.event_name != 'pull_request'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PREV_GAP_REPOS: ${{ steps.prev_cov.outputs.prev_gap_repos }}
        run: |
          set -uo pipefail
          report=.github/data/lockfile_registry_report.json
          if [ ! -f "$report" ]; then
            echo "No report on disk; nothing to alert."
            exit 0
          fi
          # Rising-edge gap set (current GAP repos absent on the previous sweep)
          # plus a human-readable "repo: missing piece" list. shlex.quote keeps the
          # eval below injection-safe.
          assigns="$(python3 -c '
          import json, os, shlex
          try:
              r = json.load(open(".github/data/lockfile_registry_report.json"))
          except Exception:
              r = {}
          cur = {c.get("repo", ""): (c.get("gaps") or [])
                 for c in r.get("coverage", []) if c.get("status") == "GAP"}
          cur.pop("", None)
          prev = set(x for x in os.environ.get("PREV_GAP_REPOS", "").split(",") if x)
          new = sorted(set(cur) - prev)
          lines = []
          for repo in sorted(cur):
              for g in (cur[repo] or ["(unspecified gap)"]):
                  lines.append(repo + ": " + g)
          print("NEW_GAPS=" + shlex.quote(",".join(new)))
          print("GAP_DESC=" + shlex.quote("; ".join(lines)))
          ')" || assigns=""
          eval "$assigns"
          NEW_GAPS="${NEW_GAPS:-}"
          GAP_DESC="${GAP_DESC:-}"
          if [ -z "$NEW_GAPS" ]; then
            echo "No NEW coverage gap since the previous sweep; not alerting (edge-triggered)."
            exit 0
          fi
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set; skipping ntfy push (the red job is still the signal)."
            exit 0
          fi
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          text=":rotating_light: Lockfile-guard COVERAGE GAP (newly detected: ${NEW_GAPS}): a repo commits a lockfile but is missing its per-repo lockfile guard, so a *.replit.local-poisoned lockfile could merge unblocked. Missing -> ${GAP_DESC}. Fix: add .github/workflows/lockfile-registry.yml (uses szl-holdings/.github reusable-lockfile-registry-check.yml@main) and make the 'lockfiles / No lockfile references a Replit-internal registry host' check required on the default branch. Run: ${run_url}"
          payload="$(python3 -c 'import json,sys; print(json.dumps({"text": sys.argv[1]}))' "$text")"
          code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" || echo 000)"
          echo "ntfy relay responded HTTP ${code}"
          [ "$code" = "200" ] || echo "::warning::ntfy relay returned ${code} (not 200); check the relay."
          exit 0

      - name: Fail on a poisoned lockfile OR an unprotected lockfile repo
        run: |
          if [ "${CHECK_EXIT:-1}" != "0" ]; then
            echo "::error::The lockfile registry sweep failed. One or both of:"
            echo "::error:: (1) A committed lockfile references a Replit-internal"
            echo "::error::     (*.replit.local) registry host, which breaks npm/pnpm"
            echo "::error::     install on GitHub runners. Fix (safe — integrity sha is"
            echo "::error::     unchanged): rewrite the host to https://registry.npmjs.org/,"
            echo "::error::     e.g. run"
            echo "::error::       python3 .github/scripts/lockfile_registry_check.py --local . --fix"
            echo "::error::     then commit the rewritten lockfile."
            echo "::error:: (2) A repo now commits a lockfile but is missing the per-repo"
            echo "::error::     caller workflow (.github/workflows/lockfile-registry.yml) or"
            echo "::error::     the required '<job> / No lockfile references a Replit-internal"
            echo "::error::     registry host' status check on its default branch. Wire the"
            echo "::error::     caller (uses: szl-holdings/.github/.github/workflows/"
            echo "::error::     reusable-lockfile-registry-check.yml@main) and make that"
            echo "::error::     check required, like the existing protected repos."
            echo "::error::See the annotations above and"
            echo "::error::.github/data/lockfile_registry_report.json (results + coverage)."
            exit 1
          fi
          echo "✓ No poisoned lockfile, and every lockfile-bearing repo is wired + required."
