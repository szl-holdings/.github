name: Diagnose HF release finalization

on:
  push:
    branches:
      - diagnose/hf-release-finalization-d661
    paths:
      - .github/workflows/diagnose-hf-release-finalization.yml
      - .github/scripts/hf_release_finalization.py
      - .github/scripts/hf_release_finalization_entrypoint.py
      - .github/scripts/test_hf_release_finalization.py
      - .github/scripts/test_hf_release_finalization_entrypoint.py
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-hf-release-finalization.yml
      - .github/scripts/hf_release_finalization.py
      - .github/scripts/hf_release_finalization_entrypoint.py
      - .github/scripts/test_hf_release_finalization.py
      - .github/scripts/test_hf_release_finalization_entrypoint.py

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install import-time dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            'huggingface_hub>=1.3,<2' \
            'requests>=2.32,<3'

      - name: Capture exact compile and unit-test output
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python -m py_compile \
              .github/scripts/hf_release_finalization.py \
              .github/scripts/hf_release_finalization_entrypoint.py \
              .github/scripts/test_hf_release_finalization.py \
              .github/scripts/test_hf_release_finalization_entrypoint.py
            python .github/scripts/test_hf_release_finalization.py
            python .github/scripts/test_hf_release_finalization_entrypoint.py
          } 2>&1 | tee hf-release-finalization-diagnostic.log

      - name: Upload exact diagnostic log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-release-finalization-diagnostic-${{ github.run_id }}
          path: hf-release-finalization-diagnostic.log
          if-no-files-found: error
          retention-days: 7

      - name: Preserve failing status
        if: steps.tests.outcome != 'success'
        run: exit 1
