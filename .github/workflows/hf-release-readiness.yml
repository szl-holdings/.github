name: HF Release Readiness

on:
  push:
    branches: [main]
    paths:
      - .github/scripts/hf_release_readiness_verify.py
      - .github/scripts/test_hf_release_readiness_verify.py
      - .github/workflows/hf-release-readiness.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/hf_release_readiness_verify.py
      - .github/scripts/test_hf_release_readiness_verify.py
      - .github/workflows/hf-release-readiness.yml
      - .github/workflows/hf-release-readiness-v2.yml
      - .github/scripts/hf_release_readiness_v2.py
      - .github/scripts/test_hf_release_readiness_v2.py
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the immutable readiness report
        required: false
        default: "true"

permissions:
  contents: read
  issues: write

concurrency:
  group: hf-release-readiness-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lake viewer HTTP 200 and exact torch27 kernel selfchecks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      GH_TOKEN: ${{ github.token }}
      REPORT_ISSUE_TITLE: '[hf-release-finalization-report] Lake viewer and kernel selfchecks'
    steps:
      - name: Checkout readiness verifier
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Determine execution mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          publish=true
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then publish=false; fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then publish=false; fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

      - name: Require governed Hugging Face credential
        if: steps.mode.outputs.publish == 'true'
        run: |
          set -euo pipefail
          if [ -z "${HF_ORG_TOKEN:-}" ] && [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::No supported Hugging Face organization credential is configured."
            exit 2
          fi

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install exact CPU runtime and supported Hub clients
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            --index-url https://download.pytorch.org/whl/cpu \
            "torch==2.7.1"
          python -m pip install --disable-pip-version-check \
            "numpy==2.2.6" \
            "huggingface_hub>=1.3,<2" \
            "kernels==0.16.0" \
            "requests>=2.32,<3"
          python - <<'PY'
          import numpy as np
          import torch
          assert np.__version__ == '2.2.6', np.__version__
          assert torch.__version__.split('+', 1)[0] == '2.7.1', torch.__version__
          assert not torch.cuda.is_available(), 'readiness verification must use CPU PyTorch'
          print('verified release-readiness runtime:', torch.__version__, np.__version__)
          PY

      - name: Verify bounded readiness contract
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/hf_release_readiness_verify.py \
            .github/scripts/test_hf_release_readiness_verify.py
          python .github/scripts/test_hf_release_readiness_verify.py
          git diff --check

      - name: Verify published revisions without rewriting them
        if: steps.mode.outputs.publish == 'true'
        id: readiness
        shell: bash
        run: |
          set +e
          python .github/scripts/hf_release_readiness_verify.py \
            --generation "${GITHUB_SHA}" \
            --publish
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable readiness evidence
        if: always() && steps.mode.outputs.publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-release-readiness-${{ github.run_id }}
          path: reports/hf-release-readiness-latest.json
          if-no-files-found: error
          retention-days: 90

      - name: Persist deterministic release report
        if: always() && steps.mode.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f reports/hf-release-readiness-latest.json
          {
            echo '<!-- szl-hf-release-finalization-report -->'
            echo '# Hugging Face release finalization'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat reports/hf-release-readiness-latest.json
            echo '```'
          } > /tmp/hf-release-readiness.md

          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state all \
            --search "${REPORT_ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
            | head -n1)"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/hf-release-readiness.md
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_ISSUE_TITLE" \
              --body-file /tmp/hf-release-readiness.md >/dev/null
            issue_number="$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state all \
              --search "${REPORT_ISSUE_TITLE} in:title" \
              --json number,title \
              --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
              | head -n1)"
          fi

          if python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('reports/hf-release-readiness-latest.json').read_text())
          dataset = report.get('results', {}).get('dataset', {})
          kernels = report.get('results', {}).get('kernels', {})
          ok = (
              report.get('summary', {}).get('error') == 0
              and dataset.get('viewer_http_status') == 200
              and len(kernels) == 2
              and all(item.get('revision') for item in kernels.values())
              and all(item.get('selfcheck') not in (None, False) for item in kernels.values())
          )
          raise SystemExit(0 if ok else 1)
          PY
          then
            gh issue close "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --reason completed \
              --comment 'The live Lake viewer returned HTTP 200 and both exact kernel revisions passed selfcheck() under the pinned NumPy 2.2.6 and CPU PyTorch 2.7.1 runtime.' || true
          else
            gh issue reopen "$issue_number" --repo "$GITHUB_REPOSITORY" || true
          fi

      - name: Publish pull-request boundary
        if: steps.mode.outputs.publish != 'true'
        run: |
          {
            echo '## Pull-request validation boundary'
            echo
            echo 'Deterministic compile, runtime, and contract tests passed. Live Hugging Face Viewer and kernel evidence is intentionally deferred to the protected-main push and recurring schedule so external asynchronous state cannot block code review.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish schedule boundary
        if: github.event_name == 'schedule'
        run: |
          echo 'This scheduled run is read-only for the Lake and kernel assets; only immutable evidence and the deterministic GitHub issue may be updated.' >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce fail-closed readiness result
        if: always() && steps.mode.outputs.publish == 'true'
        run: |
          code="${{ steps.readiness.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Release readiness failed with exit ${code}."
            exit "$code"
          fi
          echo 'Lake viewer and both kernel selfchecks passed at immutable revisions.'
