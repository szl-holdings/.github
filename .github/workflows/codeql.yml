name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for analyzable code
        id: check-code
        run: |
          # Check if there's any code to analyze
          JS_FILES=$(find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" 2>/dev/null | grep -v node_modules | grep -v ".git" | wc -l)
          echo "js_files=$JS_FILES" >> "$GITHUB_OUTPUT"
          echo "Found $JS_FILES JS/TS files"
      - name: Initialize CodeQL
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript-typescript
      - name: Autobuild
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
      - name: Perform CodeQL Analysis
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
      - name: CodeQL skipped (no analyzable code)
        if: steps.check-code.outputs.js_files == '0'
        run: echo "No JavaScript/TypeScript files found — CodeQL analysis not applicable for this repo type."