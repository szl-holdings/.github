name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check for analyzable code
        id: check-code
        run: |
          # Check if there's any code to analyze
          JS_FILES=$(find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" 2>/dev/null | grep -v node_modules | grep -v ".git" | wc -l)
          echo "js_files=$JS_FILES" >> "$GITHUB_OUTPUT"
          echo "Found $JS_FILES JS/TS files"
      - name: Initialize CodeQL
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/init@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
        with:
          languages: javascript-typescript
      - name: Autobuild
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/autobuild@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
      - name: Perform CodeQL Analysis
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/analyze@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
      - name: CodeQL skipped (no analyzable code)
        if: steps.check-code.outputs.js_files == '0'
        run: echo "No JavaScript/TypeScript files found — CodeQL analysis not applicable for this repo type."