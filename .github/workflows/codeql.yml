name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check for analyzable code
        id: check-code
        run: |
          # Check if there's any code to analyze
          JS_FILES=$(find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" 2>/dev/null | grep -v node_modules | grep -v ".git" | wc -l)
          echo "js_files=$JS_FILES" >> "$GITHUB_OUTPUT"
          echo "Found $JS_FILES JS/TS files"
      - name: Initialize CodeQL
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
      - name: Autobuild
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Perform CodeQL Analysis
        if: steps.check-code.outputs.js_files != '0'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: CodeQL skipped (no analyzable code)
        if: steps.check-code.outputs.js_files == '0'
        run: echo "No JavaScript/TypeScript files found — CodeQL analysis not applicable for this repo type."