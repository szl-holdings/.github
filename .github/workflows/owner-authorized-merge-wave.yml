name: Transactional owner-authorized exact-SHA merge

on:
  pull_request:
    branches: [main]
    paths:
      - .github/data/owner_authorized_merge_wave.json
      - .github/scripts/owner_authorized_merge_wave.py
      - .github/scripts/transactional_owner_merge.py
      - .github/scripts/test_transactional_owner_merge.py
      - .github/workflows/owner-authorized-merge-wave.yml
  push:
    branches: [main]
    paths:
      - .github/data/owner_authorized_merge_wave.json
      - .github/scripts/owner_authorized_merge_wave.py
      - .github/scripts/transactional_owner_merge.py
      - .github/scripts/test_transactional_owner_merge.py
      - .github/workflows/owner-authorized-merge-wave.yml
  workflow_dispatch:
    inputs:
      execute:
        description: Execute the exact transaction instead of verification-only mode
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: transactional-owner-authorized-merge
  cancel-in-progress: false

jobs:
  validate:
    name: Validate transactional merge implementation
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Compile and run contract tests
        run: |
          set -euo pipefail
          python -m py_compile \
            .github/scripts/owner_authorized_merge_wave.py \
            .github/scripts/transactional_owner_merge.py \
            .github/scripts/test_transactional_owner_merge.py
          python .github/scripts/test_transactional_owner_merge.py
          git diff --check

  transaction:
    name: Restore protections, verify, and merge exact head
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      REPORT_ISSUE_TITLE: '[merge-wave-report] owner-authorized exact-SHA wave'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Determine transaction mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          execute=false
          if [ "${GITHUB_EVENT_NAME}" = push ]; then
            execute=true
          elif [ "${GITHUB_EVENT_NAME}" = workflow_dispatch ] && [ "${{ inputs.execute }}" = true ]; then
            execute=true
          fi
          echo "execute=${execute}" >> "$GITHUB_OUTPUT"

      - name: Verify owner credential is configured
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SZL_GITHUB_TOKEN:-}" || {
            echo '::error::SZL_GITHUB_TOKEN is not configured'
            exit 2
          }

      - name: Execute fail-closed transaction
        id: transaction
        shell: bash
        run: |
          set +e
          args=(
            --manifest .github/data/owner_authorized_merge_wave.json
            --report transactional-owner-merge-report.json
          )
          if [ "${{ steps.mode.outputs.execute }}" = true ]; then
            args+=(--execute)
          fi
          python .github/scripts/transactional_owner_merge.py "${args[@]}"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable transaction report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: transactional-owner-merge-report-${{ github.run_id }}
          path: transactional-owner-merge-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Persist execution report in deterministic issue
        if: always() && steps.mode.outputs.execute == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f transactional-owner-merge-report.json
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo '<!-- szl-owner-authorized-merge-report -->'
            echo '# Transactional owner-authorized exact-SHA merge'
            echo
            echo "- Run: ${run_url}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo
            echo '```json'
            cat transactional-owner-merge-report.json
            echo '```'
          } > /tmp/merge-wave-issue.md
          issue_number="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state all \
            --search "${REPORT_ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" \
            | head -n1)"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/merge-wave-issue.md
            if [ "${{ steps.transaction.outputs.exit_code }}" = 0 ]; then
              gh issue close "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --reason completed \
                --comment 'Exact-head transaction completed and every temporary protection change was restored.' || true
            else
              gh issue reopen "$issue_number" --repo "$GITHUB_REPOSITORY" || true
            fi
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$REPORT_ISSUE_TITLE" \
              --body-file /tmp/merge-wave-issue.md
          fi

      - name: Add report to job summary
        if: always()
        run: |
          {
            echo '## Transactional owner-authorized merge'
            echo
            if [ -f transactional-owner-merge-report.json ]; then
              echo '```json'
              cat transactional-owner-merge-report.json
              echo '```'
            else
              echo 'No transaction report was produced.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce fail-closed result
        if: always()
        run: |
          code="${{ steps.transaction.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          if [ "$code" -ne 0 ]; then
            echo "::error::Transactional merge failed closed with exit ${code}; inspect the immutable report."
            exit "$code"
          fi
          echo 'Transaction completed successfully.'
