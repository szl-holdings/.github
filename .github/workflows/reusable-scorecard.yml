name: Reusable — OSSF Scorecard

# Runs the OpenSSF Scorecard against the repo and uploads results to the
# Security tab. Provides a public supply-chain hygiene score.
#
# NOTE: We deliberately do NOT include `branch_protection_rule` as a trigger
# in caller workflows because that event runs without a checked-out commit
# context and produces a `startup_failure` on the Scorecard analysis job.
# Use `schedule` + `push: branches: [main]` instead.

on:
  workflow_call:
    inputs:
      publish-results:
        description: 'Publish scorecard results to the public OSSF database'
        required: false
        type: boolean
        default: true

# Workflow-level permissions deliberately omitted: GitHub clamps job-level
# permissions to the workflow ceiling, and the analysis job below needs
# 'security-events: write' and 'id-token: write'. Setting 'read-all' here
# produces a startup_failure for every caller.

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ inputs.publish-results }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v3.30.10
        with:
          sarif_file: results.sarif
