name: Reusable — OSSF Scorecard

# Runs the OpenSSF Scorecard against the repo and uploads results to the
# Security tab. Provides a public supply-chain hygiene score.
#
# NOTE: We deliberately do NOT include `branch_protection_rule` as a trigger
# in caller workflows because that event runs without a checked-out commit
# context and produces a `startup_failure` on the Scorecard analysis job.
# Use `schedule` + `push: branches: [main]` instead.

on:
  workflow_call:
    inputs:
      publish-results:
        description: 'Publish scorecard results to the public OSSF database'
        required: false
        type: boolean
        default: true

# Top-level permissions set to read-only; security-events/id-token granted at job level only.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ inputs.publish-results }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif
