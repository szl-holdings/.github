name: Publish A11oy Public Domain Receipt

on:
  push:
    branches: [ops/greenlight-finalize-20260722]
    paths:
      - .github/scripts/hf_domain_receipt_publish.py
      - .github/workflows/hf-domain-receipt-publish.yml
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-a11oy-public-domain-receipt-20260722
  cancel-in-progress: false

env:
  HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_ORG_TOKEN1 }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_HUB_DISABLE_PROGRESS_BARS: "1"

jobs:
  publish:
    name: Publish receipt to five Spaces and verify Hugging Face plus custom domain
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/greenlight-finalize-20260722
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install supported Hugging Face client
        run: python -m pip install --disable-pip-version-check "huggingface_hub>=1.4,<2"
      - name: Validate bounded publisher
        run: |
          set -euo pipefail
          python -m py_compile .github/scripts/hf_domain_receipt_publish.py
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('.github/scripts/hf_domain_receipt_publish.py')
          spec = importlib.util.spec_from_file_location('hf_domain_receipt_publish', path)
          module = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          spec.loader.exec_module(module)
          assert len(module.COMMAND_CENTERS) == 5
          assert set(module.PROBE_ORIGINS) == {'https://szlholdings-a11oy.hf.space', 'https://a-11-oy.com'}
          assert 'source_revision' in path.read_text(encoding='utf-8')
          print('validated bounded A11oy public receipt publisher')
          PY
          git diff --check
      - name: Verify credential
        id: credential
        shell: bash
        run: |
          mkdir -p reports
          if [ -n "${HF_ORG_TOKEN:-}" ] || [ -n "${HF_TOKEN:-}" ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
            printf '%s\n' '{"schema":"szl.a11oy-public-deployment-receipt-publication/v1","publish":true,"ok":false,"errors":["Hugging Face token is not configured"]}' > reports/hf-domain-receipt-publication.json
          fi
      - name: Publish and verify immutable receipt
        if: steps.credential.outputs.present == 'true'
        id: execute
        shell: bash
        run: |
          set +e
          python .github/scripts/hf_domain_receipt_publish.py \
            --report reports/hf-domain-receipt-publication.json
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload immutable report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hf-domain-receipt-publication-${{ github.run_id }}
          path: reports/hf-domain-receipt-publication.json
          if-no-files-found: error
          retention-days: 90
      - name: Enforce real public result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.credential.outputs.present }}" != "true" ]; then exit 2; fi
          code="${{ steps.execute.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          exit "$code"
