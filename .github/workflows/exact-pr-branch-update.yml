name: Exact pull-request branch update

on:
  pull_request:
    branches: [main]
    paths:
      - .github/data/exact_pr_branch_updates.json
      - .github/scripts/update_exact_pr_branches.py
      - .github/workflows/exact-pr-branch-update.yml
  push:
    branches: [main]
    paths:
      - .github/data/exact_pr_branch_updates.json
      - .github/scripts/update_exact_pr_branches.py
      - .github/workflows/exact-pr-branch-update.yml
  workflow_dispatch:
    inputs:
      execute:
        description: Execute the exact branch-update manifest
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: exact-pr-branch-update
  cancel-in-progress: false

jobs:
  validate:
    name: Validate exact branch-update manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Compile updater and validate manifest
        run: |
          set -euo pipefail
          python -m py_compile .github/scripts/update_exact_pr_branches.py
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.github/data/exact_pr_branch_updates.json').read_text())
          assert data['schema'] == 'szl.exact-pr-branch-update/v1'
          assert data['targets']
          for target in data['targets']:
              assert target['expected_base_branch'] == 'main'
              for field in ('expected_head_sha', 'expected_base_sha'):
                  assert len(target[field]) == 40
                  int(target[field], 16)
          print(f"validated {len(data['targets'])} exact branch update(s)")
          PY

  execute:
    name: Merge exact protected bases into exact PR heads
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.execute)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      REPORT_TITLE: '[branch-update-report] exact pull-request base updates'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Execute exact update manifest
        id: update
        shell: bash
        run: |
          set +e
          python .github/scripts/update_exact_pr_branches.py \
            --manifest .github/data/exact_pr_branch_updates.json \
            --report exact-pr-branch-update-report.json \
            --execute
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload immutable report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: exact-pr-branch-update-report
          path: exact-pr-branch-update-report.json
          if-no-files-found: error
      - name: Persist report in deterministic issue
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f exact-pr-branch-update-report.json
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo '<!-- szl-exact-pr-branch-update-report -->'
            echo '# Exact pull-request branch updates'
            echo
            echo "- Run: ${run_url}"
            echo "- Source revision: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat exact-pr-branch-update-report.json
            echo '```'
          } > /tmp/branch-update-report.md
          number="$(gh issue list --repo "$GITHUB_REPOSITORY" --state all \
            --search "${REPORT_TITLE} in:title" --json number,title \
            --jq ".[] | select(.title == env.REPORT_TITLE) | .number" | head -n1)"
          if [ -n "$number" ]; then
            gh issue edit "$number" --repo "$GITHUB_REPOSITORY" --body-file /tmp/branch-update-report.md
            if [ "${{ steps.update.outputs.exit_code }}" = "0" ]; then
              gh issue close "$number" --repo "$GITHUB_REPOSITORY" --reason completed \
                --comment 'Exact pull-request branch update completed successfully.' || true
            else
              gh issue reopen "$number" --repo "$GITHUB_REPOSITORY" || true
            fi
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$REPORT_TITLE" --body-file /tmp/branch-update-report.md
          fi
      - name: Add report to summary
        if: always()
        run: |
          echo '## Exact pull-request branch update' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat exact-pr-branch-update-report.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce fail-closed result
        if: always()
        run: |
          code="${{ steps.update.outputs.exit_code }}"
          if [ -z "$code" ] || [ "$code" -ne 0 ]; then
            echo "::error::Exact PR branch update failed closed; inspect the report."
            exit "${code:-2}"
          fi
