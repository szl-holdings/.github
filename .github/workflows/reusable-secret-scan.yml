name: Reusable — Secret Scan

# Scans the repo for committed secrets using TruffleHog. Runs on every push,
# every PR, and a weekly cron.

on:
  workflow_call:
    inputs:
      extra-args:
        description: 'Additional arguments passed to TruffleHog'
        required: false
        type: string
        default: '--only-verified'

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          extra_args: ${{ inputs.extra-args }}
