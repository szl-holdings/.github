name: Reusable — Secret Scan

# Scans the repo for committed secrets using TruffleHog. Runs on every push,
# every PR, and a weekly cron.

on:
  workflow_call:
    inputs:
      extra-args:
        description: 'Additional arguments passed to TruffleHog'
        required: false
        type: string
        default: '--only-verified'

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: ${{ inputs.extra-args }}
