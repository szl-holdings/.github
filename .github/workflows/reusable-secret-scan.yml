name: Reusable — Secret Scan

# Scans the repo for committed secrets using TruffleHog. Runs on every push,
# every PR, and a weekly cron.

on:
  workflow_call:
    inputs:
      extra-args:
        description: 'Additional arguments passed to TruffleHog'
        required: false
        type: string
        default: '--only-verified'

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          extra_args: ${{ inputs.extra-args }}
