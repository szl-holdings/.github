name: Reusable — Secret Scan

# Scans the repo for committed secrets using TruffleHog. Runs on every push,
# every PR, and a weekly cron.

on:
  workflow_call:
    inputs:
      extra-args:
        description: 'Additional arguments passed to TruffleHog'
        required: false
        type: string
        default: '--only-verified'

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: ${{ inputs.extra-args }}
