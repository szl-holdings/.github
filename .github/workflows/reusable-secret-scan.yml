name: Reusable — Secret Scan

# Scans the repo for committed secrets using TruffleHog. Runs on every push,
# every PR, and a weekly cron.

on:
  workflow_call:
    inputs:
      extra-args:
        description: 'Additional arguments passed to TruffleHog'
        required: false
        type: string
        default: '--only-verified'

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: ${{ inputs.extra-args }}
