name: Operational Green-Light Finalizer Run

on:
  push:
    branches: [ops/greenlight-finalize-20260722]
    paths:
      - .github/scripts/greenlight_finalize.py
      - .github/workflows/greenlight-finalize-run.yml
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: operational-green-light-finalizer-run-20260722
  cancel-in-progress: false

env:
  SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
  GH_TOKEN: ${{ github.token }}

jobs:
  finalize:
    name: Merge exact lanes and execute protected producers
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/greenlight-finalize-20260722
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Validate implementation
        run: |
          set -euo pipefail
          python -m py_compile .github/scripts/greenlight_finalize.py
          git diff --check
      - name: Verify credential
        id: credential
        shell: bash
        run: |
          if [ -n "${SZL_GITHUB_TOKEN:-}" ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
            mkdir -p reports
            printf '%s\n' '{"schema":"szl.greenlight-finalizer/v1","ok":false,"errors":["SZL_GITHUB_TOKEN is not configured"]}' > reports/greenlight-finalizer-latest.json
          fi
      - name: Execute finalizer
        if: steps.credential.outputs.present == 'true'
        id: execute
        shell: bash
        run: |
          set +e
          python .github/scripts/greenlight_finalize.py \
            --report reports/greenlight-finalizer-latest.json \
            --source-timeout 7200
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload immutable report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operational-green-light-finalizer-run-${{ github.run_id }}
          path: reports/greenlight-finalizer-latest.json
          if-no-files-found: error
          retention-days: 90
      - name: Enforce real result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.credential.outputs.present }}" != "true" ]; then exit 2; fi
          code="${{ steps.execute.outputs.exit_code }}"
          if [ -z "$code" ]; then code=2; fi
          exit "$code"
