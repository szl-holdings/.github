name: Public Repo Link Check

# Task #186 / #236 class of drift: a PUBLIC trust surface (a README or docs page)
# links to github.com/szl-holdings/<repo> for a repo that is now PRIVATE or has
# been deleted, so the link 404s for an anonymous visitor. This happened when
# lutar-lean was made private and left dead click-throughs in the public
# docs-site and szl-cookbook READMEs. The org flips repo visibility fairly often,
# so this recurs on every flip. For a "provable honesty" thesis, a public page
# that points at a 404 must never ship silently.
#
# This job runs .github/scripts/public_repo_link_check.py across every PUBLIC repo
# in the org, scanning README files and docs/ pages for click-through links to
# github.com/szl-holdings/<repo> and flagging any target that is currently private
# or missing. shields.io / image-badge URLs are ignored (only click-throughs are
# checked). Intentional exceptions live in
# .github/data/public_repo_link_allowlist.json.
#
# Severity split (matches the recurring incident exactly):
#   * a link to a now-PRIVATE repo (the visibility-flip case) is an ERROR and
#     FAILS the job -- surfaced as a ::error:: annotation.
#   * a link to a DELETED/missing repo is the same 404 to a visitor. This was a
#     pre-existing backlog rather than the flip trigger, so it was surfaced as a
#     ::warning:: WITHOUT failing the job. That backlog is now cleared (0 links to
#     missing repos org-wide), so --fail-on-missing is ENABLED below: a link to a
#     deleted/missing repo is now an ERROR that fails the job, same as a private
#     target. (Deep org-link rot -- 404 blob/release URLs + anchor mismatches --
#     remains a separate, still-open backlog surfaced WARN-only; --fail-on-deep /
#     --fail-on-anchor stay off until that is cleared too.)
#
# Knowing a target is PRIVATE (vs merely missing) needs a token that can see the
# org's private repos: SZL_GITHUB_TOKEN if present, else the built-in token (which
# downgrades private targets to "missing" -- still flagged, just less precisely).

on:
  schedule:
    # Weekly sweep (Mondays 07:41 UTC) so a visibility flip is caught fast.
    - cron: "41 7 * * 1"
  workflow_dispatch:
    inputs:
      check_external:
        description: >-
          Also liveness-check EXTERNAL (non-org) click-through URLs. Off by
          default: external sites flake, so this is a manual opt-in and its
          (noisier) report is NOT auto-committed. Deep org-link rot is always
          checked on every run.
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - ".github/scripts/public_repo_link_check.py"
      - ".github/data/public_repo_link_allowlist.json"
      - ".github/workflows/public-repo-link-check.yml"
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: public-repo-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Public pages link only to reachable repos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # only to commit the refreshed report in szl-holdings/.github
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Scan public pages for links to private/deleted repos
        env:
          # SZL_GITHUB_TOKEN (org-owner) lets the check see private repos so it can
          # label a target "private" vs "missing"; falls back to the built-in token.
          SZL_GITHUB_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          # --fail-on-missing is ON: the deleted/missing-repo backlog is cleared
          # (0 org-wide), so a public page linking to a missing org repo now fails
          # the build, same as a private target. Deep org-link rot (404 blob/release
          # URLs + anchor mismatches) is deterministic but still a pre-existing
          # backlog, so it stays WARN-only (no --fail-on-deep / --fail-on-anchor)
          # until that is cleared. External liveness is opt-in only.
          EXTRA=""
          if [ "${{ github.event.inputs.check_external }}" = "true" ]; then
            EXTRA="--check-external"
          fi
          python3 .github/scripts/public_repo_link_check.py \
            --scan-docs \
            --check-deep-links \
            --fail-on-missing \
            $EXTRA \
            --report .github/data/public_repo_link_report.json
          echo "CHECK_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit refreshed report if changed
        # Skip the auto-commit when external liveness was requested: that report
        # is noisier/non-deterministic, so the committed canonical report always
        # reflects the deterministic scheduled config (docs + deep links).
        if: github.repository == 'szl-holdings/.github' && github.event_name != 'pull_request' && github.event.inputs.check_external != 'true'
        run: |
          if git diff --quiet -- .github/data/public_repo_link_report.json; then
            echo "Report unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "Stephen P. Lutar Jr."
          git config user.email "stephenlutar2@gmail.com"
          git add .github/data/public_repo_link_report.json
          git commit -s -m "chore(links): refresh public-repo-link report [skip ci]"
          # The report refresh is housekeeping, NOT the reachability gate
          # (that is the dedicated step below, which reads $CHECK_EXIT). If
          # protected main rejects an unsigned Actions push (branch
          # protection / required signed commits), fail LOUD (annotation +
          # job summary) but do NOT red-light the run -- the gate verdict
          # must stand on its own, and CI must never open a PR (org
          # auto-PR lockdown).
          if git push; then
            echo "Refreshed link report committed to main."
          else
            echo "::warning::Could not push the refreshed public-repo-link"
            echo "::warning::report to protected main (branch protection /"
            echo "::warning::signed-commit rule). This is housekeeping only"
            echo "::warning::and never gates reachability; the check verdict"
            echo "::warning::in the next step still stands."
            {
              echo "### public-repo-link report refresh skipped (non-blocking)"
              echo ""
              echo "The reachability check ran (see the gate step below)."
              echo "The auto-commit of the refreshed report file could not"
              echo "be pushed to protected \`main\` (signed-commit / branch"
              echo "protection). This is **non-blocking** housekeeping; the"
              echo "gate verdict stands."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if any public page links to a private or deleted/missing repo
        run: |
          if [ "${CHECK_EXIT:-1}" != "0" ]; then
            echo "::error::A public README/docs page links to a now-PRIVATE or"
            echo "::error::DELETED/missing szl-holdings repo (404 for anonymous"
            echo "::error::visitors). See the annotations above and"
            echo "::error::.github/data/public_repo_link_report.json."
            echo "::error::Fix: repoint the link, re-publish the target repo, or add a"
            echo "::error::reasoned entry to .github/data/public_repo_link_allowlist.json."
            exit 1
          fi
          echo "✓ No public page links to a private or deleted/missing szl-holdings repo."
          echo "  (Deep org-link rot -- 404 blob/release URLs + anchor mismatches --"
          echo "   is surfaced as ::warning:: annotations and in the report without"
          echo "   failing; --fail-on-deep / --fail-on-anchor stay off until cleared.)"
