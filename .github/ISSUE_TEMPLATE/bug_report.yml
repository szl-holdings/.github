name: Bug report
description: Report a defect in an SZL Holdings product or library.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough
        information for us to reproduce the issue.

        **Security issues should not be filed here.** See SECURITY.md for
        the private disclosure process.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which release, commit SHA, or deployment environment?
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, complete, reproducible example.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, runtime version, browser, etc."
