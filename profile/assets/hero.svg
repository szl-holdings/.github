<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#e8c675"/>
      <stop offset="50%" stop-color="#d4a054"/>
      <stop offset="100%" stop-color="#b8862c"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a10"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a054" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4a054" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4a054" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="320" fill="url(#bgGrad)"/>

  <rect x="0" y="0" width="900" height="1" fill="url(#lineGrad)"/>
  <rect x="0" y="319" width="900" height="1" fill="url(#lineGrad)"/>

  <g opacity="0.04">
    <line x1="150" y1="0" x2="150" y2="320" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="320" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#d4a054" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#d4a054" stroke-width="0.5"/>
  </g>

  <rect x="380" y="30" width="52" height="52" rx="10" fill="url(#goldGrad)"/>
  <text x="406" y="62" fill="#060a10" font-family="Georgia, serif" font-size="18" font-weight="800" text-anchor="middle">SZL</text>

  <text x="450" y="118" fill="#f1f5f9" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" letter-spacing="1">Stephen Lutar</text>

  <text x="450" y="146" fill="#d4a054" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" text-anchor="middle" letter-spacing="3">FOUNDER &amp; CEO  ·  SZL HOLDINGS</text>

  <rect x="150" y="170" width="600" height="1" fill="url(#lineGrad)"/>

  <text x="186" y="206" fill="#d4a054" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#glow)">16</text>
  <text x="186" y="222" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle" letter-spacing="1">LIVE APPS</text>

  <text x="350" y="206" fill="#d4a054" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#glow)">446</text>
  <text x="356" y="222" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle" letter-spacing="1">DB TABLES</text>

  <text x="510" y="206" fill="#d4a054" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#glow)">1,618+</text>
  <text x="530" y="222" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle" letter-spacing="1">API ENDPOINTS</text>

  <text x="700" y="206" fill="#d4a054" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#glow)">6</text>
  <text x="700" y="222" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle" letter-spacing="1">PLATFORMS</text>

  <rect x="150" y="240" width="600" height="1" fill="url(#lineGrad)"/>

  <text x="450" y="270" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.5">Governed operational intelligence  ·  One TypeScript monorepo  ·  One architect</text>

  <text x="450" y="300" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle" letter-spacing="2">TYPESCRIPT  ·  REACT  ·  EXPRESS  ·  POSTGRESQL  ·  DRIZZLE  ·  EXPO  ·  PNPM MONOREPO</text>
</svg>
