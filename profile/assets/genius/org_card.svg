<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-label="SZL Holdings · governance substrate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070912"/><stop offset="1" stop-color="#0d1322"/>
    </linearGradient>
    <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ad1ff"/><stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <style>
      text{ font-family:'Inter','IBM Plex Sans',system-ui,sans-serif; }
      .title{ font-size:21px; font-weight:700; fill:#e8ecf6; letter-spacing:.01em; }
      .sub{ font-size:12.5px; fill:#8893ad; font-family:'JetBrains Mono',monospace; }
      .val{ font-size:36px; font-weight:700; fill:#5ad1ff;
             font-family:'JetBrains Mono',monospace; opacity:1; }
      .lab{ font-size:11.5px; fill:#8893ad; letter-spacing:.06em; text-transform:uppercase; }
      .foot{ font-size:11px; fill:#8893ad; font-family:'JetBrains Mono',monospace; }
      .flow{ stroke-dasharray:14 10; }
    </style>
  </defs>
  <rect width="760" height="240" rx="16" fill="url(#bg)" stroke="#19223a"/>
  <line class="flow" x1="24" y1="76" x2="736" y2="76" stroke="url(#ln)" stroke-width="2.5" stroke-linecap="round"><animate attributeName="stroke-dashoffset" values="0;-48" dur="1.6s" repeatCount="indefinite"/></line>
  <text class="title" x="30" y="44">SZL Holdings · governance substrate</text>
  <text class="sub" x="30" y="64">formally-verified gate for agentic AI · doctrine v11 LOCKED</text>
  
  <g transform="translate(100,132)" text-anchor="middle">
    <text class="val" y="0">20<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.0s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">public repos</text>
  </g>
  <g transform="translate(240,132)" text-anchor="middle">
    <text class="val" y="0">749<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.18s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">Lean decl</text>
  </g><line x1="170" y1="104" x2="170" y2="150" stroke="#19223a"/>
  <g transform="translate(380,132)" text-anchor="middle">
    <text class="val" y="0">14<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.36s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">axioms</text>
  </g><line x1="310" y1="104" x2="310" y2="150" stroke="#19223a"/>
  <g transform="translate(520,132)" text-anchor="middle">
    <text class="val" y="0">163<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.54s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">sorries</text>
  </g><line x1="450" y1="104" x2="450" y2="150" stroke="#19223a"/>
  <g transform="translate(660,132)" text-anchor="middle">
    <text class="val" y="0">13<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.72s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">yuyay axes</text>
  </g><line x1="590" y1="104" x2="590" y2="150" stroke="#19223a"/>
